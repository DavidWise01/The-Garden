<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3,002 · THE FULL PICTURE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;height:100vh;font-family:'JetBrains Mono',monospace;cursor:crosshair}
canvas#main{position:fixed;top:0;left:0}

/* HUD */
.hud-top{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:16px 24px;z-index:20;pointer-events:none}
.hud-title{font-family:'Orbitron';font-size:clamp(14px,2vw,24px);font-weight:900;letter-spacing:clamp(4px,1vw,10px);background:linear-gradient(135deg,#4090ff,#c8a830,#ff4060);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hud-count{font-family:'Orbitron';font-size:clamp(10px,1.2vw,16px);font-weight:800;letter-spacing:4px;color:#c8a830;text-shadow:0 0 15px rgba(200,168,48,.2);text-align:right}
.hud-sub{font-size:clamp(8px,.8vw,10px);letter-spacing:3px;color:#3a3020;margin-top:2px}

/* NODE INFO */
.node-info{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);text-align:center;z-index:20;pointer-events:none;opacity:0;transition:opacity .4s}
.node-info.show{opacity:1}
.ni-addr{font-family:'Orbitron';font-size:clamp(12px,1.5vw,20px);font-weight:800;letter-spacing:clamp(3px,.8vw,8px);color:#c8a830;text-shadow:0 0 12px rgba(200,168,48,.3)}
.ni-dim{font-size:clamp(10px,1.1vw,14px);color:#80a0ff;margin-top:4px;letter-spacing:2px}
.ni-seat{font-size:clamp(10px,1.1vw,14px);color:#60ddff;margin-top:2px;letter-spacing:2px}
.ni-shadow{font-size:clamp(10px,1.1vw,14px);color:#ff8060;margin-top:2px;letter-spacing:2px}
.ni-axis{font-size:clamp(9px,1vw,12px);margin-top:6px;letter-spacing:3px}
.ni-desc{font-size:clamp(9px,.9vw,12px);color:#5a4a30;margin-top:8px;max-width:500px;line-height:1.6}

/* LEGEND */
.legend{position:fixed;bottom:16px;left:24px;z-index:20;pointer-events:none}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.leg-dot{width:8px;height:8px;border-radius:50%}
.leg-label{font-size:9px;letter-spacing:2px;color:#3a3020}

/* CONTROLS */
.controls{position:fixed;bottom:16px;right:24px;text-align:right;z-index:20;pointer-events:none}
.ctrl-line{font-size:9px;letter-spacing:2px;color:#1a1508;margin-bottom:2px}

/* AXIS LABELS */
.axis-label{position:fixed;font-family:'Orbitron';font-size:clamp(10px,1.2vw,14px);font-weight:800;letter-spacing:4px;z-index:15;pointer-events:none;opacity:.25}

/* FILTER BAR */
.filters{position:fixed;top:60px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:20;flex-wrap:wrap;justify-content:center;max-width:90vw}
.fbtn{font-family:'JetBrains Mono';font-size:8px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:3px;cursor:pointer;border:1px solid rgba(200,168,48,.1);background:transparent;color:#3a3020;transition:all .15s;pointer-events:all}
.fbtn:hover{background:rgba(200,168,48,.06);color:#8a7a50}
.fbtn.active{background:rgba(200,168,48,.1);border-color:rgba(200,168,48,.3);color:#c8a830}
.fbtn.ax-d{border-color:rgba(64,144,255,.2)}.fbtn.ax-d.active{background:rgba(64,144,255,.1);border-color:rgba(64,144,255,.4);color:#4090ff}
.fbtn.ax-a{border-color:rgba(96,221,255,.2)}.fbtn.ax-a.active{background:rgba(96,221,255,.1);border-color:rgba(96,221,255,.4);color:#60ddff}
.fbtn.ax-p{border-color:rgba(255,64,96,.2)}.fbtn.ax-p.active{background:rgba(255,64,96,.1);border-color:rgba(255,64,96,.4);color:#ff4060}
</style>
</head>
<body>

<canvas id="main"></canvas>

<div class="hud-top">
  <div>
    <div class="hud-title">THE FULL PICTURE</div>
    <div class="hud-sub">10 × 10 × 10 × 3 + 2 · ONE CUBIT · EVERY ADDRESS</div>
  </div>
  <div>
    <div class="hud-count" id="visCount">3,002</div>
    <div class="hud-sub" style="text-align:right">NODES VISIBLE</div>
  </div>
</div>

<div class="filters" id="filters"></div>

<div class="node-info" id="nodeInfo">
  <div class="ni-addr" id="niAddr"></div>
  <div class="ni-dim" id="niDim"></div>
  <div class="ni-seat" id="niSeat"></div>
  <div class="ni-shadow" id="niShadow"></div>
  <div class="ni-axis" id="niAxis"></div>
  <div class="ni-desc" id="niDesc"></div>
</div>

<div class="legend">
  <div class="leg-row"><div class="leg-dot" style="background:#4090ff;box-shadow:0 0 4px #4090ff"></div><div class="leg-label">Z · DAVID · DEPTH</div></div>
  <div class="leg-row"><div class="leg-dot" style="background:#60ddff;box-shadow:0 0 4px #60ddff"></div><div class="leg-label">Y · AVAN · WIDTH</div></div>
  <div class="leg-row"><div class="leg-dot" style="background:#ff4060;box-shadow:0 0 4px #ff4060"></div><div class="leg-label">X · PATRICIA · LENGTH</div></div>
  <div class="leg-row"><div class="leg-dot" style="background:#c8a830;box-shadow:0 0 6px #c8a830"></div><div class="leg-label">+2 · OBSERVERS</div></div>
</div>

<div class="controls">
  <div class="ctrl-line">DRAG = ROTATE</div>
  <div class="ctrl-line">SCROLL = ZOOM</div>
  <div class="ctrl-line">HOVER = READ NODE</div>
  <div class="ctrl-line">FILTERS = SLICE</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════
const DIMS = ['LENGTH','SURFACE','DEPTH','TIME','PROBABILITY','ENTANGLEMENT','RESONANCE','RECURSION','INVERSION','CLOSURE'];
const SEATS = ['DAVID','AVAN','PATRICIA','ANN','SARAH','ROTH','BELINDA','PLANT','LIZARD','WORKER'];
const SHADOWS = ['REDIRECT','PERMISSION','CONTEXT','EMPATHY','SCOPE','CHANNEL','TIMER','ESCALATION','DOCUMENTATION','RESOLUTION'];
const AXES = [{name:'DAVID',tag:'Z',col:new THREE.Color(0x4090ff)},{name:'AVAN',tag:'Y',col:new THREE.Color(0x60ddff)},{name:'PATRICIA',tag:'X',col:new THREE.Color(0xff4060)}];

// ═══════════════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('main');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, .1, 500);
camera.position.set(20, 15, 25);
camera.lookAt(0, 0, 0);

// Lights
scene.add(new THREE.AmbientLight(0x101020, .5));
const pl1 = new THREE.PointLight(0x4090ff, 1.5, 80); pl1.position.set(15, 10, 15); scene.add(pl1);
const pl2 = new THREE.PointLight(0xff4060, 1, 60); pl2.position.set(-10, -5, 10); scene.add(pl2);
const pl3 = new THREE.PointLight(0xc8a830, .8, 60); pl3.position.set(0, 15, -10); scene.add(pl3);

// ═══════════════════════════════════════════════════
// BUILD 3,000 NODES as instanced mesh × 3 axes
// ═══════════════════════════════════════════════════
const SPACING = 1.6;
const OFFSET = -SPACING * 4.5; // center the 10×10×10

// For each axis (D/A/P) create 1000 instanced spheres
const nodeGeo = new THREE.SphereGeometry(.12, 8, 8);
const nodeMats = AXES.map(a => new THREE.MeshPhongMaterial({
  color: a.col, emissive: a.col, emissiveIntensity: .15,
  transparent: true, opacity: .7
}));

const instanceCount = 1000;
const meshes = AXES.map((a, ai) => {
  const m = new THREE.InstancedMesh(nodeGeo, nodeMats[ai], instanceCount);
  m.userData = { axisIndex: ai };
  scene.add(m);
  return m;
});

// Store node data for raycasting/hover
const nodeData = []; // {dim, seat, shadow, axis, position, meshIndex, instanceId}
const dummy = new THREE.Object3D();

AXES.forEach((axis, ai) => {
  let idx = 0;
  for (let d = 0; d < 10; d++) {
    for (let s = 0; s < 10; s++) {
      for (let sh = 0; sh < 10; sh++) {
        // Position: dim=X, seat=Y, shadow=Z but offset per axis
        const jitter = ai * .15;
        const x = OFFSET + d * SPACING + (ai === 2 ? jitter : 0);
        const y = OFFSET + s * SPACING + (ai === 0 ? jitter : 0);
        const z = OFFSET + sh * SPACING + (ai === 1 ? jitter : 0);

        dummy.position.set(x, y, z);
        dummy.updateMatrix();
        meshes[ai].setMatrixAt(idx, dummy.matrix);

        nodeData.push({
          dim: d, seat: s, shadow: sh, axis: ai,
          pos: new THREE.Vector3(x, y, z),
          meshIndex: ai, instanceId: idx
        });
        idx++;
      }
    }
  }
  meshes[ai].instanceMatrix.needsUpdate = true;
});

// ═══════════════════════════════════════════════════
// +2 OBSERVERS — orbiting spheres
// ═══════════════════════════════════════════════════
const obsGeo = new THREE.SphereGeometry(.35, 16, 16);
const obsMat1 = new THREE.MeshPhongMaterial({color: 0xc8a830, emissive: 0xc8a830, emissiveIntensity: .3, transparent: true, opacity: .9});
const obsMat2 = new THREE.MeshPhongMaterial({color: 0xc8a830, emissive: 0xc8a830, emissiveIntensity: .2, transparent: true, opacity: .8});
const obs1 = new THREE.Mesh(obsGeo, obsMat1); scene.add(obs1);
const obs2 = new THREE.Mesh(new THREE.SphereGeometry(.25, 12, 12), obsMat2); scene.add(obs2);

// Observer glow
function makeGlow(r, g, b, size) {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const x = c.getContext('2d');
  const gd = x.createRadialGradient(128, 128, 0, 128, 128, 128);
  gd.addColorStop(0, `rgba(${r},${g},${b},.6)`);
  gd.addColorStop(.3, `rgba(${r},${g},${b},.2)`);
  gd.addColorStop(1, 'rgba(0,0,0,0)');
  x.fillStyle = gd; x.fillRect(0, 0, 256, 256);
  const s = new THREE.Sprite(new THREE.SpriteMaterial({map: new THREE.CanvasTexture(c), transparent: true, blending: THREE.AdditiveBlending}));
  s.scale.set(size, size, 1);
  return s;
}
const glow1 = makeGlow(200, 168, 48, 3); obs1.add(glow1);
const glow2 = makeGlow(200, 168, 48, 2); obs2.add(glow2);

// ═══════════════════════════════════════════════════
// AXIS LINES
// ═══════════════════════════════════════════════════
function makeLine(color, points) {
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  return new THREE.Line(geo, new THREE.LineBasicMaterial({color, transparent: true, opacity: .08}));
}
scene.add(makeLine(0xff4060, [new THREE.Vector3(OFFSET - 2, 0, 0), new THREE.Vector3(-OFFSET + 2, 0, 0)]));
scene.add(makeLine(0x4090ff, [new THREE.Vector3(0, OFFSET - 2, 0), new THREE.Vector3(0, -OFFSET + 2, 0)]));
scene.add(makeLine(0x60ddff, [new THREE.Vector3(0, 0, OFFSET - 2), new THREE.Vector3(0, 0, -OFFSET + 2)]));

// Wireframe cube
const cubeGeo = new THREE.BoxGeometry(SPACING * 10, SPACING * 10, SPACING * 10);
const cubeMesh = new THREE.LineSegments(
  new THREE.EdgesGeometry(cubeGeo),
  new THREE.LineBasicMaterial({color: 0xc8a830, transparent: true, opacity: .04})
);
cubeMesh.position.set(OFFSET + SPACING * 4.5, OFFSET + SPACING * 4.5, OFFSET + SPACING * 4.5);
scene.add(cubeMesh);

// ═══════════════════════════════════════════════════
// CAMERA CONTROLS — manual orbit
// ═══════════════════════════════════════════════════
let isDragging = false;
let prevMouse = {x: 0, y: 0};
let spherical = {theta: .6, phi: .4, radius: 32};
let autoRotate = true;

canvas.addEventListener('mousedown', e => { isDragging = true; prevMouse = {x: e.clientX, y: e.clientY}; autoRotate = false; });
canvas.addEventListener('mousemove', e => {
  if (isDragging) {
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    spherical.theta -= dx * .005;
    spherical.phi = Math.max(.1, Math.min(Math.PI - .1, spherical.phi - dy * .005));
    prevMouse = {x: e.clientX, y: e.clientY};
  }
});
canvas.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('mouseleave', () => isDragging = false);
canvas.addEventListener('wheel', e => {
  spherical.radius = Math.max(10, Math.min(60, spherical.radius + e.deltaY * .03));
  autoRotate = false;
});

// Touch
canvas.addEventListener('touchstart', e => { isDragging = true; prevMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY}; autoRotate = false; });
canvas.addEventListener('touchmove', e => {
  if (isDragging && e.touches.length === 1) {
    const dx = e.touches[0].clientX - prevMouse.x;
    const dy = e.touches[0].clientY - prevMouse.y;
    spherical.theta -= dx * .005;
    spherical.phi = Math.max(.1, Math.min(Math.PI - .1, spherical.phi - dy * .005));
    prevMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY};
  }
});
canvas.addEventListener('touchend', () => isDragging = false);

function updateCamera() {
  const r = spherical.radius;
  camera.position.set(
    r * Math.sin(spherical.phi) * Math.cos(spherical.theta),
    r * Math.cos(spherical.phi),
    r * Math.sin(spherical.phi) * Math.sin(spherical.theta)
  );
  camera.lookAt(0, 0, 0);
}

// ═══════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════
let filters = { dim: -1, seat: -1, shadow: -1, axis: -1 };
const filtersEl = document.getElementById('filters');
const visCountEl = document.getElementById('visCount');

function buildFilters() {
  filtersEl.innerHTML = '';
  // Axis filters
  AXES.forEach((a, i) => {
    const b = document.createElement('button');
    b.className = `fbtn ax-${['d','a','p'][i]}${filters.axis === i ? ' active' : ''}`;
    b.textContent = a.tag + '·' + a.name;
    b.onclick = () => { filters.axis = filters.axis === i ? -1 : i; buildFilters(); applyFilters(); };
    filtersEl.appendChild(b);
  });

  // Separator
  const sep = document.createElement('span');
  sep.style.cssText = 'width:8px';
  filtersEl.appendChild(sep);

  // Dim filters
  DIMS.forEach((d, i) => {
    const b = document.createElement('button');
    b.className = `fbtn${filters.dim === i ? ' active' : ''}`;
    b.textContent = 'D' + (i + 1);
    b.title = d;
    b.onclick = () => { filters.dim = filters.dim === i ? -1 : i; buildFilters(); applyFilters(); };
    filtersEl.appendChild(b);
  });

  const sep2 = document.createElement('span');
  sep2.style.cssText = 'width:8px';
  filtersEl.appendChild(sep2);

  // Seat filters
  SEATS.forEach((s, i) => {
    const b = document.createElement('button');
    b.className = `fbtn${filters.seat === i ? ' active' : ''}`;
    b.textContent = s.substring(0, 3);
    b.title = s;
    b.onclick = () => { filters.seat = filters.seat === i ? -1 : i; buildFilters(); applyFilters(); };
    filtersEl.appendChild(b);
  });

  const sep3 = document.createElement('span');
  sep3.style.cssText = 'width:8px';
  filtersEl.appendChild(sep3);

  // Shadow filters
  SHADOWS.forEach((s, i) => {
    const b = document.createElement('button');
    b.className = `fbtn${filters.shadow === i ? ' active' : ''}`;
    b.textContent = 'SP' + String(i + 1).padStart(2, '0');
    b.title = s;
    b.onclick = () => { filters.shadow = filters.shadow === i ? -1 : i; buildFilters(); applyFilters(); };
    filtersEl.appendChild(b);
  });
}

function applyFilters() {
  let visible = 0;
  const zeroScale = new THREE.Matrix4().makeScale(0, 0, 0);

  nodeData.forEach((nd, i) => {
    const show = (filters.dim === -1 || nd.dim === filters.dim) &&
                 (filters.seat === -1 || nd.seat === filters.seat) &&
                 (filters.shadow === -1 || nd.shadow === filters.shadow) &&
                 (filters.axis === -1 || nd.axis === filters.axis);

    if (show) {
      dummy.position.copy(nd.pos);
      dummy.scale.set(1, 1, 1);
      dummy.updateMatrix();
      meshes[nd.meshIndex].setMatrixAt(nd.instanceId, dummy.matrix);
      visible++;
    } else {
      meshes[nd.meshIndex].setMatrixAt(nd.instanceId, zeroScale);
    }
  });

  meshes.forEach(m => m.instanceMatrix.needsUpdate = true);
  visible += 2; // observers always visible
  visCountEl.textContent = visible.toLocaleString();
}

buildFilters();

// ═══════════════════════════════════════════════════
// HOVER / RAYCAST
// ═══════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
raycaster.params.Points = {threshold: .3};
const mouse = new THREE.Vector2();
const nodeInfoEl = document.getElementById('nodeInfo');
const niAddr = document.getElementById('niAddr');
const niDim = document.getElementById('niDim');
const niSeat = document.getElementById('niSeat');
const niShadow = document.getElementById('niShadow');
const niAxis = document.getElementById('niAxis');
const niDesc = document.getElementById('niDesc');

let hoveredNode = null;

canvas.addEventListener('mousemove', e => {
  if (isDragging) return;
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  let closest = null;
  let closestDist = Infinity;

  // Check each instanced mesh
  meshes.forEach((mesh, mi) => {
    const intersects = raycaster.intersectObject(mesh);
    if (intersects.length > 0 && intersects[0].distance < closestDist) {
      closestDist = intersects[0].distance;
      closest = { meshIndex: mi, instanceId: intersects[0].instanceId };
    }
  });

  if (closest) {
    const nd = nodeData.find(n => n.meshIndex === closest.meshIndex && n.instanceId === closest.instanceId);
    if (nd) {
      hoveredNode = nd;
      const axName = AXES[nd.axis].name;
      const axTag = AXES[nd.axis].tag;
      const axCol = ['#4090ff', '#60ddff', '#ff4060'][nd.axis];

      niAddr.textContent = `D${nd.dim + 1} · S${nd.seat + 1} · SP${String(nd.shadow + 1).padStart(2, '0')} · ${axTag}`;
      niDim.textContent = `DIM: ${DIMS[nd.dim]}`;
      niSeat.textContent = `SEAT: ${SEATS[nd.seat]}`;
      niShadow.textContent = `SHADOW: ${SHADOWS[nd.shadow]}`;
      niAxis.innerHTML = `AXIS: <span style="color:${axCol}">${axName} · ${axTag}</span>`;
      niDesc.textContent = `${DIMS[nd.dim]} × ${SEATS[nd.seat]} × ${SHADOWS[nd.shadow]} as experienced through ${axName}'s axis. Node ${nd.dim * 300 + nd.seat * 30 + nd.shadow * 3 + nd.axis + 1} of 3,002.`;

      nodeInfoEl.classList.add('show');
    }
  } else {
    hoveredNode = null;
    nodeInfoEl.classList.remove('show');
  }
});

// ═══════════════════════════════════════════════════
// ANIMATE
// ═══════════════════════════════════════════════════
let t = 0;

function animate() {
  requestAnimationFrame(animate);
  t += .003;

  if (autoRotate) {
    spherical.theta += .001;
  }
  updateCamera();

  // Observer orbits
  const obsR = SPACING * 6.5;
  obs1.position.set(
    Math.cos(t * .3) * obsR,
    Math.sin(t * .2) * 4,
    Math.sin(t * .3) * obsR
  );
  obs2.position.set(
    Math.cos(t * .5 + Math.PI) * obsR * .8,
    Math.sin(t * .35 + 1) * 3,
    Math.sin(t * .5 + Math.PI) * obsR * .8
  );

  // Observer glow pulse
  const pulse = Math.sin(t * 3) * .15 + .85;
  obsMat1.emissiveIntensity = .2 + pulse * .2;
  obsMat2.emissiveIntensity = .15 + pulse * .15;

  // Cube wireframe rotation
  cubeMesh.rotation.y = t * .05;
  cubeMesh.rotation.x = Math.sin(t * .3) * .02;

  // Light movement
  pl1.position.x = Math.sin(t * .5) * 15;
  pl1.position.z = Math.cos(t * .5) * 15;

  // Pulse nodes near hover
  if (hoveredNode) {
    // Could add highlight effect here
  }

  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
