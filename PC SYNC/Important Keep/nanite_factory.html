<style>

:root{

  --g:#00cc44;--gh:#00ff66;--gl:#009933;
  --r:#ff2244;--rh:#ff5566;
  --y:#ffee00;--c:#00ddbb;
  --w:#eeffee;--t:#88aa88;--td:#557755;--tdd:#334433;--tddd:#223322;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--w);font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden;user-select:none}
::selection{background:var(--p);color:#000}

.hdr{padding:10px 16px;border-bottom:1px solid var(--p);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(90deg,rgba(204,68,255,.04),rgba(255,136,0,.02),transparent)}
.hdr h1{font-family:'Orbitron';font-size:16px;font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,var(--p),var(--o));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{font-size:7px;letter-spacing:3px;color:var(--td);margin-top:1px}

.tabs{display:flex;border-bottom:1px solid var(--line);padding:0 12px;background:var(--bg)}
.tab{padding:7px 14px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--td);font:700 9px 'JetBrains Mono';letter-spacing:2px;cursor:pointer}
.tab:hover{color:var(--ph)}.tab.on{color:var(--p);border-bottom-color:var(--p)}

.main{display:flex;height:calc(100vh - 78px)}

/* LEFT: NANITE CATALOG */
.catalog{width:260px;border-right:1px solid var(--line);overflow-y:auto;background:var(--panel);flex-shrink:0}
.cat-hd{padding:8px 12px;font-size:8px;letter-spacing:3px;color:var(--p);font-weight:900;border-bottom:1px solid var(--tdd);background:rgba(204,68,255,.03)}
.cat-group{border-bottom:1px solid var(--tdd)}
.cat-group-hd{padding:6px 12px;font-size:8px;font-weight:700;color:var(--o);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.cat-group-hd:hover{background:rgba(255,136,0,.04)}
.cat-items{display:none;padding:2px 0}.cat-items.open{display:block}

.nanite-card{padding:6px 12px;border-bottom:1px solid var(--tddd);cursor:grab;transition:background .15s}
.nanite-card:hover{background:rgba(204,68,255,.06)}
.nanite-card:active{cursor:grabbing}
.nanite-card .nn{font-size:9px;font-weight:700;color:var(--ph)}
.nanite-card .nd{font-size:7px;color:var(--td);margin-top:1px}
.nanite-card .nt{display:flex;gap:3px;margin-top:2px}
.ntag{font-size:6px;padding:1px 4px;border-radius:2px;font-weight:700;letter-spacing:1px}
.ntag-scan{color:var(--c);background:rgba(0,221,187,.1);border:1px solid rgba(0,221,187,.2)}
.ntag-detect{color:var(--o);background:rgba(255,136,0,.1);border:1px solid rgba(255,136,0,.2)}
.ntag-measure{color:var(--y);background:rgba(255,238,0,.08);border:1px solid rgba(255,238,0,.15)}
.ntag-validate{color:var(--g);background:rgba(0,204,68,.08);border:1px solid rgba(0,204,68,.2)}
.ntag-extract{color:var(--r);background:rgba(255,34,68,.08);border:1px solid rgba(255,34,68,.2)}
.ntag-monitor{color:var(--p);background:rgba(204,68,255,.08);border:1px solid rgba(204,68,255,.2)}

/* CENTER: PLATFORM CANVAS */
.canvas-area{flex:1;overflow:auto;position:relative;background:radial-gradient(ellipse at center,#001800,#001000)}
.canvas-grid{position:absolute;inset:0;background-image:radial-gradient(circle,var(--tdd) .5px,transparent .5px);background-size:24px 24px;pointer-events:none}
.canvas-inner{min-width:2000px;min-height:1400px;position:relative}

/* Deployed nanite on canvas */
.deployed{position:absolute;min-width:140px;border:1px solid var(--tdd);border-radius:5px;background:rgba(0,18,0,.85);cursor:move;backdrop-filter:blur(4px);z-index:2}
.deployed.running{border-color:var(--g);box-shadow:0 0 12px rgba(0,204,68,.15)}
.deployed.error{border-color:var(--r);box-shadow:0 0 12px rgba(255,34,68,.15)}
.deployed.idle{border-color:var(--tdd)}
.dep-hd{padding:5px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--tdd);background:rgba(204,68,255,.03);border-radius:5px 5px 0 0;cursor:move}
.dep-hd .dn{font-size:8px;font-weight:900;color:var(--ph)}
.dep-hd .dx{font-size:10px;color:var(--r);cursor:pointer;padding:0 4px}
.dep-hd .dx:hover{color:var(--rh)}
.dep-body{padding:6px 8px;font-size:7px;color:var(--t)}
.dep-output{padding:4px 8px;border-top:1px solid var(--tdd);font-size:7px;color:var(--g);max-height:80px;overflow-y:auto;background:rgba(0,10,0,.4)}
.dep-port{width:8px;height:8px;border-radius:50%;border:1px solid var(--p);background:var(--bg);position:absolute;cursor:crosshair;z-index:3}
.dep-port:hover{background:var(--p);box-shadow:0 0 6px var(--p)}
.dep-port.out{right:-4px;top:50%}
.dep-port.in{left:-4px;top:50%}

/* Connections */
.conn-svg{position:absolute;inset:0;pointer-events:none;z-index:1}

/* RIGHT: INSPECTOR */
.inspector{width:260px;border-left:1px solid var(--line);overflow-y:auto;background:var(--panel);flex-shrink:0}
.insp-hd{padding:8px 12px;font-size:8px;letter-spacing:3px;color:var(--o);font-weight:900;border-bottom:1px solid var(--tdd);background:rgba(255,136,0,.03)}
.insp-section{padding:8px 12px;border-bottom:1px solid var(--tdd)}
.insp-label{font-size:7px;letter-spacing:2px;color:var(--td);margin-bottom:3px}
.insp-val{font-size:10px;font-weight:700}

.btn{padding:5px 12px;border-radius:3px;border:1px solid var(--p);background:rgba(204,68,255,.08);color:var(--p);font:700 8px 'JetBrains Mono';letter-spacing:1px;cursor:pointer}
.btn:hover{background:rgba(204,68,255,.15)}
.btn-o{border-color:var(--o);background:rgba(255,136,0,.08);color:var(--o)}
.btn-o:hover{background:rgba(255,136,0,.15)}
.btn-g{border-color:var(--g);background:rgba(0,204,68,.08);color:var(--g)}
.btn-g:hover{background:rgba(0,204,68,.15)}
.btn-r{border-color:var(--r);background:rgba(255,34,68,.08);color:var(--r)}
.btn-r:hover{background:rgba(255,34,68,.15)}

.toolbar{padding:6px 12px;border-bottom:1px solid var(--line);display:flex;gap:6px;align-items:center;background:var(--bg)}

/* Platform panel */
.pnl{display:none;height:100%}.pnl.on{display:flex}

/* Export panel */
.export-area{flex:1;padding:16px;overflow-y:auto}
.code-block{background:rgba(0,10,0,.6);border:1px solid var(--tdd);border-radius:4px;padding:10px;font-size:8px;color:var(--g);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto;line-height:1.5}
</style>
</head>

  </div>
</div>

function renderCatalog(){
  const el=document.getElementById('catalog');
  let h='<div class="cat-hd">NANITE CATALOG</div>';

  Object.entries(NANITES).forEach(([groupKey,group])=>{
    h+=`<div class="cat-group">`;
    h+=`<div class="cat-group-hd" onclick="this.nextElementSibling.classList.toggle('open')">`;
    h+=`<span style="color:${group.color}">${group.label}</span>`;
    h+=`<span style="font-size:8px;color:var(--td)">${group.items.length}</span>`;
    h+=`</div><div class="cat-items open">`;

    group.items.forEach(n=>{
      const tagMap={scan:'ntag-scan',detect:'ntag-detect',measure:'ntag-measure',validate:'ntag-validate',extract:'ntag-extract',monitor:'ntag-monitor'};
      h+=`<div class="nanite-card" draggable="true" data-nid="${n.id}" onmousedown="startDrag(event,'${n.id}')">`;
      h+=`<div class="nn">${n.id}: ${n.name}</div>`;
      h+=`<div class="nd">${n.desc}</div>`;
      h+=`<div class="nt">${n.tags.map(t=>`<span class="ntag ${tagMap[t]||'ntag-scan'}">${t.toUpperCase()}</span>`).join('')}</div>`;
      h+=`</div>`;
    });

    h+=`</div></div>`;
  });

  el.innerHTML=h;
}

// ═══ FIND NANITE DEF ═══
function findNanite(nid){
  for(const g of Object.values(NANITES)){
    const n=g.items.find(i=>i.id===nid);
    if(n)return{...n,groupColor:g.color};
  }
  return null;
}

// ═══ DEPLOY ═══
function deployNanite(nid,x,y){
  const def=findNanite(nid);
  if(!def)return;
  const inst={id:'D'+nextId++,naniteId:nid,def,x,y,state:'idle',output:null};
  deployed.push(inst);
  renderCanvas();
  selectNanite(inst.id);
  document.getElementById('canvas-empty').style.display='none';
}

// ═══ RENDER CANVAS ═══
function renderCanvas(){
  const el=document.getElementById('canvas-inner');
  let h='';

  deployed.forEach(d=>{
    const stateClass=d.state==='running'?'running':d.state==='done'?'running':d.state==='error'?'error':'idle';
    h+=`<div class="deployed ${stateClass}" id="dep-${d.id}" style="left:${d.x}px;top:${d.y}px" onmousedown="startMove(event,'${d.id}')" onclick="selectNanite('${d.id}')">`;
    h+=`<div class="dep-hd"><span class="dn">${d.def.name}</span><span class="dx" onclick="event.stopPropagation();removeNanite('${d.id}')">✕</span></div>`;
    h+=`<div class="dep-body">${d.def.id} · ${d.state.toUpperCase()}</div>`;
    if(d.output){
      const preview=JSON.stringify(d.output).slice(0,120);
      h+=`<div class="dep-output">${preview}${preview.length>=120?'...':''}</div>`;
    }
    // Ports
    if(d.def.inputs.length)h+=`<div class="dep-port in" style="top:50%;transform:translateY(-50%)" onmousedown="event.stopPropagation();startConn(event,'${d.id}','in')" title="INPUT"></div>`;
    h+=`<div class="dep-port out" style="top:50%;transform:translateY(-50%)" onmousedown="event.stopPropagation();startConn(event,'${d.id}','out')" title="OUTPUT"></div>`;
    h+=`</div>`;
  });

  el.innerHTML=h;
  renderConnections();
  updateStatus();
}

// ═══ CONNECTIONS SVG ═══
function renderConnections(){
  const svg=document.getElementById('conn-svg');
  let paths='';
  connections.forEach(c=>{
    const fromEl=document.getElementById('dep-'+c.from);
    const toEl=document.getElementById('dep-'+c.to);
    if(!fromEl||!toEl)return;
    const fx=parseInt(fromEl.style.left)+fromEl.offsetWidth;
    const fy=parseInt(fromEl.style.top)+fromEl.offsetHeight/2;
    const tx=parseInt(toEl.style.left);
    const ty=parseInt(toEl.style.top)+toEl.offsetHeight/2;
    const mx=(fx+tx)/2;
    paths+=`<path d="M${fx},${fy} C${mx},${fy} ${mx},${ty} ${tx},${ty}" fill="none" stroke="rgba(204,68,255,.4)" stroke-width="1.5" stroke-dasharray="4 2"/>`;
    paths+=`<circle cx="${fx}" cy="${fy}" r="3" fill="var(--p)" opacity=".6"/>`;
    paths+=`<circle cx="${tx}" cy="${ty}" r="3" fill="var(--o)" opacity=".6"/>`;
  });
  svg.innerHTML=paths;
}

// ═══ DRAG & DROP ═══
let dragNaniteId=null;

function startDrag(e,nid){
  dragNaniteId=nid;
}

document.getElementById('canvas-area').addEventListener('mouseup',function(e){
  if(dragNaniteId){
    const rect=this.getBoundingClientRect();
    const x=e.clientX-rect.left+this.scrollLeft-70;
    const y=e.clientY-rect.top+this.scrollTop-20;
    deployNanite(dragNaniteId,Math.max(0,x),Math.max(0,y));
    dragNaniteId=null;
  }
});

// ═══ MOVE DEPLOYED ═══
let moveId=null,moveOx=0,moveOy=0;

function startMove(e,id){
  if(e.target.classList.contains('dx')||e.target.classList.contains('dep-port'))return;
  moveId=id;
  const d=deployed.find(d=>d.id===id);
  moveOx=e.clientX-d.x;
  moveOy=e.clientY-d.y;
  e.preventDefault();
}

document.addEventListener('mousemove',e=>{
  if(!moveId)return;
  const d=deployed.find(d=>d.id===moveId);
  if(!d)return;
  const area=document.getElementById('canvas-area').getBoundingClientRect();
  d.x=e.clientX-moveOx;
  d.y=e.clientY-moveOy;
  const el=document.getElementById('dep-'+moveId);
  if(el){el.style.left=d.x+'px';el.style.top=d.y+'px'}
  renderConnections();
});

document.addEventListener('mouseup',()=>{moveId=null});

// ═══ CONNECTION DRAG ═══
function startConn(e,id,port){
  connDrag={from:id,port};
  e.preventDefault();
}

document.getElementById('canvas-area').addEventListener('mouseup',function(e){
  if(!connDrag)return;
  // Find target
  const target=e.target.closest('.deployed');
  if(target){
    const toId=target.id.replace('dep-','');
    if(toId!==connDrag.from){
      const exists=connections.find(c=>(c.from===connDrag.from&&c.to===toId)||(c.from===toId&&c.to===connDrag.from));
      if(!exists){
        connections.push({from:connDrag.from,to:toId});
        renderConnections();
      }
    }
  }
  connDrag=null;
});

// ═══ SELECT ═══
function selectNanite(id){
  selected=id;
  const d=deployed.find(d=>d.id===id);
  if(!d)return;

  const el=document.getElementById('insp-content');
  let h='';
  h+=`<div class="insp-section"><div class="insp-label">NANITE</div><div class="insp-val" style="color:var(--ph)">${d.def.name}</div></div>`;
  h+=`<div class="insp-section"><div class="insp-label">ID</div><div class="insp-val" style="color:var(--o)">${d.def.id} → ${d.id}</div></div>`;
  h+=`<div class="insp-section"><div class="insp-label">STATE</div><div class="insp-val" style="color:${d.state==='done'?'var(--g)':d.state==='error'?'var(--r)':'var(--td)'}">${d.state.toUpperCase()}</div></div>`;
  h+=`<div class="insp-section"><div class="insp-label">INPUTS</div><div class="insp-val" style="color:var(--t);font-size:8px">${d.def.inputs.length?d.def.inputs.join(', '):'None (self-sourcing)'}</div></div>`;
  h+=`<div class="insp-section"><div class="insp-label">OUTPUTS</div><div class="insp-val" style="color:var(--t);font-size:8px">${d.def.outputs.join(', ')}</div></div>`;
  h+=`<div class="insp-section"><div class="insp-label">CONNECTIONS</div><div class="insp-val" style="color:var(--t);font-size:8px">${connections.filter(c=>c.from===id||c.to===id).length} links</div></div>`;

  if(d.output){
    h+=`<div class="insp-section"><div class="insp-label">OUTPUT DATA</div><pre style="font-size:7px;color:var(--g);background:rgba(0,10,0,.5);padding:6px;border-radius:3px;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all">${JSON.stringify(d.output,null,2)}</pre></div>`;
  }

  h+=`<div class="insp-section" style="display:flex;gap:6px;flex-wrap:wrap">`;
  h+=`<button class="btn-g btn" onclick="runSingle('${d.id}')">RUN</button>`;
  h+=`<button class="btn-r btn" onclick="removeNanite('${d.id}')">REMOVE</button>`;
  h+=`</div>`;

  el.innerHTML=h;
}

// ═══ REMOVE ═══
function removeNanite(id){
  deployed=deployed.filter(d=>d.id!==id);
  connections=connections.filter(c=>c.from!==id&&c.to!==id);
  if(selected===id)selected=null;
  renderCanvas();
  document.getElementById('insp-content').innerHTML='<div style="padding:12px;font-size:8px;color:var(--td);text-align:center">Select a deployed nanite</div>';
  if(!deployed.length)document.getElementById('canvas-empty').style.display='';
}

// ═══ RUN ═══
async function runSingle(id){
  const d=deployed.find(d=>d.id===id);
  if(!d)return;
  d.state='running';
  renderCanvas();

  // Get input from connected sources
  let input=null;
  const inConns=connections.filter(c=>c.to===id);
  if(inConns.length){
    input={};
    inConns.forEach(c=>{
      const src=deployed.find(dd=>dd.id===c.from);
      if(src?.output)Object.assign(input,src.output);
    });
  }

  try{
    d.output=await d.def.run(input);
    d.state='done';
  }catch(e){
    d.output={error:e.message};
    d.state='error';
  }

  renderCanvas();
  if(selected===id)selectNanite(id);
}

async function runAll(){
  const out=document.getElementById('run-output');
  out.innerHTML='<span style="color:var(--p)">═══ RUNNING ALL NANITES ═══</span>\n\n';

  // Topological sort: run sources first, then connected
  const ran=new Set();
  const order=[];

  // First: all with no inputs or no incoming connections
  deployed.forEach(d=>{
    const incoming=connections.filter(c=>c.to===d.id);
    if(!incoming.length)order.push(d.id);
  });

  // Then: everything else
  deployed.forEach(d=>{
    if(!order.includes(d.id))order.push(d.id);
  });

  for(const id of order){
    const d=deployed.find(d=>d.id===id);
    if(!d)continue;
    out.innerHTML+=`<span style="color:var(--o)">▶ ${d.def.id}: ${d.def.name}...</span>\n`;
    await runSingle(id);
    out.innerHTML+=`<span style="color:${d.state==='done'?'var(--g)':'var(--r)'}">${d.state==='done'?'✓':'✕'} ${d.def.name}: ${JSON.stringify(d.output).slice(0,200)}</span>\n\n`;
  }

  out.innerHTML+=`<span style="color:var(--p)">═══ COMPLETE — ${deployed.length} nanites executed ═══</span>\n`;
}

// ═══ TABS ═══
function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.pnl').forEach(x=>x.classList.remove('on'));
  document.querySelector(`.tab:nth-child(${t==='build'?1:t==='run'?2:3})`).classList.add('on');
  document.getElementById('tab-'+t).classList.add('on');

  if(t==='run')runAll();
}

// ═══ EXPORT ═══
function exportPlatform(fmt){
  const el=document.getElementById('export-code');

  if(fmt==='json'){
    const data={factory:'NANITE FACTORY v1.0',owner:'TriPod LLC',generated:new Date().toISOString(),nanites:deployed.map(d=>({instanceId:d.id,naniteId:d.def.id,name:d.def.name,position:{x:d.x,y:d.y},state:d.state,output:d.output})),connections:connections,totalVectors:deployed.reduce((s,d)=>s+(d.output?Object.keys(d.output).length:0),0)};
    el.textContent=JSON.stringify(data,null,2);
  }else if(fmt==='report'){
    let t=`NANITE FACTORY — PLATFORM SCAN REPORT\nGenerated: ${new Date().toISOString()}\nRoth · Dawn · TriPod LLC\n${'═'.repeat(50)}\n\n`;
    t+=`DEPLOYED: ${deployed.length} nanites\nCONNECTIONS: ${connections.length}\n\n`;
    deployed.forEach(d=>{
      t+=`${'─'.repeat(40)}\n${d.def.id}: ${d.def.name} [${d.state}]\n`;
      if(d.output)t+=JSON.stringify(d.output,null,2)+'\n';
      t+='\n';
    });
    el.textContent=t;
  }else if(fmt==='html'){
    el.textContent='[Standalone HTML export — packages all deployed nanites + connections into single self-running file. Run all nanites configured in BUILD tab first, then export.]';
  }
}

// ═══ STATUS ═══
function updateStatus(){
  document.getElementById('status-text').textContent=`${deployed.length} deployed · ${connections.length} connections`;
}

// ═══ INIT ═══
renderCatalog();
</script>
