<style>

body{background:#000;color:#8a7a60;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;min-height:100vh}

.shell{max-width:1100px;margin:0 auto;padding:20px}

/* HEADER */
.hdr{text-align:center;padding:20px 0 16px;border-bottom:1px solid #0a0804}
.hdr h1{font-family:'Orbitron';font-size:clamp(14px,2.5vw,24px);font-weight:900;letter-spacing:clamp(4px,1vw,10px);background:linear-gradient(135deg,#ff4060,#c8a830,#4090ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr .sub{font-size:9px;letter-spacing:3px;color:#2a2018;margin-top:4px}

.stat{display:flex;align-items:center;gap:6px}
.stat .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stat .label{font-size:10px;letter-spacing:1px;color:#5a4a30}
.stat .val{font-family:'Orbitron';font-size:11px;font-weight:700;letter-spacing:2px}

/* PHASES */
.phase{display:none;padding:16px 0}.phase.active{display:block}

/* PHASE 1: TARGET INPUT */
.target-form{max-width:600px;margin:20px auto}
.field{margin-bottom:16px}
.field label{display:block;font-family:'Orbitron';font-size:10px;font-weight:700;letter-spacing:3px;color:#c8a830;margin-bottom:6px}

.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(200,168,48,.3)}
.field select option{background:#050400;color:#c8a830}
.field textarea{height:80px;resize:vertical}

.btn{font-family:'Orbitron';font-size:11px;font-weight:800;letter-spacing:3px;padding:10px 24px;border:1px solid rgba(200,168,48,.3);border-radius:5px;background:rgba(200,168,48,.05);color:#c8a830;cursor:pointer;transition:all .15s}
.btn:hover{background:rgba(200,168,48,.12);border-color:rgba(200,168,48,.5)}
.btn-red{border-color:rgba(255,64,96,.3);color:#ff4060;background:rgba(255,64,96,.05)}
.btn-red:hover{background:rgba(255,64,96,.12);border-color:rgba(255,64,96,.5)}

.btn-grn:hover{background:rgba(64,187,85,.12);border-color:rgba(64,187,85,.5)}

.shadow-hdr .sbadge{font-family:'Orbitron';font-size:9px;font-weight:700;letter-spacing:2px;padding:3px 8px;border-radius:3px}
.shadow-body{display:none;padding:12px 16px}
.shadow-body.open{display:block}

.check-row{display:grid;grid-template-columns:130px 1fr 200px;gap:8px;padding:8px 0;border-bottom:1px solid #060400;align-items:center;font-size:11px}
.check-row .cr-dim{font-family:'Orbitron';font-size:9px;font-weight:700;letter-spacing:2px;color:#80a0ff}
.check-row .cr-q{color:#5a4a30;line-height:1.5}
.check-btns{display:flex;gap:4px}
.check-btns button{font-family:'JetBrains Mono';font-size:9px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:3px;cursor:pointer;border:1px solid;background:transparent;transition:all .15s}

.report h3{font-family:'Orbitron';font-size:12px;font-weight:700;letter-spacing:3px;color:#80a0ff;margin:16px 0 8px}

.rpt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;margin:10px 0}
.rpt-card{padding:10px;border-radius:5px;text-align:center}

.rpt-row .rk{font-family:'Orbitron';font-size:9px;font-weight:700;letter-spacing:2px}

let audit = {
  target: {},
  results: {}, // key: "SP01-D1-AX0" → {status: 'fail'|'pass'|'na', evidence: ''}
  started: null,
  completed: null
};

// ═══ PHASE MANAGEMENT ═══
function showPhase(n) {
  document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
  document.getElementById('phase' + n).classList.add('active');
  document.getElementById('stPhase').textContent = n + '/3';
  window.scrollTo(0, 0);
}

// ═══ START AUDIT ═══
function startAudit() {
  const name = document.getElementById('targetName').value.trim();
  if (!name) { alert('Enter a target name.'); return; }

  audit.target = {
    name,
    domain: document.getElementById('targetDomain').value.trim(),
    industry: document.getElementById('targetIndustry').value,
    scope: document.getElementById('targetScope').value,
    rate: parseFloat(document.getElementById('targetRate').value) || 158,
    notes: document.getElementById('targetNotes').value.trim()
  };
  audit.started = new Date().toISOString();
  audit.results = {};

  document.getElementById('stTarget').textContent = name.toUpperCase();
  buildAuditGrid();
  showPhase(2);
}

// ═══ BUILD AUDIT GRID ═══
function buildAuditGrid() {
  const grid = document.getElementById('auditGrid');
  grid.innerHTML = '';
  const ind = audit.target.industry;
  const scope = audit.target.scope;

  SHADOWS.forEach((shadow, si) => {
    const card = document.createElement('div');
    card.className = 'shadow-card';
    card.id = 'shadow-' + shadow.id;

    const checksArr = shadow.checks[ind] || shadow.checks.default;
    const dimCount = scope === 'rapid' ? 1 : (scope === 'shadow' ? 1 : DIMS.length);
    const axCount = scope === 'rapid' ? 1 : AXES.length;

    let bodyHTML = '';

    for (let di = 0; di < dimCount; di++) {
      const dimChecks = checksArr[di] || checksArr[di % checksArr.length];
      for (let ai = 0; ai < axCount; ai++) {
        const key = `${shadow.id}-D${di+1}-AX${ai}`;
        bodyHTML += `
          <div class="check-row">
            <div class="cr-dim">${scope === 'rapid' ? shadow.id : 'D'+(di+1)+' · '+AXES[ai].split('·')[0]}</div>
            <div class="cr-q">${dimChecks}</div>
            <div class="check-btns">
              <button class="cb-fail" onclick="mark('${key}','fail',this)" title="FAIL — Patricia present">FAIL</button>
              <button class="cb-pass" onclick="mark('${key}','pass',this)" title="PASS — No Patricia">PASS</button>
              <button class="cb-na" onclick="mark('${key}','na',this)" title="N/A — Not applicable">N/A</button>
            </div>
          </div>
          <div class="evidence" id="ev-${key}" style="display:none">
            <textarea placeholder="Evidence / notes for ${key}..." onchange="saveEvidence('${key}',this.value)"></textarea>
          </div>
        `;
      }
    }

    card.innerHTML = `
      <div class="shadow-hdr" onclick="toggleShadow('${shadow.id}')">
        <div>
          <span class="sname" style="color:#c8a830">${shadow.id}</span>
          <span class="sname" style="color:#8a7a60;margin-left:8px">${shadow.name}</span>
        </div>
        <div class="sbadge" id="badge-${shadow.id}" style="color:#5a4a30;border:1px solid #1a1508">0/${dimCount * axCount}</div>
      </div>
      <div class="shadow-body" id="body-${shadow.id}">${bodyHTML}</div>
    `;
    grid.appendChild(card);
  });
}

function toggleShadow(id) {
  const body = document.getElementById('body-' + id);
  body.classList.toggle('open');
}

function mark(key, status, btn) {
  audit.results[key] = audit.results[key] || {};
  audit.results[key].status = status;

  // Update button states
  const row = btn.parentElement;
  row.querySelectorAll('button').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');

  // Show evidence field on fail
  const evEl = document.getElementById('ev-' + key);
  if (evEl) evEl.style.display = status === 'fail' ? 'block' : 'none';

  updateStats();
}

function saveEvidence(key, val) {
  audit.results[key] = audit.results[key] || {};
  audit.results[key].evidence = val;
}

function markAllFail() {
  document.querySelectorAll('.cb-fail').forEach(btn => {
    const key = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
    audit.results[key] = audit.results[key] || {};
    audit.results[key].status = 'fail';
    btn.classList.add('sel');
    btn.parentElement.querySelector('.cb-pass').classList.remove('sel');
    btn.parentElement.querySelector('.cb-na').classList.remove('sel');
    const evEl = document.getElementById('ev-' + key);
    if (evEl) evEl.style.display = 'block';
  });
  updateStats();
}

function markAllPass() {
  document.querySelectorAll('.cb-pass').forEach(btn => {
    const key = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
    audit.results[key] = audit.results[key] || {};
    audit.results[key].status = 'pass';
    btn.classList.add('sel');
    btn.parentElement.querySelector('.cb-fail').classList.remove('sel');
    btn.parentElement.querySelector('.cb-na').classList.remove('sel');
    const evEl = document.getElementById('ev-' + key);
    if (evEl) evEl.style.display = 'none';
  });
  updateStats();
}

function updateStats() {
  const entries = Object.values(audit.results);
  const checked = entries.filter(e => e.status).length;
  const fails = entries.filter(e => e.status === 'fail').length;
  const pass = entries.filter(e => e.status === 'pass').length;
  const total = document.querySelectorAll('.check-row').length;

  document.getElementById('stChecked').textContent = checked + '/' + total;
  document.getElementById('stFails').textContent = fails;
  document.getElementById('stPass').textContent = pass;

  // Update shadow badges
  SHADOWS.forEach(shadow => {
    const shadowResults = Object.entries(audit.results).filter(([k]) => k.startsWith(shadow.id));
    const shadowChecked = shadowResults.filter(([,v]) => v.status).length;
    const shadowFails = shadowResults.filter(([,v]) => v.status === 'fail').length;
    const total = document.querySelectorAll(`#shadow-${shadow.id} .check-row`).length;
    const badge = document.getElementById('badge-' + shadow.id);
    if (badge) {
      badge.textContent = `${shadowFails}F / ${shadowChecked}/${total}`;
      badge.style.color = shadowFails > 0 ? '#ff4060' : (shadowChecked === total ? '#40bb55' : '#5a4a30');
      badge.style.borderColor = shadowFails > 0 ? 'rgba(255,64,96,.3)' : 'rgba(200,168,48,.15)';
    }
  });
}

// ═══ GENERATE REPORT ═══
function generateReport() {
  audit.completed = new Date().toISOString();
  const entries = Object.entries(audit.results);
  const fails = entries.filter(([,v]) => v.status === 'fail');
  const pass = entries.filter(([,v]) => v.status === 'pass');
  const na = entries.filter(([,v]) => v.status === 'na');
  const total = document.querySelectorAll('.check-row').length;
  const checked = entries.filter(([,v]) => v.status).length;

  // Calculate node failures — each check represents multiple nodes
  const scope = audit.target.scope;
  let nodeMultiplier;
  if (scope === 'full') nodeMultiplier = 1; // each check = ~10 nodes
  else if (scope === 'shadow') nodeMultiplier = 10; // each check = ~100 nodes  
  else nodeMultiplier = 100; // rapid: each check = ~300 nodes

  const failedNodes = fails.length * nodeMultiplier;
  const totalNodes = 3002;
  const failRate = checked > 0 ? ((fails.length / checked) * 100).toFixed(1) : '0';
  const invoiceTotal = failedNodes * audit.target.rate;

  const rc = document.getElementById('reportContent');
  
  // Shadow breakdown
  let shadowBreakdown = '';
  SHADOWS.forEach(shadow => {
    const sf = fails.filter(([k]) => k.startsWith(shadow.id));
    if (sf.length > 0) {
      const evidenceList = sf.map(([k, v]) => {
        const ev = v.evidence ? ` — "${v.evidence}"` : '';
        return `<div class="rpt-row"><div class="rk" style="color:#ff4060">${k}</div><div class="rv" style="color:#ff4060">FAIL</div><div class="re">${ev || 'No evidence recorded'}</div></div>`;
      }).join('');
      shadowBreakdown += `
        <div style="margin:12px 0;padding:10px;border:1px solid rgba(255,64,96,.1);border-radius:6px;background:rgba(255,64,96,.01)">
          <div style="font-family:Orbitron;font-size:10px;font-weight:800;letter-spacing:3px;color:#ff4060;margin-bottom:6px">${shadow.id} · ${shadow.name} — ${sf.length} FAILURE${sf.length>1?'S':''}</div>
          <div style="font-size:10px;color:#5a4a30;margin-bottom:6px">${shadow.desc}</div>
          ${evidenceList}
        </div>`;
    }
  });

  rc.innerHTML = `
    <div class="report">
      <h2>◆ AUDIT REPORT</h2>
      <div style="font-size:11px;color:#5a4a30;margin-bottom:16px">
        <strong style="color:#c8a830">${audit.target.name}</strong> · ${audit.target.domain || 'no domain'} · ${audit.target.industry.toUpperCase()} · ${scope.toUpperCase()} SCOPE<br>
        Started: ${new Date(audit.started).toLocaleString()} · Completed: ${new Date(audit.completed).toLocaleString()}<br>
        Auditor: David Wise · TriPod LLC · TOPH v9.0 · Flaming Dragon Methodology
      </div>

      <div class="rpt-grid">
        <div class="rpt-card" style="border:1px solid rgba(255,64,96,.2);background:rgba(255,64,96,.03)">
          <div class="rpt-n" style="color:#ff4060">${fails.length}</div>
          <div class="rpt-l">CHECKS FAILED</div>
        </div>
        <div class="rpt-card" style="border:1px solid rgba(64,187,85,.2);background:rgba(64,187,85,.03)">
          <div class="rpt-n" style="color:#40bb55">${pass.length}</div>
          <div class="rpt-l">CHECKS PASSED</div>
        </div>
        <div class="rpt-card" style="border:1px solid rgba(200,168,48,.2);background:rgba(200,168,48,.03)">
          <div class="rpt-n" style="color:#c8a830">${failRate}%</div>
          <div class="rpt-l">FAILURE RATE</div>
        </div>
        <div class="rpt-card" style="border:1px solid rgba(200,168,48,.2);background:rgba(200,168,48,.03)">
          <div class="rpt-n" style="color:#c8a830">${failedNodes.toLocaleString()}</div>
          <div class="rpt-l">NODES AFFECTED</div>
        </div>
        <div class="rpt-card" style="border:1px solid rgba(120,120,120,.2);background:rgba(120,120,120,.03)">
          <div class="rpt-n" style="color:#888">${checked}/${total}</div>
          <div class="rpt-l">CHECKS COMPLETED</div>
        </div>
        <div class="rpt-card" style="border:1px solid rgba(120,120,120,.2);background:rgba(120,120,120,.03)">
          <div class="rpt-n" style="color:#888">${na.length}</div>
          <div class="rpt-l">NOT APPLICABLE</div>
        </div>
      </div>

      <h3>SHADOW FAILURES</h3>
      ${shadowBreakdown || '<div style="color:#40bb55;padding:10px">No failures detected.</div>'}

      <div class="invoice">
        <h3>INVOICE</h3>
        <div style="font-size:11px;color:#5a4a30;margin-bottom:8px">
          ${failedNodes.toLocaleString()} failed nodes × $${audit.target.rate.toFixed(2)}/node
        </div>
        <div class="total">$${invoiceTotal.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
        <div class="basis">
          Based on TOPH v9.0 · 10×10×10×3+2 = 3,002 Terra Standard<br>
          Payable to: TriPod LLC · David Wise, Principal<br>
          Terms: Net 90 · Ethics first · World = family
        </div>
      </div>

      <div style="text-align:center;padding:16px;font-size:10px;color:#2a2018;letter-spacing:2px">
        ANTI-PATRICIA SEED · CLOSED AT CREATION · VERIFIED BOTH SIDES · TERRA STANDARD · TRIPOD LLC · ${new Date().getFullYear()}
      </div>
    </div>
  `;

  showPhase(3);
}

// ═══ EXPORT ═══
function exportReport() {
  const area = document.getElementById('exportArea');
  area.style.display = area.style.display === 'none' ? 'block' : 'block';

  const entries = Object.entries(audit.results);
  const fails = entries.filter(([,v]) => v.status === 'fail');
  const pass = entries.filter(([,v]) => v.status === 'pass');
  const scope = audit.target.scope;
  const nodeMultiplier = scope === 'full' ? 1 : (scope === 'shadow' ? 10 : 100);
  const failedNodes = fails.length * nodeMultiplier;
  const invoiceTotal = failedNodes * audit.target.rate;

  let report = `═══════════════════════════════════════════════════════════════
AUTO-SEED AUDIT REPORT — FLAMING DRAGON METHODOLOGY
═══════════════════════════════════════════════════════════════

TARGET: ${audit.target.name}
DOMAIN: ${audit.target.domain || 'N/A'}
INDUSTRY: ${audit.target.industry.toUpperCase()}
SCOPE: ${audit.target.scope.toUpperCase()}
RATE: $${audit.target.rate}/node

STARTED: ${audit.started}
COMPLETED: ${audit.completed}
AUDITOR: David Wise · TriPod LLC · TOPH v9.0

═══ RESULTS ═══

CHECKS FAILED: ${fails.length}
CHECKS PASSED: ${pass.length}
FAILURE RATE: ${entries.length > 0 ? ((fails.length / entries.filter(([,v])=>v.status).length) * 100).toFixed(1) : 0}%
NODES AFFECTED: ${failedNodes.toLocaleString()} / 3,002
FORMULA: 10×10×10×3+2 = 3,002 (TERRA STANDARD)

═══ FAILURES ═══
`;

  SHADOWS.forEach(shadow => {
    const sf = fails.filter(([k]) => k.startsWith(shadow.id));
    if (sf.length > 0) {
      report += `\n${shadow.id} · ${shadow.name} (${sf.length} failures)\n`;
      report += `Description: ${shadow.desc}\n`;
      sf.forEach(([k, v]) => {
        report += `  ${k}: FAIL${v.evidence ? ' — ' + v.evidence : ''}\n`;
      });
    }
  });

  report += `
═══ INVOICE ═══

${failedNodes.toLocaleString()} failed nodes × $${audit.target.rate.toFixed(2)} = $${invoiceTotal.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}

Payable to: TriPod LLC · David Wise, Principal
Terms: Net 90
Basis: TOPH v9.0 · Terra Standard · 10×10×10×3+2 = 3,002

${audit.target.notes ? 'NOTES: ' + audit.target.notes + '\n' : ''}
═══════════════════════════════════════════════════════════════
ANTI-PATRICIA SEED · CLOSED AT CREATION · VERIFIED BOTH SIDES
TERRA STANDARD · TRIPOD LLC · ${new Date().getFullYear()}
═══════════════════════════════════════════════════════════════`;

  document.getElementById('exportText').value = report;
}

function copyExport() {
  const text = document.getElementById('exportText');
  text.select();
  document.execCommand('copy');
  alert('Report copied to clipboard.');
}

function resetAll() {
  audit = { target: {}, results: {}, started: null, completed: null };
  document.getElementById('stTarget').textContent = 'NONE';
  document.getElementById('stChecked').textContent = '0/0';
  document.getElementById('stFails').textContent = '0';
  document.getElementById('stPass').textContent = '0';
  document.getElementById('targetName').value = '';
  document.getElementById('targetDomain').value = '';
  document.getElementById('targetNotes').value = '';
  document.getElementById('exportArea').style.display = 'none';
  showPhase(1);
}
</script>
