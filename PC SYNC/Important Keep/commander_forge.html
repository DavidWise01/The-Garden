let deck = [];
let commander = null;

const TAGS = {
  landfall: ['landfall','when a land','whenever a land enters','land entering','lands enter'],
  ramp: ['search your library for a','land card','put it onto the battlefield','add {','mana'],
  removal: ['destroy','exile','damage','fight','-1/-1','sacrifice'],
  draw: ['draw a card','draw cards','draw two','draw three','scry'],
  protection: ['hexproof','indestructible','shroud','ward','protection from','totem armor'],
  token: ['create a','token','creature token'],
  recursion: ['return.*from.*graveyard','graveyard to','reanimate'],
  buff: ['+1/+1','+2/+2','anthem','all creatures you control get','each creature you control'],
  etb: ['enters the battlefield','enters, ','when.*enters'],
  sacrifice: ['sacrifice a','sac outlet','whenever.*dies','death trigger'],
};

function tagCard(card) {
  const tags = [];
  const text = (card.text || '').toLowerCase();
  const name = card.name.toLowerCase();
  Object.entries(TAGS).forEach(([tag, keywords]) => {
    if (keywords.some(kw => {
      if (kw.includes('.*')) return new RegExp(kw).test(text);
      return text.includes(kw) || name.includes(kw);
    })) tags.push(tag);
  });
  return tags;
}

function synergyScore(a, b) {
  const at = a.tags || [], bt = b.tags || [];
  let score = 0;
  // Landfall + ramp = strong
  if (at.includes('landfall') && bt.includes('ramp')) score += 3;
  if (at.includes('ramp') && bt.includes('landfall')) score += 3;
  // ETB + recursion
  if (at.includes('etb') && bt.includes('recursion')) score += 2;
  if (at.includes('recursion') && bt.includes('etb')) score += 2;
  // Token + buff
  if (at.includes('token') && bt.includes('buff')) score += 2;
  if (at.includes('buff') && bt.includes('token')) score += 2;
  // Sacrifice + recursion
  if (at.includes('sacrifice') && bt.includes('recursion')) score += 2;
  // Draw + anything
  if (at.includes('draw') || bt.includes('draw')) score += 1;
  // Same tag overlap
  const overlap = at.filter(t => bt.includes(t));
  score += overlap.length;
  return Math.min(score, 10);
}

function loadDeck(id) {
  if (id === 'toph') {
    deck = TOPH_DECK.map((c, i) => ({...c, id: i, tags: tagCard(c)}));
    commander = deck.find(c => c.commander);
  } else {
    deck = [];
    commander = null;
  }
  refreshAll();
}

function addCard(name) {
  if (!name.trim()) return;
  const type = document.getElementById('add-type').value;
  const cmc = parseInt(document.getElementById('add-cmc').value) || 0;
  const colors = document.getElementById('add-colors').value;
  const card = {name: name.trim(), type, cmc, colors, text: '', power: 0, toughness: 0, id: Date.now(), tags: []};
  card.tags = tagCard(card);
  deck.push(card);
  document.getElementById('add-input').value = '';
  refreshAll();
}

function removeCard(id) {
  deck = deck.filter(c => c.id !== id);
  if (commander && commander.id === id) commander = null;
  refreshAll();
}

function setCommander(id) {
  deck.forEach(c => c.commander = false);
  const card = deck.find(c => c.id === id);
  if (card) { card.commander = true; commander = card; }
  refreshAll();
}

// ═══ COLORS ═══
const CC = {W:'var(--W)',U:'var(--U)',B:'var(--B)',R:'var(--R)',G:'var(--G)',C:'var(--C)',M:'var(--M)'};
function colorDot(c) {
  if (!c) return '<span style="color:var(--L)">◆</span>';
  return c.split('').map(x => `<span style="color:${CC[x]||'var(--t)'}">●</span>`).join('');
}

// ═══ REFRESH ═══
function refreshAll() {
  renderDeckList();
  renderForgeMain();
  renderForgeStats();
  renderMirror();
  renderAnalysis();
  updateVitals();
}

function updateVitals() {
  document.getElementById('v-cmdr').textContent = commander ? commander.name : '—';
  document.getElementById('v-cards').textContent = deck.length;
  const lands = deck.filter(c => c.type === 'Land');
  document.getElementById('v-lands').textContent = lands.length;
  const nonlands = deck.filter(c => c.type !== 'Land');
  const avg = nonlands.length ? (nonlands.reduce((s, c) => s + c.cmc, 0) / nonlands.length).toFixed(2) : '—';
  document.getElementById('v-cmc').textContent = avg;
  const lf = deck.filter(c => c.tags && c.tags.includes('landfall'));
  document.getElementById('v-lf').textContent = lf.length;

  // Total synergy
  let totalSyn = 0, pairs = 0;
  for (let i = 0; i < deck.length; i++) for (let j = i + 1; j < deck.length; j++) { totalSyn += synergyScore(deck[i], deck[j]); pairs++; }
  document.getElementById('v-syn').textContent = pairs ? (totalSyn / pairs).toFixed(1) : '—';

  const cols = new Set();
  deck.forEach(c => (c.colors || '').split('').forEach(x => { if (x) cols.add(x) }));
  document.getElementById('v-colors').innerHTML = [...cols].map(c => `<span style="color:${CC[c]||'var(--t)'}">●</span>`).join('');
  document.getElementById('deck-count').textContent = deck.length + '/100';
}

// ═══ DECK LIST ═══
function renderDeckList() {
  const el = document.getElementById('deck-list');
  const groups = {};
  deck.forEach(c => { const t = c.type || 'Other'; if (!groups[t]) groups[t] = []; groups[t].push(c) });

  const order = ['Creature','Instant','Sorcery','Enchantment','Artifact','Planeswalker','Land'];
  let h = '';
  order.forEach(type => {
    const items = groups[type];
    if (!items) return;
    h += `<div class="cat-g"><div class="cat-gh" onclick="this.nextElementSibling.classList.toggle('open')"><span style="color:var(--ph)">${type}</span><span style="color:var(--td)">${items.length}</span></div>`;
    h += `<div class="cat-gi open">`;
    items.sort((a, b) => a.cmc - b.cmc).forEach(c => {
      const cmdrMark = c.commander ? ' ★' : '';
      h += `<div class="card-row" ondblclick="removeCard(${c.id})" onclick="setCommander(${c.id})" title="Click=Commander, DblClick=Remove">`;
      h += `<span class="cm" style="color:var(--o)">${c.cmc || ''}</span>`;
      h += `<span class="cn" style="color:${c.commander ? 'var(--gold)' : 'var(--w)'}">${c.name}${cmdrMark}</span>`;
      h += `<span class="ct">${colorDot(c.colors)}</span>`;
      h += `</div>`;
    });
    h += `</div></div>`;
  });
  el.innerHTML = h;
}

// ═══ FORGE MAIN — Card Grid ═══
function renderForgeMain() {
  const el = document.getElementById('forge-main');
  let h = '<div style="display:flex;flex-wrap:wrap;gap:6px">';
  deck.forEach(c => {
    const border = c.commander ? 'var(--gold)' : c.tags?.includes('landfall') ? 'var(--gh)' : 'var(--tdd)';
    const bg = c.commander ? 'rgba(212,168,76,.08)' : c.tags?.includes('landfall') ? 'rgba(0,255,102,.04)' : 'rgba(10,5,32,.6)';
    h += `<div style="width:140px;border:1px solid ${border};border-radius:4px;padding:6px;background:${bg};font-size:7px;cursor:pointer;transition:all .2s" ondblclick="removeCard(${c.id})" onmouseenter="showTip(event,${c.id})" onmouseleave="hideTip()">`;
    h += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">`;

function showTip(e, id) {
  const c = deck.find(x => x.id === id);
  if (!c) return;
  const tip = document.getElementById('tooltip');
  tip.innerHTML = `<div style="font-weight:900;color:var(--ph);font-size:10px">${c.name}</div>`;
  tip.innerHTML += `<div style="color:var(--o);margin:2px 0">${c.type} · CMC ${c.cmc} · ${colorDot(c.colors)}</div>`;
  if (c.text) tip.innerHTML += `<div style="color:var(--t);margin-top:4px;line-height:1.5">${c.text}</div>`;
  if (c.tags?.length) tip.innerHTML += `<div style="margin-top:4px;color:var(--ph)">Tags: ${c.tags.join(', ')}</div>`;
  // Top synergies
  const syns = deck.filter(x => x.id !== id).map(x => ({name: x.name, score: synergyScore(c, x)})).filter(s => s.score > 0).sort((a, b) => b.score - a.score).slice(0, 5);
  if (syns.length) {
    tip.innerHTML += `<div style="margin-top:4px;font-weight:700;color:var(--g)">Top Synergies:</div>`;
    syns.forEach(s => { tip.innerHTML += `<div style="color:var(--t)">${s.name} <span style="color:var(--g);font-weight:700">+${s.score}</span></div>` });
  }
  tip.style.display = 'block';
  tip.style.left = Math.min(e.clientX + 12, window.innerWidth - 270) + 'px';
  tip.style.top = Math.min(e.clientY + 12, window.innerHeight - 200) + 'px';
}
function hideTip() { document.getElementById('tooltip').style.display = 'none' }

// ═══════════════════════════════════════════════════════════
// ⚡ ELECTROMAGNETIC SYNERGY FIELD
// ═══════════════════════════════════════════════════════════
let fieldRunning = false;

function startField() {
  if (fieldRunning) return;
  fieldRunning = true;

  const cv = document.getElementById('field-cv');
  const W = cv.parentElement.clientWidth, H = cv.parentElement.clientHeight;
  cv.width = W; cv.height = H;
  const cx = cv.getContext('2d');

  let t = 0;
  let mouseX = W/2, mouseY = H/2;
  cv.addEventListener('mousemove', e => { const r = cv.getBoundingClientRect(); mouseX = e.clientX - r.left; mouseY = e.clientY - r.top });

  function draw() {
    cx.fillStyle = 'rgba(6,3,24,.15)';
    cx.fillRect(0, 0, W, H);

    if (!deck.length) {
      cx.fillStyle = 'rgba(170,51,255,.3)';
      cx.font = '900 14px Orbitron';
      cx.textAlign = 'center';
      cx.fillText('LOAD A DECK TO ACTIVATE FIELD', W/2, H/2);
      t++;
      requestAnimationFrame(draw);
      return;
    }

    // Position cards as particles
    const nonlands = deck.filter(c => c.type !== 'Land');
    const total = nonlands.length || 1;
    const cx2 = W / 2, cy2 = H / 2;

    nonlands.forEach((card, i) => {
      if (!card._x) {
        const angle = (i / total) * Math.PI * 2;
        const r = 120 + card.cmc * 25;
        card._x = cx2 + Math.cos(angle) * r;
        card._y = cy2 + Math.sin(angle) * r;
        card._vx = 0; card._vy = 0;
      }

      // Orbit
      const angle = Math.atan2(card._y - cy2, card._x - cx2);
      const dist = Math.hypot(card._x - cx2, card._y - cy2);
      const targetR = 100 + card.cmc * 22;
      const orbitSpeed = 0.003 + (card.tags?.includes('landfall') ? 0.002 : 0);

      card._x += Math.cos(angle + Math.PI/2) * orbitSpeed * dist * 0.3;
      card._y += Math.sin(angle + Math.PI/2) * orbitSpeed * dist * 0.3;

      // Pull toward target radius
      const rDiff = targetR - dist;
      card._x += Math.cos(angle) * rDiff * 0.01;
      card._y += Math.sin(angle) * rDiff * 0.01;

      // Mouse gravity
      const mdx = mouseX - card._x, mdy = mouseY - card._y;
      const mdist = Math.hypot(mdx, mdy);
      if (mdist < 150 && mdist > 5) {
        card._x += mdx * 0.003;
        card._y += mdy * 0.003;
      }

      // Draw synergy connections
      nonlands.forEach((other, j) => {
        if (j <= i) return;
        const score = synergyScore(card, other);
        if (score < 2) return;
        const alpha = Math.min(score * 0.04, 0.3);
        const hue = score > 5 ? '170,51,255' : score > 3 ? '0,204,68' : '136,136,136';
        cx.strokeStyle = `rgba(${hue},${alpha})`;
        cx.lineWidth = score * 0.3;
        cx.beginPath();
        cx.moveTo(card._x, card._y);

        // Electromagnetic curve
        const mx = (card._x + other._x) / 2 + Math.sin(t * 0.02 + i) * score * 5;
        const my = (card._y + other._y) / 2 + Math.cos(t * 0.02 + j) * score * 5;
        cx.quadraticCurveTo(mx, my, other._x, other._y);
        cx.stroke();
      });
    });

    // Draw card particles
    nonlands.forEach((card, i) => {
      const isLF = card.tags?.includes('landfall');
      const isCmdr = card.commander;
      const pulse = Math.sin(t * 0.04 + i) * 0.3 + 0.7;
      const size = 3 + card.cmc * 0.8;

      if (isCmdr) {
        cx.fillStyle = `rgba(212,168,76,${pulse})`;
        cx.shadowColor = '#d4a84c'; cx.shadowBlur = 16;
      } else if (isLF) {
        cx.fillStyle = `rgba(0,255,102,${pulse * 0.8})`;
        cx.shadowColor = '#00ff66'; cx.shadowBlur = 10;
      } else {
        cx.fillStyle = `rgba(170,51,255,${pulse * 0.6})`;
        cx.shadowColor = '#aa33ff'; cx.shadowBlur = 6;
      }

      cx.beginPath(); cx.arc(card._x, card._y, size, 0, Math.PI * 2); cx.fill();
      cx.shadowBlur = 0;

      // Label
      cx.fillStyle = `rgba(238,232,255,${pulse * 0.5})`;
      cx.font = `${isCmdr ? '700' : '400'} 7px JetBrains Mono`;
      cx.textAlign = 'center';
      cx.fillText(card.name.length > 18 ? card.name.slice(0,16)+'…' : card.name, card._x, card._y + size + 10);
    });

    // Commander glow at center
    if (commander) {
      const grd = cx.createRadialGradient(cx2, cy2, 0, cx2, cy2, 80);
      grd.addColorStop(0, 'rgba(212,168,76,.08)');
      grd.addColorStop(1, 'transparent');
      cx.fillStyle = grd;
      cx.beginPath(); cx.arc(cx2, cy2, 80, 0, Math.PI * 2); cx.fill();

      cx.fillStyle = 'rgba(212,168,76,.4)';
      cx.font = '900 10px Cinzel';
      cx.textAlign = 'center';
      cx.fillText(commander.name, cx2, cy2 + 4);
    }

    // EM wave rings
    for (let i = 0; i < 3; i++) {
      const r = ((t * 0.5 + i * 80) % 300) + 50;
      const alpha = Math.max(0, (1 - r / 350) * 0.1);
      cx.strokeStyle = `rgba(170,51,255,${alpha})`;
      cx.lineWidth = 1;
      cx.beginPath(); cx.arc(cx2, cy2, r, 0, Math.PI * 2); cx.stroke();
    }

    // HUD
    cx.fillStyle = 'rgba(170,51,255,.35)';
    cx.font = '900 10px Orbitron';
    cx.textAlign = 'left';
    cx.fillText('SYNERGY FIELD', 16, 24);
    cx.fillStyle = 'rgba(136,119,170,.25)';
    cx.font = '300 7px JetBrains Mono';
    cx.fillText(`${nonlands.length} cards · Mouse = observer gravity · Connections = synergy strength`, 16, 36);

    // Legend
    cx.fillStyle = 'rgba(212,168,76,.4)'; cx.beginPath(); cx.arc(W - 100, 16, 4, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = 'rgba(212,168,76,.3)'; cx.font = '300 7px JetBrains Mono'; cx.textAlign = 'left';
    cx.fillText('Commander', W - 90, 19);
    cx.fillStyle = 'rgba(0,255,102,.4)'; cx.beginPath(); cx.arc(W - 100, 28, 4, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = 'rgba(0,255,102,.3)'; cx.fillText('Landfall', W - 90, 31);
    cx.fillStyle = 'rgba(170,51,255,.4)'; cx.beginPath(); cx.arc(W - 100, 40, 4, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = 'rgba(170,51,255,.3)'; cx.fillText('Other', W - 90, 43);

    t++;
    requestAnimationFrame(draw);
  }

  draw();
}

// ═══ TAB SWITCH ═══
function sw(tab) {
  document.querySelectorAll('.tab').forEach((x, i) => x.classList.toggle('on', ['field','forge','mirror','analysis'][i] === tab));
  document.querySelectorAll('.pane').forEach((x, i) => x.classList.toggle('on', ['field','forge','mirror','analysis'][i] === tab));
  if (tab === 'field') startField();
}

// ═══ INIT ═══
loadDeck('toph');
startField();
</script>
