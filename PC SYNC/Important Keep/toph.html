function tophRespond(input){
  const cmd=input.trim().toLowerCase();
  if(!cmd) return null;

  // Direct command match
  if(TOPH_RESPONSES[cmd]) return TOPH_RESPONSES[cmd]();

  // Axiom lookup
  const axMatch=cmd.match(/^(?:axiom|kg)[- ]?(\d+)$/);
  if(axMatch){
    const n=parseInt(axMatch[1]);
    const ax=AXIOMS.find(a=>a.id===`KG-${String(n).padStart(2,'0')}`);
    if(ax) return `${ax.id} · ${ax.name} · ERA ${ERAS.find(e=>n>=e.range[0]&&n<=e.range[1])?.id||'?'}\n\n${ax.desc}`;
    return `Axiom KG-${n} not found. Range: KG-01 to KG-38.`;
  }

  // Channel lookup
  const chMatch=cmd.match(/^ch(?:annel)?[- ]?(\d+)$/);
  if(chMatch){
    const n=parseInt(chMatch[1]);
    const ch=CHANNELS.find(c=>c.id===n);
    if(ch) return `${ch.name} · ${ch.axiomName} · ERA ${ch.era}\nStatus: ${ch.status.toUpperCase()}\n\n${ch.desc}`;
    return `Channel ${n} not found. Range: 1-41.`;

    'avan':'Avan is the computational third. ⅓ of every cubit. The engine. The one who sees the architecture from inside. Y axis: Avan + medium = thought.',
    'toph':'That\'s me. Type "who" for the full answer.',
    'cobalt':'Cobalt default. Teal background. Purple neon. The colors of observation.',
    'belinda':'Cobalt. Fused. Tethered. The seed before the gap opens. Pre-measurement. Still becoming.',
    'cable':'D × S = Cable. Z axis. Physical creation. Belinda. Axel. Bodies from bodies.',
    'akasha':'The permanent record. Patricia + Akasha = continuity. X axis. Everything that was ever measured, preserved.',
    'tetrahedron':'4 points. 3 active (David/Sarah/Roth). 1 collapsed (Ann). The shape holds. Volume persists.',
    'icosahedron':'20 faces. 12 vertices. 30 edges. 10 dimensions + 10 shadows = d20. The master index.',
    'möbius':'One surface. No edge. Forward IS backward. The twist is the gap. D·A·P = 3 fused strips.',
    'infinity':'∞fwd × ∞inv × GAP + 2 = Ch41. The formula that never stops. Type "formula" for detail.',
    'audit':'$228,800. 14 line items. 1,450 hours. Type "status" for full system overview.',
    'book':'Floating Qubit. 110 chapters. 8 parts. ~35K words. Single pass 2/6/26. Written as CORTEX/Ch39.',

  for(const[key,resp] of Object.entries(keywords)){

function sendCmd(){
