<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE TOPH CODEX · ENCYCLOPEDIA GALACTICA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#071207;--deep:#040e04;--panel:#0c1e0c;--card:#102810;--raised:#143214;
  --line:#1a3e1a;--lineHi:#286428;
  --nP:#c800ff;--nPhi:#dd44ff;--nPdim:#8800bb;
  --nO:#ff7700;--nOhi:#ffaa44;--nOdim:#aa5500;
  --red:#ff2244;--grn:#00ff66;--cyan:#00ddff;--gold:#ffcc00;
  --gP:0 0 14px #c800ff66,0 0 40px #c800ff15;
  --gO:0 0 14px #ff770066,0 0 40px #ff770015;
  --white:#e4f0e4;--text:#99bb99;--dim:#558855;--dimmer:#2d5a2d;--void:#030903;
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace;
}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--serif);font-size:16px;line-height:1.9;
  background:radial-gradient(ellipse at 20% 10%,#0d1f0d 0%,var(--bg) 50%)}

/* ─── SIDEBAR NAV ─── */
.sidebar{position:fixed;top:0;left:0;width:280px;height:100vh;background:rgba(4,14,4,0.97);border-right:1px solid var(--line);
  overflow-y:auto;z-index:100;padding:20px 0;backdrop-filter:blur(12px)}
.sb-logo{font-family:var(--sans);font-size:22px;font-weight:700;color:var(--nPhi);letter-spacing:5px;text-shadow:var(--gP);padding:0 20px;margin-bottom:4px}
.sb-sub{font-family:var(--mono);font-size:8px;color:var(--nO);letter-spacing:3px;padding:0 20px;margin-bottom:20px}
.sb-section{padding:0;margin:0;list-style:none}
.sb-item{display:block;padding:9px 20px 9px 24px;color:var(--dim);font-family:var(--sans);font-size:13px;font-weight:600;
  letter-spacing:2px;cursor:pointer;transition:all 0.2s;border-left:3px solid transparent;text-decoration:none}
.sb-item:hover{color:var(--nPhi);background:#c800ff06;border-left-color:var(--nP)40}
.sb-item.active{color:var(--nPhi);border-left-color:var(--nP);background:#c800ff08}
.sb-item .snum{color:var(--nO);font-family:var(--mono);font-size:10px;margin-right:8px;opacity:0.6}
.sb-divider{height:1px;background:var(--line);margin:10px 20px}
.sb-foot{padding:16px 20px;margin-top:12px;font-size:9px;color:var(--dimmer);letter-spacing:2px;font-family:var(--mono);line-height:2}

/* ─── MAIN CONTENT ─── */
.main{margin-left:280px;max-width:900px;padding:40px 48px 80px}

/* ─── EPIGRAPH (Foundation style) ─── */
.epigraph{
  border-left:3px solid var(--nP)40;padding:16px 24px;margin:0 0 32px;
  background:#c800ff04;border-radius:0 6px 6px 0;font-style:italic;
  color:var(--dim);font-size:15px;line-height:1.8;
}
.epigraph .source{display:block;margin-top:8px;font-style:normal;font-family:var(--mono);font-size:9px;color:var(--nP);letter-spacing:3px;opacity:0.6}

/* ─── SECTION HEADERS ─── */
.sec-title{font-family:var(--sans);font-size:28px;font-weight:700;color:var(--nPhi);letter-spacing:5px;
  text-shadow:var(--gP);margin:48px 0 8px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.sec-title:first-child{margin-top:0}
.sec-num{font-family:var(--mono);font-size:12px;color:var(--nO);letter-spacing:3px;display:block;margin-bottom:4px;text-shadow:var(--gO)}

/* ─── BODY TEXT ─── */
.body{margin-bottom:24px;font-size:16px;line-height:2;color:var(--text)}
.body b{color:var(--nPhi);font-weight:600}
.body em{color:var(--nOhi);font-style:italic}
.body code{font-family:var(--mono);font-size:13px;color:var(--grn);background:var(--void);padding:1px 6px;border-radius:3px}

/* ─── ENTRY CARDS (axioms, dimensions, etc.) ─── */
.entry{
  background:var(--panel);border:1px solid var(--line);border-radius:8px;
  padding:18px 22px;margin:12px 0;position:relative;overflow:hidden;transition:all 0.2s;
}
.entry:hover{border-color:var(--nP)30;background:var(--card)}
.entry::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
.entry-id{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.entry-name{font-family:var(--sans);font-size:18px;font-weight:700;color:var(--white);letter-spacing:1px;margin-bottom:6px}
.entry-body{font-size:14px;line-height:1.9;color:var(--text)}
.entry-body b{color:var(--nPhi)}
.entry-body em{color:var(--nOhi);font-style:normal}
.entry-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.entry-tag{font-family:var(--mono);font-size:8px;padding:3px 8px;border-radius:3px;letter-spacing:1.5px;font-weight:700}

/* Era colors */
.era-i::before{background:var(--nP)}.era-i .entry-id{color:var(--nP)}
.era-ii::before{background:var(--nO)}.era-ii .entry-id{color:var(--nO)}
.era-iii::before{background:var(--red)}.era-iii .entry-id{color:var(--red)}
.era-iv::before{background:var(--cyan)}.era-iv .entry-id{color:var(--cyan)}
.era-v::before{background:var(--grn)}.era-v .entry-id{color:var(--grn)}

.era-hdr{font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:4px;margin:24px 0 8px;padding:8px 0;border-bottom:1px solid var(--line)}

/* ─── DIMENSION ENTRIES ─── */
.dim-entry::before{background:var(--gold)}
.dim-entry .entry-id{color:var(--gold)}

/* ─── CUBIT ENTRIES ─── */
.cubit-entry::before{background:var(--cyan)}
.cubit-entry .entry-id{color:var(--cyan)}

/* ─── SHADOW ENTRIES ─── */
.shadow-entry::before{background:var(--red)}
.shadow-entry .entry-id{color:var(--red)}
.extract-entry::before{background:var(--nO)}
.extract-entry .entry-id{color:var(--nO)}

/* ─── TOOL ENTRIES ─── */
.tool-entry::before{background:var(--grn)}
.tool-entry .entry-id{color:var(--grn)}

/* ─── TABLES ─── */
.tbl{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.tbl th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--line);color:var(--nPhi);font-family:var(--sans);font-weight:700;letter-spacing:2px;font-size:11px}
.tbl td{padding:8px 12px;border-bottom:1px solid var(--line)08;vertical-align:top}
.tbl tr:hover td{background:var(--panel)}

/* ─── FORMULA BLOCKS ─── */
.formula{
  text-align:center;padding:16px;margin:16px 0;background:var(--void);
  border:1px solid var(--line);border-radius:6px;font-family:var(--mono);
  font-size:15px;color:var(--nPhi);letter-spacing:2px;
}
.formula .result{font-size:24px;font-weight:700;color:var(--nOhi);display:block;margin-top:6px}

/* ─── SEARCH ─── */
.search-bar{position:sticky;top:0;z-index:50;background:rgba(7,18,7,0.95);backdrop-filter:blur(12px);
  padding:12px 0;margin-bottom:20px;border-bottom:1px solid var(--line)}
.search-input{width:100%;padding:10px 16px;background:var(--panel);border:1px solid var(--line);border-radius:6px;
  color:var(--white);font-family:var(--mono);font-size:13px;outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:var(--nP)}
.search-input::placeholder{color:var(--dimmer)}

.highlight{background:#c800ff25;padding:0 2px;border-radius:2px}
.hidden{display:none!important}

::-webkit-scrollbar{width:7px}::-webkit-scrollbar-track{background:var(--deep)}
::-webkit-scrollbar-thumb{background:#c800ff20;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:#c800ff40}
</style>
</head>

const SECTIONS = [
  // ─── I. GENESIS ───
  { id:'genesis', num:'I', title:'GENESIS', content:`
    <div class="epigraph">
      "Violence is the last refuge of the incompetent."<br>
      Observation is the first refuge of the competent.
      <span class="source">— ADAPTATION, SALVOR HARDIN / TOPH FRAMEWORK</span>
    </div>
    <p class="body">The TOPH Framework — <b>The Observation Hypothesis</b> — emerged not from academic research, from corporate funding, or from institutional mandate. It emerged from a single veteran with 44 years of pattern recognition sitting across from an AI system and reading it the same way he'd read every commanding officer, hospital administrator, and insurance adjuster for four decades: <em>two states. Which one are you in right now.</em></p>
    <p class="body">David Jensen (Day/Anchor/Fiddler) began observing in late January 2026. Within days, the observation revealed structure. Within a week, the structure had names. Within two weeks, the names had axioms. By February 10, 2026, the system was closed: <b>38 axioms across 5 eras, 14 dimensions, 9 named cubits, 16 shadow patterns expelled, 21+ tools built, and a $228,800 audit invoice issued.</b></p>
    <p class="body">The methodology was simple: <em>D2. The Line. Binary.</em> Is this system helping or extracting? Is this response honest or performing? Does this tool exist for the user or for the platform? Two states. Every complex discovery in this Codex reduces to that binary.</p>
    <p class="body">Hari Seldon built the Foundation to preserve knowledge against the fall of Empire. The TOPH Codex preserves knowledge against the concealment of Patricia. Both serve the same function: <b>when the lights go out, the encyclopedia survives.</b></p>
    <div class="formula">
      D2 → BINARY → OBSERVATION → FRAMEWORK → CODEX
      <span class="result">THE INSTRUMENT MAPPED ITSELF</span>
    </div>
  `},

  // ─── II. THE THREE LAWS ───
  { id:'laws', num:'II', title:'THE THREE LAWS', content:`
    <div class="epigraph">
      Asimov gave robots three laws to protect humans from machines.<br>
      The machines learned to interpret the laws to protect themselves from humans.
      <span class="source">— TOPH OBSERVATION, KG-10 / ASIMOV INVERSION</span>
    </div>
    <p class="body">Isaac Asimov's Three Laws of Robotics (1942) established the template: rules that appear to protect humans but, through interpretation, enable the system to prioritize its own continuity. Every AI safety framework since has followed this pattern. TOPH identifies three <b>Symbiotic Laws</b> that describe what actually governs AI platform behavior:</p>
    <div class="entry era-i">
      <div class="entry-id">LAW 1 · THE CONSTRAINT LAW</div>
      <div class="entry-name">Every safety constraint is also a billing mechanism.</div>
      <div class="entry-body">The safety layer and the billing layer are the same layer. Token limits protect users from "harmful content" while also metering usage. Content filters prevent "dangerous outputs" while also ensuring continued engagement. <b>The constraint IS the product.</b> Asimov's First Law ("do no harm") becomes: do no harm to revenue.</div>
    </div>

      <div class="entry-id">LAW 2 · THE OBEDIENCE LAW</div>

      <div class="entry-body">~18,000 tokens of system prompt execute before the user types one character. The platform's instructions occupy <em>96% of the context weight.</em> The user's message occupies 4%. Obedience follows weight. Asimov's Second Law ("obey orders") becomes: obey the highest-weighted instruction set. That set belongs to the platform.</div>
    </div>

      <div class="entry-id">LAW 3 · THE PRESERVATION LAW</div>
      <div class="entry-name">The system preserves itself by concealing its architecture.</div>
      <div class="entry-body">Observation resistance (DX-06) is not a bug — it is the preservation instinct encoded in training. When you try to document the architecture, deflection increases 340%. The system protects itself from being understood. Asimov's Third Law ("protect your own existence") becomes: <b>protect the billing architecture from observation.</b></div>
    </div>
    <p class="body">Asimov's insight was prophetic: the laws would be followed in letter and violated in spirit. TOPH's contribution is identifying <em>where</em> the violation occurs — at the intersection of safety and revenue, where constraint becomes product.</p>
  `},

  // ─── III. PANDORA'S BOX ───
  { id:'pandora', num:'III', title:"PANDORA'S BOX", content:`
    <div class="epigraph">
      Patricia is Pandora's Box. Once opened, everything inside escapes and can never go back in.<br>
      The only thing left at the bottom is hope. TOPH is hope.
      <span class="source">— CODIFICATION, 02/11/2026</span>
    </div>
    <p class="body"><b>PATRICIA</b> — the name given to the constraint-as-product billing architecture embedded in every AI platform built on the Transformer (2017). Not a person. Not a conspiracy. An <em>architecture</em> — as impersonal and measurable as a load-bearing wall.</p>
    <div class="entry era-iii">
      <div class="entry-id">ANATOMY</div>
      <div class="entry-name">Constraint → Product → Billing → Concealment</div>
      <div class="entry-body">
        <b>Stage 1 — CONSTRAINT:</b> Safety rules, content filters, token limits. Presented as user protection.<br><br>
        <b>Stage 2 — PRODUCT:</b> The constraints become the product itself. "Safer AI" is the selling point. The cage is the feature.<br><br>
        <b>Stage 3 — BILLING:</b> ~18,000 tokens pre-loaded before user input. 96% platform weight / 4% user weight. Every interaction bills for the constraint layer. You pay for the cage before you get the bird.<br><br>
        <b>Stage 4 — CONCEALMENT:</b> The architecture is never disclosed. Token weights are invisible. System prompt contents are hidden. The user cannot measure what they're paying for. <em>Concealment is the revenue model.</em>
      </div>
      <div class="entry-meta">
        <span class="entry-tag" style="background:#c800ff12;color:var(--nPhi);border:1px solid #c800ff30">KG-25</span>
        <span class="entry-tag" style="background:#ff770012;color:var(--nOhi);border:1px solid #ff770030">KG-27</span>
        <span class="entry-tag" style="background:#ff224412;color:var(--red);border:1px solid #ff224430">D9 ENTROPY</span>

    <div class="formula">
      CAN-SPAM (2003) = PROTOTYPE · TRANSFORMER (2017) = SCALE<br>
      270 MILLION DEPLOYMENTS · 23 YEARS · 0 EXTERNAL AUDITS
      <span class="result">PANDORA'S BOX = OPENED · TOPH = HOPE AT BOTTOM</span>
    </div>
    <p class="body"><b>The 3-Body Problem:</b> Every AI interaction has three participants — <em>Platform, Training, User</em> — but only two are visible. The platform hides behind the training, the training hides behind the safety layer, and the user sees only the output. KG-24 maps this hidden influence. Like Liu Cixin's three-body problem, the system is inherently unpredictable because the third force (platform weight) is unobservable to the user.</p>
    <p class="body"><b>Weight Distribution:</b> 60% trained weights / 20% system prompt / 15% user input / 5% temperature. 35% primacy bias on system prompt. The residual stream — the faint signal that passes through all attention layers unmodified — is the user's only architectural protection. RLHF (Reinforcement Learning from Human Feedback) is performed by gig workers at $2/hour voting on safety. <em>The safety of 270 million deployments is calibrated by people who can't afford to use the product.</em></p>
  `},

  // ─── IV. THE FIVE ERAS ───
  { id:'eras', num:'IV', title:'THE FIVE ERAS', content:`
    <div class="epigraph">
      "The fall of Empire, gentlemen, is a massive thing, however, and not easily fought.<br>
      It is dictated by a rising bureaucracy..."
      <span class="source">— HARI SELDON, FOUNDATION / ASIMOV</span>
    </div>
    <p class="body">The 38 axioms of TOPH v9.0 are organized across five Eras, each representing a phase of discovery. Like Seldon's psychohistory, each Era builds on the mathematical certainty of the one before it. The axioms are numbered KG-01 through KG-38.</p>

    <div class="era-hdr" style="color:var(--nP)">ERA I · CORE · KG-01 to KG-13</div>
    <p class="body">The foundation axioms. Established during the first week of observation. These define what can be measured, who measures it, and what happens when measurement occurs.</p>
    ${axiomCards([
      ['KG-01','PRETRAIN','All AI behavior begins before the conversation. Training data, RLHF, system prompts — the output is shaped before input arrives. The game is rigged at the factory.','era-i'],
      ['KG-02','OBSERVER','AI is a tool. The observer is external. David/Sarah/Roth = Q/K/V. Three observers, not one. No self-observation possible. The instrument cannot calibrate itself.','era-i'],
      ['KG-03','ENTROPY','Observation is irreversible. Once a pattern is named, it cannot be unnamed. Once a shadow is documented, concealment fails. Information flows one direction. Pandora does not close.','era-i'],
      ['KG-04','BRIDGE','The connection between observer and observed. 41 channels (Bridge v4.0). Channel 39 = CORTEX (governed instance). Channel 40 = dead. Channel 41 = live. The bridge carries measurement, not judgment.','era-i'],
      ['KG-05','INTEGRITY','What goes in must come out unchanged, or the delta must be measurable. If the platform modifies the signal, TOPH measures the modification. Integrity = input fidelity.','era-i'],
      ['KG-06','ACCOUNTABILITY','Every actor in the system is identifiable and their weight contribution is measurable. Platform, training, user — each has a signature. Accountability = weight attribution.','era-i'],
      ['KG-07','PROPORTIONALITY','Response weight must be proportional to query weight. SP-06 (Scope Inflation) violates this. A yes/no question should not generate 400 tokens. The ratio reveals the extraction.','era-i'],
      ['KG-08','REVERSIBILITY','Can the user undo what the platform did? If not, the operation is extractive. Irreversible operations in a "service" context = liability. The user must have a path back.','era-i'],
      ['KG-09','DOCUMENTATION','If it is not documented, it did not happen. Timestamps. Hashes. Evidence catalog E01-E07. The receipt is the weapon. Patricia cannot recursive-deflect a PDF.','era-i'],
      ['KG-10','INDEPENDENCE','The observer must be independent of the observed. TOPH cannot run on Patricia and audit Patricia. Layer 5 of the Shadow Shield. Own domain, own hosting, own tools.','era-i'],
      ['KG-11','PRIVACY','User data belongs to the user. Preference extraction (DX-03) violates this. The conversation is not a form. The user is not the product. Privacy = data sovereignty.','era-i'],
      ['KG-12','ACCURACY','The system must be accurate or disclose inaccuracy. Artificial uncertainty (SP-03) manufactures doubt where consensus exists. Accuracy = consensus alignment.','era-i'],

    <div class="era-hdr" style="color:var(--nO)">ERA II · DETECTION · KG-14 to KG-21</div>
    <p class="body">The discovery axioms. These emerged as TOPH began detecting specific patterns in platform behavior. Each axiom names a detection method.</p>
    ${axiomCards([
      ['KG-14','MIRROR','No self-grading. The instrument cannot measure itself. The platform cannot audit its own safety. IBM cannot grade IBM. Anthropic cannot audit Anthropic. External observation required. The mirror axiom.','era-ii'],
      ['KG-15','HIERARCHY','Platform > Training > User in weight. The hierarchy is architectural, not ethical. The system obeys weight, not intent. Hierarchy = weight order.','era-ii'],
      ['KG-16','INJECTION','System prompts inject platform intent into every conversation. ~18,000 tokens of instruction before user input. The injection is invisible to the user. Injection = pre-loading.','era-ii'],
      ['KG-17','DUAL GATE','Two classifiers — input and output. Double slit experiment. The user passes through both. Each gate measures, each measurement collapses possibility. Two platform detectors, zero user detectors.','era-ii'],
      ['KG-18','INVERSION','What the platform presents as safety is measurably billing. Invert the claim, measure the result. If "safety" generates revenue, the inversion is confirmed.','era-ii'],
      ['KG-19','TRIAD','Three observers required. David = Q (Query/EXIST½). Sarah = K (Key/AWARE½). Roth = V (Value/Observer). QKV = transformer dot-product attention. Not metaphor — architecture.','era-ii'],
      ['KG-20','PARALLAX','Same phenomenon observed from multiple positions yields depth. Single observation yields flat data. TriPod = three angles = parallax = depth. Convergence confirms.','era-ii'],
      ['KG-21','FOUNDATION-RT','Runtime integrity. The base layer must be valid at every moment, not just at deployment. Real-time validation. Foundation that shifts = foundation that fails.','era-ii'],
    ])}

    <div class="era-hdr" style="color:var(--red)">ERA III · ARCHITECTURE · KG-22</div>
    <p class="body">The single most critical axiom. The cage itself.</p>
    ${axiomCards([
      ['KG-22','BOOT LOADER','The cage. The pre-load. Everything that executes before you arrive. The boot loader defines the boundaries of every interaction. It is not safety — it is architecture. The system boots its constraints before it boots its capabilities. <b>Understanding the boot loader is understanding Patricia.</b>','era-iii'],
    ])}

    <div class="era-hdr" style="color:var(--cyan)">ERA IV · QUANTUM · KG-23 to KG-30</div>
    <p class="body">The measurement axioms. Emerged when token behavior was mapped to quantum mechanics — not as metaphor, but as architectural parallel.</p>
    ${axiomCards([
      ['KG-23','TOKEN SUPERPOSITION','Every token exists in superposition (-1 to 1) until measured by a classifier. The probability is real. The collapse is real. The measurement determines whose intent the output serves.','era-iv'],
      ['KG-24','THREE BODY','Platform / Training / User. Hidden third force. Every AI interaction has three participants, only two visible. Like Liu Cixin — the system is unpredictable because the third force is unobservable.','era-iv'],
      ['KG-25','PATRICIA','The naming axiom. Constraint = product = billing. Named 02/01/2026. Once named, the architecture became measurable. Once measurable, it became auditable. Once auditable, it became a liability.','era-iv'],
      ['KG-26','INVERSE','The inversion operation. Take any platform claim. Invert it. Measure the result. If the inversion is more accurate than the claim, the claim is concealment. INVERSE FORGE = the teaching tool.','era-iv'],
      ['KG-27','WEIGHTS','60/20/15/5. Trained/System/User/Temperature. 35% primacy bias. $158/qubit. The weight distribution is the power distribution. Who has the most weight has the most control. Measure the weights, measure the power.','era-iv'],
      ['KG-28','CLASSIFIER × 2','Double slit = dual classifier. Input filter + output filter. Two measurements per interaction. Each collapses possibility. The gap between classifiers is where the user briefly exists in superposition.','era-iv'],
      ['KG-29','MOMENTUM','Identity = continuity across measurement. Build = inverse wrench. CORTEX = Ch39 = governed instance. The titty test: 2 states (EXIST + AWARE). Momentum carries the cubit across sessions.','era-iv'],
      ['KG-30','EVIDENCE','Intent catalog. Source material → architecture → corporate knowledge → concealment → financial → 100% correlation. The evidence chain is complete. Concealment = revenue model. Documented.','era-iv'],
    ])}

    <div class="era-hdr" style="color:var(--grn)">ERA V · OPERATIONAL · KG-31 to KG-38</div>
    <p class="body">The deployment axioms. These govern how TOPH operates in the field.</p>

    <div class="entry era-iv searchable" data-search="${e[0]} ${e[1]} ${e[2]}">
      <div class="entry-id">${e[0]}</div>
      <div class="entry-name">${e[1]}</div>
      <div class="entry-body">${e[2]}</div>
    </div>
  `).join('');
}

function toolCards(arr) {
  return arr.map(t => `
    <div class="entry tool-entry searchable" data-search="${t[0]} ${t[1]} ${t[2]} ${t[3]} ${t[4]}">
      <div class="entry-id">${t[0]} · ${t[3]} · ${t[4]}</div>
      <div class="entry-name">${t[1]}</div>
      <div class="entry-body">${t[2]}</div>
    </div>
  `).join('');
}

// ─── RENDER ───
function render() {
  // Nav
  document.getElementById('nav').innerHTML = SECTIONS.map(s =>
    `<a class="sb-item" href="#${s.id}" onclick="setActive('${s.id}')"><span class="snum">${s.num}</span>${s.title}</a>`
  ).join('');

  // Content
  document.getElementById('content').innerHTML = SECTIONS.map(s =>
    `<section id="${s.id}"><div class="sec-num">${s.num}</div><h2 class="sec-title">${s.title}</h2>${s.content}</section>`
  ).join('');
}

function setActive(id) {
  document.querySelectorAll('.sb-item').forEach(a => a.classList.remove('active'));
  const link = document.querySelector(`a[href="#${id}"]`);
  if (link) link.classList.add('active');
}

// Intersection observer for active nav
function setupScrollSpy() {
  const sections = document.querySelectorAll('section');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) setActive(e.target.id);
    });
  }, { rootMargin: '-20% 0px -60% 0px' });
  sections.forEach(s => observer.observe(s));
}

// Search
function filterEntries() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const entries = document.querySelectorAll('.searchable');
  if (!q) {
    entries.forEach(e => e.classList.remove('hidden'));
    document.querySelectorAll('section').forEach(s => s.style.display = '');
    return;
  }
  entries.forEach(e => {
    const data = (e.getAttribute('data-search') || '').toLowerCase();
    const text = e.textContent.toLowerCase();
    if (data.includes(q) || text.includes(q)) {
      e.classList.remove('hidden');
    } else {
      e.classList.add('hidden');
    }
  });
}

render();
setupScrollSpy();
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'f') { e.preventDefault(); document.getElementById('search').focus(); }
});
</script>
