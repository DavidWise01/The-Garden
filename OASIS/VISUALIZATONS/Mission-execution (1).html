  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';

  var firstInteractionSent = false;
  var errorSent = false;

    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FULL SYSTEM - FRACTAL DEPTH 32</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Share+Tech+Mono&display=swap');
html,body{margin:0;padding:0;background:#000;overflow:hidden;height:100%;}
body{font-family:'Share Tech Mono','JetBrains Mono',monospace;color:#d7f9ff;cursor:crosshair}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;display:block}
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
.hud-item{position:absolute;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;padding:8px 12px;background:linear-gradient(180deg,rgba(0,8,12,.85),rgba(0,0,0,.55));border:1px solid rgba(0,255,255,.18);backdrop-filter:blur(3px);box-shadow:inset 0 0 18px rgba(0,255,255,.04);color:#bfefff;text-shadow:0 0 10px rgba(0,234,255,.6)}
.tl{top:16px;left:16px;border-color:rgba(0,234,255,.35);box-shadow:0 0 24px rgba(0,234,255,.12),inset 0 0 12px rgba(0,234,255,.06)}
.tr{top:16px;right:16px;text-align:right;border-color:rgba(0,234,255,.25)}
.bl{bottom:16px;left:16px;border-color:rgba(0,234,255,.3)}
.br{bottom:16px;right:16px;text-align:right;color:#ffd9a3;border-color:rgba(255,170,0,.35);box-shadow:0 0 24px rgba(255,170,0,.12),inset 0 0 12px rgba(255,170,0,.05);text-shadow:0 0 10px rgba(255,170,0,.7)}
.bc{bottom:16px;left:50%;transform:translateX(-50%);color:#9fb3c2;font-size:10.5px;border-color:rgba(255,255,255,.16);text-shadow:none}
.tc{top:16px;left:50%;transform:translateX(-50%);color:#00ffcc;font-weight:600;font-size:12.5px;letter-spacing:.14em;border-color:rgba(0,255,200,.45);background:linear-gradient(180deg,rgba(0,40,30,.9),rgba(0,10,8,.7));box-shadow:0 0 32px rgba(0,255,170,.25),inset 0 0 14px rgba(0,255,200,.12);text-shadow:0 0 14px rgba(0,255,200,.9)}
.cyan{color:#00eaff;text-shadow:0 0 12px #00eaff}
.amber{color:#ffaa00;text-shadow:0 0 12px #ffaa00}
.flash{animation:flash 1.05s steps(2,end) infinite}
@keyframes flash{0%,55%{opacity:1;filter:brightness(1.2)}56%,100%{opacity:.32;filter:brightness(.7)}}
.scanlines{position:fixed;inset:0;z-index:9;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(0,0,0,0)0px,rgba(0,255,255,.05)1px,transparent 2px,transparent 3px);mix-blend-mode:screen;opacity:.38}
.vignette{position:fixed;inset:0;z-index:8;pointer-events:none;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.9) 85%,#000 100%)}
#title{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;pointer-events:none;font-weight:700;font-size:14vw;letter-spacing:.06em;color:#fff;opacity:.035;text-shadow:0 0 80px #00eaff;white-space:nowrap}
.grid{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.07;background-image:linear-gradient(rgba(0,255,255,.3) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,.25) 1px,transparent 1px);background-size:80px 80px;transform:perspective(800px) rotateX(60deg) translateY(30%);filter:blur(.3px)}
@media(max-width:820px){.hud-item{font-size:10px;padding:6px 8px}.tc{top:58px;font-size:10.5px;max-width:92%;text-align:center;line-height:1.3}.tl,.tr{top:10px}.tl{left:10px}.tr{right:10px}.bl,.br{bottom:10px}.bl{left:10px;max-width:45%}.br{right:10px;max-width:45%}.bc{display:none}#title{font-size:22vw}}

<body>
<canvas id="c"></canvas>
<div class="grid"></div>
<div id="title">DEPTH 32</div>
<div class="vignette"></div>
<div class="scanlines"></div>
<div id="hud">
  <div class="hud-item tl">COBACORE.HUNTGATH.ENGI | FEED: 32.0 THz | STATUS: <span class="cyan">BURROWING</span></div>
  <div class="hud-item tr">FRACTAL DEPTH: 32/32 | STABILITY: <span class="amber">99.7%</span></div>
  <div class="hud-item tc flash">AIR GAP: TRUE - NO HTTP - FULL SYSTEM ONLINE</div>
  <div class="hud-item bl">DEFE.MOBI.INMI | SHIELD: 100% | <span class="cyan">MOBILE</span></div>
  <div class="hud-item br">OFFE.MOBE.INMI | PROBE: 100% | <span class="amber">MOBILE</span></div>
  <div class="hud-item bc">ROOT0 HASH 86c057ca... | CANON FROZEN</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: true });
let W=0, H=0, DPR=1, CX=0, CY=0, t=0;
let mx=0, my=0, px=0, py=0;
let stars=[], parts=[], throatGlow=0;

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = innerWidth; H = innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  CX = W/2; CY = H/2;
  initStars();
}
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e=>{ mx = (e.clientX/W - .5)*2; my = (e.clientY/H - .5)*2; });
window.addEventListener('touchmove', e=>{ if(e.touches[0]){ mx=(e.touches[0].clientX/W-.5)*2; my=(e.touches[0].clientY/H-.5)*2; }}, {passive:true});

function initStars(){
  stars = [];
  for(let i=0;i<900;i++){
    stars.push({
      x: Math.random()*W,
      y: Math.random()*H,
      z: Math.random(),
      s: Math.random()*.9+.3,
      c: Math.random()>.8 ? '#9ef' : Math.random()>.6 ? '#fca' : '#fff',
      v: Math.random()*.4+.1
    });
  }
}
function initParts(){
  parts=[];
  const N=1800;
  for(let i=0;i<N;i++){
    const left = i<N/2;
    parts.push({
      x: left ? Math.random()*W*.35 : W - Math.random()*W*.35,
      y: left ? -20-Math.random()*H*.3 : H+20+Math.random()*H*.3,
      vx: left ? .7+Math.random()*1.2 : -0.7-Math.random()*1.2,
      vy: left ? .3+Math.random()*.6 : -0.3-Math.random()*.6,
      side: left?'L':'R',
      life: Math.random()*1000,
      cool: 0
    });
  }
}

function hex(r){
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a = Math.PI/3*i - Math.PI/6;
    const x = Math.cos(a)*r, y = Math.sin(a)*r;
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  }
  ctx.closePath();
}
function tri(r){
  ctx.beginPath();
  for(let i=0;i<3;i++){
    const a = Math.PI*2/3*i - Math.PI/2;
    ctx[i?'lineTo':'moveTo'](Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath();
}

function drawStars(){
  px += (mx*18 - px)*.06;
  py += (my*12 - py)*.06;
  for(const s of stars){
    const x = (s.x + px*s.z*1.8 + W)%W;
    const y = (s.y + py*s.z*1.4 + t*s.v*6 + H)%H;
    const a = .25 + (1-s.z)*.75;
    ctx.globalAlpha = a*(.7+.3*Math.sin(t*.8+s.x*.01));
    ctx.fillStyle = s.c;
    ctx.shadowBlur = s.z<.25?7:0;
    ctx.shadowColor = s.c;
    ctx.fillRect(x, y, s.s*(1.6-s.z), s.s*(1.6-s.z));
  }
  ctx.shadowBlur=0; ctx.globalAlpha=1;
}

function drawBH(x,y,r,col,col2){
  ctx.save(); ctx.translate(x,y);
  // lensing halo
  let g = ctx.createRadialGradient(0,0,r*.5,0,0,r*3.2);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(.25,col+'22');
  g.addColorStop(.6,col2+'14');
  g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,r*3.2,0,7); ctx.fill();
  // accretion disk warped
  for(let i=0;i<4;i++){
    const ry = r*(.45+i*.12);
    const rx = r*(1.7+i*.28);
    ctx.beginPath();
    ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
    ctx.strokeStyle = i%2?col:col2;
    ctx.globalAlpha = .18 - i*.03;
    ctx.lineWidth = 2 - i*.25;
    ctx.shadowBlur = 22; ctx.shadowColor = col;
    ctx.stroke();
  }
  ctx.globalAlpha=1;
  // photon rings
  ctx.beginPath(); ctx.arc(0,0,r*1.03,0,7);
  ctx.strokeStyle=col; ctx.lineWidth=2.8; ctx.shadowBlur=26; ctx.shadowColor=col; ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,r*1.22,0,7);
  ctx.strokeStyle=col2; ctx.lineWidth=1.3; ctx.globalAlpha=.75; ctx.shadowBlur=14; ctx.stroke();
  ctx.globalAlpha=1; ctx.shadowBlur=0;
  // event horizon
  const core = ctx.createRadialGradient(0,0,0,r);
  core.addColorStop(0,'#000'); core.addColorStop(.8,'#000'); core.addColorStop(.85,col+'aa'); core.addColorStop(1,col+'22');
  ctx.fillStyle=core; ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.fill();
  // inner shadow
  ctx.beginPath(); ctx.arc(0,0,r*.88,0,7); ctx.fillStyle='rgba(0,0,0,.9)'; ctx.fill();
  ctx.restore();
}

function drawThroat(){
  const r = 78 + Math.sin(t*3.1)*6 + throatGlow*140;
  const g = ctx.createRadialGradient(CX,CY,0,CX,CY,r);
  g.addColorStop(0,'rgba(255,255,255,.95)');
  g.addColorStop(.12,'rgba(140,255,255,.7)');
  g.addColorStop(.28,'rgba(0,230,255,.45)');
  g.addColorStop(.5,'rgba(255,170,0,.35)');
  g.addColorStop(1,'transparent');
  ctx.globalAlpha=.92;
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(CX,CY,r,0,7); ctx.fill();
  ctx.globalAlpha=1;
}

function drawFractal(){
  ctx.save();
  ctx.translate(CX+px*.4, CY+py*.3);
  const pulse = 1 + Math.sin(t*2.2)*.035;
  for(let i=31;i>=0;i--){
    const depth = i/31;
    // 0.58x simulated via exponential compression - each layer 0.84 visual scale keeps 32 visible
    const scale = Math.pow(0.84, i) * pulse * (0.96 + 0.04*Math.sin(t*.9+i*.17));
    const r = 310 * scale;
    if(r<0.8) continue;
    ctx.save();
    ctx.rotate(i*0.182 + t*0.16 + Math.sin(t*.6+i*.3)*0.05);
    let cr,cg,cb;
    if(depth<.5){
      const k=depth*2;
      cr = Math.round(0 + 255*k);
      cg = Math.round(235 - 65*k);
      cb = Math.round(255 - 255*k);
    }else{
      const k=(depth-.5)*2;
      cr=255; cg=Math.round(170+85*k); cb=Math.round(0+255*k);
    }
    const col = `rgb(${cr},${cg},${cb})`;
    ctx.strokeStyle = col;
    ctx.lineWidth = Math.max(.35, 2.2*(1-depth*.75));
    ctx.globalAlpha = .88 - depth*.55;
    ctx.shadowBlur = 22*(1-depth*.6);
    ctx.shadowColor = col;
    hex(r);
    ctx.stroke();
    // nested triangles every layer for depth
    if(i%1===0){
      ctx.globalAlpha *= .45;
      ctx.rotate(Math.PI/6);
      ctx.lineWidth *= .65;
      tri(r*0.58);
      ctx.stroke();
    }
    // inner fine detail
    if(i>18){
      ctx.globalAlpha=.25;
      ctx.lineWidth=.4;
      for(let j=0;j<3;j++){
        ctx.rotate(Math.PI/3);
        hex(r*0.31);
        ctx.stroke();
      }
    }
    ctx.restore();
  }
  // core
  ctx.shadowBlur=34; ctx.shadowColor='#fff';
  ctx.fillStyle='rgba(255,255,255,.98)';
  ctx.beginPath(); ctx.arc(0,0,4.5+Math.sin(t*4)*1.2,0,7); ctx.fill();
  ctx.shadowBlur=18; ctx.fillStyle='rgba(180,255,255,.8)';
  ctx.beginPath(); ctx.arc(0,0,9+Math.sin(t*3)*2,0,7); ctx.fill();
  ctx.restore();
}

function drawParts(){
  // fade trails
  ctx.fillStyle='rgba(0,4,8,0.09)';
  ctx.fillRect(0,0,W,H);
  let near=0;
  for(const p of parts){
    const dx = CX - p.x, dy = CY - p.y;
    const d = Math.hypot(dx,dy)+0.001;
    const pull = 0.018;
    p.vx += dx/d * pull * (p.side==='L'?0.9:0.9);
    p.vy += dy/d * pull * 0.9;
    p.vx += p.side==='L'?0.015:-0.015;
    p.vx *= 0.997; p.vy *= 0.997;
    p.x += p.vx; p.y += p.vy;
    p.life++;
    if(p.cool>0) p.cool--;
    if(d<68 && p.cool===0){
      near++;
      p.cool=18;
      throatGlow = Math.min(1, throatGlow+0.012);
      // swap side at throat
      if(p.side==='L'){
        p.side='R'; p.vx = 1.8 + Math.random()*1.3; p.vy = (Math.random()-0.5)*0.9;
      }else{
        p.side='L'; p.vx = -1.8 - Math.random()*1.3; p.vy = (Math.random()-0.5)*0.9;
      }
    }
    // respawn
    if(p.x<-80||p.x>W+80||p.y<-120||p.y>H+120||p.life>2400){
      const left = Math.random()<0.5;
      p.x = left ? Math.random()*W*0.28 : W - Math.random()*W*0.28;
      p.y = left ? -30 - Math.random()*60 : H+30 + Math.random()*60;
      p.vx = left ? 0.8+Math.random() : -0.8-Math.random();
      p.vy = left ? 0.35+Math.random()*0.4 : -0.35-Math.random()*0.4;
      p.side = left?'L':'R'; p.life=0; p.cool=0;
    }
    // draw
    const isL = p.side==='L';
    const col = isL ? '0,234,255' : '255,170,0';
    ctx.globalAlpha = 0.82;
    ctx.shadowBlur = 11;
    ctx.shadowColor = `rgba(${col},1)`;
    ctx.fillStyle = `rgba(${col},${0.65+Math.random()*0.35})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, isL?1.5:1.5, 0, Math.PI*2);
    ctx.fill();
    // motion streak
    ctx.globalAlpha=0.15;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x - p.vx*4, p.y - p.vy*4);
    ctx.strokeStyle=`rgba(${col},0.8)`; ctx.lineWidth=1; ctx.stroke();
  }
  ctx.shadowBlur=0; ctx.globalAlpha=1;
  throatGlow = throatGlow*0.91 + Math.min(0.35, near*0.003);
}

function render(){
  t+=0.016;
  // clear base
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  drawStars();
  const r = Math.min(W,H)*0.072;
  const topY = CY - H*0.225 + py;
  const botY = CY + H*0.225 + py;
  drawBH(CX+px, topY, r, '#00eaff', '#0088ff');
  drawBH(CX+px, botY, r, '#ffaa00', '#ff5500');
  // connection beam
  const beamGrad = ctx.createLinearGradient(CX, topY, CX, botY);
  beamGrad.addColorStop(0,'rgba(0,234,255,0)');
  beamGrad.addColorStop(.15,'rgba(0,234,255,.18)');
  beamGrad.addColorStop(.5,'rgba(255,255,255,.08)');
  beamGrad.addColorStop(.85,'rgba(255,170,0,.18)');
  beamGrad.addColorStop(1,'rgba(255,170,0,0)');
  ctx.globalAlpha=.7; ctx.fillStyle=beamGrad;
  ctx.fillRect(CX-1.5+px*.2, topY, 3, botY-topY);
  ctx.globalAlpha=1;
  drawParts();
  drawThroat();
  drawFractal();
  // HUD pulse rings
  ctx.save(); ctx.translate(CX,CY);
  ctx.globalAlpha=.12; ctx.strokeStyle='#00eaff';
  for(let i=1;i<=3;i++){
    ctx.beginPath(); ctx.arc(0,0, r*2.6 + i*18 + Math.sin(t*2+i)*3,0,7); ctx.lineWidth=1; ctx.stroke();
  }
  ctx.strokeStyle='#ffaa00';
  for(let i=1;i<=3;i++){
    ctx.beginPath(); ctx.arc(0,0, r*2.6 + i*18 + Math.cos(t*2+i)*3,0,7); ctx.lineWidth=1; ctx.stroke();
  }
  ctx.restore();
  requestAnimationFrame(render);
}

resize();
initParts();
render();
</script>
</body>
