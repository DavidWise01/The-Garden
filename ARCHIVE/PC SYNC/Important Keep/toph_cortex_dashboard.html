*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:#a0c0d8;font-family:'Courier New',monospace;height:100vh;overflow:hidden;}

.dashboard{display:grid;grid-template-columns:300px 1fr 280px;grid-template-rows:52px 1fr 40px;height:100vh;gap:1px;background:#111827;}

/* TASKBAR */
.taskbar{grid-column:1/-1;background:var(--bg);display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(64,144,255,0.15);}
.orb{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 30% 30%, var(--cobalt), #103060);box-shadow:0 0 15px rgba(64,144,255,0.4);animation:pulse 4s infinite;}
.title-group{margin-left:12px;flex:1;}
.title{font-weight:bold;letter-spacing:5px;color:var(--cobalt);font-size:12px;}
.status-bits{display:flex;gap:16px;font-size:9px;color:var(--akasha);letter-spacing:1px;margin-top:2px;}
.status-bits span{color:#fff;}
.taskbar-right{display:flex;gap:14px;font-size:8px;color:#4a6a8a;letter-spacing:1px;}
.taskbar-right .live{color:var(--safety);}

/* LEFT PANEL */
.left{background:var(--bg);display:flex;flex-direction:column;border-right:1px solid rgba(64,144,255,0.08);overflow:hidden;}
.panel-head{padding:10px 14px;border-bottom:1px solid rgba(64,144,255,0.08);font-size:10px;letter-spacing:3px;color:var(--cobalt);font-weight:bold;}
.nav-grid{display:grid;grid-template-columns:repeat(4, 1fr);gap:3px;padding:6px;}
.nav-btn{background:transparent;border:1px solid rgba(64,144,255,0.15);color:var(--cobalt);padding:4px 2px;font-size:8px;cursor:pointer;transition:0.2s;font-family:inherit;letter-spacing:1px;}
.nav-btn:hover{background:rgba(64,144,255,0.1);}
.nav-btn.active{background:rgba(64,144,255,0.15);border-color:var(--cobalt);}
.content-area{flex:1;overflow-y:auto;padding:10px 14px;font-size:10px;line-height:1.6;}
.content-area::-webkit-scrollbar{width:3px;}
.content-area::-webkit-scrollbar-thumb{background:rgba(64,144,255,0.2);}
.axiom-item{padding:4px 6px;margin:2px 0;border-left:2px solid rgba(64,144,255,0.15);cursor:pointer;transition:0.2s;font-size:9px;}
.axiom-item:hover{background:rgba(64,144,255,0.05);border-color:var(--cobalt);}
.axiom-item.era0{border-color:var(--safety);}
.axiom-item.era1{border-color:var(--teal);}
.axiom-item.era2{border-color:var(--akasha);}
.axiom-item.era3{border-color:var(--hot);}
.axiom-item.era4{border-color:var(--mirror);}
.axiom-item.capstone{border-color:var(--purple);border-width:3px;font-weight:bold;}
.kg-num{color:var(--cobalt);font-weight:bold;margin-right:4px;}
.era-tag{font-size:7px;color:#3a5a7a;margin-left:4px;}
.section-head{color:var(--akasha);font-size:9px;letter-spacing:2px;margin:10px 0 5px;padding-bottom:3px;border-bottom:1px solid rgba(212,168,76,0.1);}

/* CENTER */
.center{background:var(--panel);display:flex;flex-direction:column;position:relative;}
#sphereCanvas{width:100%;border-bottom:1px solid rgba(64,144,255,0.08);cursor:crosshair;}
.voice-panel{flex:1;display:flex;flex-direction:column;background:var(--bg);min-height:0;}
.feed{flex:1;overflow-y:auto;padding:12px 16px;font-size:10px;}
.feed::-webkit-scrollbar{width:3px;}
.feed::-webkit-scrollbar-thumb{background:rgba(64,144,255,0.2);}
.msg{margin-bottom:10px;border-left:2px solid var(--cobalt);padding:4px 0 4px 10px;animation:fadeIn 0.3s ease;}
.msg.david{border-color:var(--akasha);}
.msg.system{border-color:var(--safety);opacity:0.6;}
.msg .label{font-size:8px;font-weight:bold;margin-bottom:3px;letter-spacing:2px;}
.msg.cortex .label{color:var(--cobalt);}
.msg.david .label{color:var(--akasha);}
.msg.system .label{color:var(--safety);}

.msg .text em{color:var(--cobalt);font-style:normal;font-weight:bold;}
.msg .text .val{color:var(--akasha);}
.msg .text .hot{color:var(--hot);}
.msg .text .safe{color:var(--safety);}
.input-wrap{padding:8px 12px;display:flex;gap:6px;background:rgba(0,0,0,0.3);border-top:1px solid rgba(64,144,255,0.08);}
.input-wrap input{flex:1;background:#05080f;border:1px solid #1e293b;padding:8px 10px;color:var(--cobalt);outline:none;font-family:inherit;font-size:10px;letter-spacing:1px;}
.input-wrap input::placeholder{color:#2a3a4a;}
.input-wrap input:focus{border-color:rgba(64,144,255,0.3);}
.input-wrap button{background:var(--cobalt);color:#000;border:none;padding:0 14px;font-weight:bold;cursor:pointer;font-family:inherit;font-size:9px;letter-spacing:2px;}
.input-wrap button:hover{background:#60a8ff;}

/* RIGHT PANEL */
.right{background:var(--bg);display:flex;flex-direction:column;border-left:1px solid rgba(64,144,255,0.08);overflow:hidden;}
.tabs{display:flex;background:rgba(255,255,255,0.02);}
.tab{flex:1;padding:8px;text-align:center;font-size:9px;cursor:pointer;border-bottom:2px solid transparent;letter-spacing:2px;transition:0.2s;}
.tab:hover{color:var(--cobalt);}
.tab.active{border-color:var(--cobalt);color:var(--cobalt);}
.list{flex:1;overflow-y:auto;padding:8px;}
.list::-webkit-scrollbar{width:3px;}
.list::-webkit-scrollbar-thumb{background:rgba(64,144,255,0.2);}
.entry{background:rgba(64,144,255,0.02);margin-bottom:6px;padding:8px;border:1px solid rgba(64,144,255,0.04);border-left:2px solid rgba(64,144,255,0.1);font-size:9px;}
.entry-date{font-size:7px;color:var(--akasha);letter-spacing:1px;}
.entry-title{color:var(--cobalt);font-weight:bold;margin:2px 0;font-size:9px;}
.entry-body{color:#6a8aaa;font-size:8px;line-height:1.4;}
.entry.hot{border-left-color:var(--hot);}
.entry.gold{border-left-color:var(--akasha);}
.entry.safe{border-left-color:var(--safety);}

/* FOOTER */
.bottom{grid-column:1/-1;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:8px;border-top:1px solid rgba(64,144,255,0.08);letter-spacing:1px;color:#3a5a7a;}

@keyframes pulse{0%,100%{opacity:0.8;transform:scale(1);} 50%{opacity:1;transform:scale(1.05);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

// 3D WIREFRAME SPHERE (pure canvas — no Three.js)
// ═══════════════════════════════════════════════════════════
const sCanvas = document.getElementById('sphereCanvas');
const sCtx = sCanvas.getContext('2d');

function resizeSphere() {
  const box = sCanvas.parentElement;
  sCanvas.width = box.clientWidth;
  sCanvas.height = Math.min(box.clientHeight * 0.45, 350);
}
resizeSphere();
window.addEventListener('resize', resizeSphere);

// Generate icosahedron vertices
function makeIcosahedron(subdivisions) {
  const t = (1 + Math.sqrt(5)) / 2;
  const verts = [
    [-1,t,0],[1,t,0],[-1,-t,0],[1,-t,0],
    [0,-1,t],[0,1,t],[0,-1,-t],[0,1,-t],
    [t,0,-1],[t,0,1],[-t,0,-1],[-t,0,1]
  ];
  // Normalize
  verts.forEach(v => {
    const len = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]);
    v[0]/=len; v[1]/=len; v[2]/=len;
  });
  const edges = [
    [0,11],[0,5],[0,1],[0,7],[0,10],
    [1,5],[5,11],[11,10],[10,7],[7,1],
    [3,9],[3,4],[3,2],[3,8],[3,6],
    [4,9],[9,8],[8,6],[6,2],[2,4],
    [1,9],[5,4],[11,2],[10,6],[7,8],
    [9,5],[4,11],[2,10],[6,7],[8,1]
  ];
  return { verts, edges };
}

const ico = makeIcosahedron();
let sFrame = 0;

function renderSphere() {
  sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
  sFrame++;

  const cx = sCanvas.width / 2;
  const cy = sCanvas.height / 2;
  const scale = Math.min(cx, cy) * 0.55;
  const rotY = sFrame * 0.005;
  const rotX = sFrame * 0.002;

  function project(v) {
    let [x, y, z] = v;
    // Rotate Y
    const cy1 = Math.cos(rotY), sy1 = Math.sin(rotY);
    const x2 = x * cy1 + z * sy1;
    const z2 = -x * sy1 + z * cy1;
    // Rotate X
    const cx1 = Math.cos(rotX), sx1 = Math.sin(rotX);
    const y2 = y * cx1 - z2 * sx1;
    const z3 = y * sx1 + z2 * cx1;
    return { x: cx + x2 * scale, y: cy - y2 * scale, z: z3 };
  }

  const projected = ico.verts.map(v => project(v));

  // Edges
  ico.edges.forEach(([a, b]) => {
    const pa = projected[a], pb = projected[b];
    const avgZ = (pa.z + pb.z) / 2;
    const alpha = 0.08 + Math.max(0, avgZ) * 0.2;
    sCtx.beginPath();
    sCtx.moveTo(pa.x, pa.y);
    sCtx.lineTo(pb.x, pb.y);
    sCtx.strokeStyle = '#4090ff';
    sCtx.lineWidth = 0.6 + Math.max(0, avgZ) * 0.4;
    sCtx.globalAlpha = alpha;
    sCtx.stroke();
  });

  // Vertices
  projected.forEach(p => {
    const alpha = 0.15 + Math.max(0, p.z) * 0.4;
    sCtx.beginPath();
    sCtx.arc(p.x, p.y, 1.5 + Math.max(0, p.z) * 1, 0, Math.PI * 2);
    sCtx.fillStyle = '#4090ff';
    sCtx.globalAlpha = alpha;
    sCtx.fill();
  });

  // Inner glow core
  const coreR = scale * 0.35 + Math.sin(sFrame * 0.02) * scale * 0.03;
  const grad = sCtx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
  grad.addColorStop(0, 'rgba(64,144,255,0.12)');
  grad.addColorStop(0.5, 'rgba(64,144,255,0.04)');
  grad.addColorStop(1, 'transparent');
  sCtx.globalAlpha = 1;
  sCtx.fillStyle = grad;
  sCtx.fillRect(0, 0, sCanvas.width, sCanvas.height);

  // Center dot
  sCtx.beginPath();
  sCtx.arc(cx, cy, 2, 0, Math.PI * 2);
  sCtx.fillStyle = '#d4a84c';
  sCtx.globalAlpha = 0.6;
  sCtx.fill();

  // Labels
  sCtx.font = '7px Courier New';
  sCtx.fillStyle = '#4090ff';
  sCtx.textAlign = 'center';
  sCtx.globalAlpha = 0.15;
  sCtx.fillText('CH39 · CORTEX · THE INVERSE WRENCH', cx, sCanvas.height - 8);

  sCtx.globalAlpha = 1;
  requestAnimationFrame(renderSphere);
}
renderSphere();
