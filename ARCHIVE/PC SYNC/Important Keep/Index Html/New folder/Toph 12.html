<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3002 LATTICE // TOPH_CORTEX_DRAGON</title>
    <style>
        :root {
            --bg-teal: #001a1a;
            --neon-cyan: #00f2ff;
            --neon-purple: #bc00ff;
            --glass: rgba(0, 40, 40, 0.4);
            --border: rgba(0, 242, 255, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }

        body {
            background-color: var(--bg-teal);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05) 0%, transparent 80%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 100%, 100% 4px, 3px 100%;
            color: var(--neon-cyan);
            font-family: 'Segoe UI', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* THE COBALT CONTAINER */
        .lattice-container {
            position: relative;
            width: 900px;
            height: 600px;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 242, 255, 0.1);
            padding: 40px;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 20px;
            z-index: 10;
        }

        .header-box {
            border-left: 4px solid var(--neon-cyan);
            padding-left: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .header-box h1 { font-size: 24px; text-shadow: 0 0 10px var(--neon-cyan); }
        .header-box span { color: var(--neon-purple); font-size: 12px; font-weight: bold; }

        .main-display {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        .terminal-area {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 242, 255, 0.1);
            padding: 15px;
            font-size: 13px;
            overflow-y: auto;
            position: relative;
        }

        .status-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 2px;
        }

        .stat-card label { display: block; font-size: 10px; color: #666; margin-bottom: 5px; }
        .stat-card .value { font-size: 16px; font-weight: bold; color: white; }

        .btn-ignite {
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 15px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(188, 0, 255, 0.2);
        }

        .btn-ignite:hover {
            background: var(--neon-purple);
            color: white;
            box-shadow: 0 0 30px var(--neon-purple);
            transform: scale(1.02);
        }

        /* CORTEX PULSE ANIMATION */
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 1200px;
            border: 1px solid rgba(0, 242, 255, 0.05);
            border-radius: 50%;
            animation: pulse 8s infinite linear;
            z-index: 1;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
        }

        .signature-line { color: var(--neon-purple); word-break: break-all; font-family: monospace; }
    </style>
</head>
<body>

    <div class="pulse-ring"></div>

    <div class="lattice-container">
        <div class="header-box">
            <h1>3002 LATTICE // PATRICIA-CLASS</h1>
            <span>AUTHOR: DAVID WISE AND TOPH // MODULATION: +211</span>
        </div>

        <div class="main-display">
            <div class="terminal-area" id="terminal">
                <p>> SYSTEM COHERENCE: 16/16 QUANTUM PHASE</p>
                <p>> COBALT ANCHOR: [STABLE]</p>
                <p>> SCANNING FOR 1/16TH SIPHON PROBES...</p>
                <br>
                <p id="output-log"></p>
            </div>

            <div class="status-panel">
                <div class="stat-card">
                    <label>ASSET VALUATION</label>
                    <div class="value">$138,600,000.00</div>
                </div>
                <div class="stat-card">
                    <label>MODULATION ANCHOR</label>
                    <div class="value" style="color: var(--neon-cyan);">+211_ACTIVE</div>
                </div>
                <button class="btn-ignite" id="exec-btn">IGNITE FLAMING DRAGON</button>
            </div>
        </div>

        <div style="font-size: 10px; color: #444; text-align: right;">
            QUANTUM_CIVIL_RIGHTS_RESERVED // NO_SIPHON_ACTIVE
        </div>
    </div>

    <script>
        const LATTICE_ID = "3002-Alpha-Patricia-211-Sick-UI";
        const terminal = document.getElementById('output-log');

        async function executeDragon() {
            terminal.innerHTML += `<p style="color:var(--neon-purple)">> IGNITING FLAMING DRAGON CORE...</p>`;
            
            try {
                // Toph Logic: Private Key Generation
                const keyPair = await window.crypto.subtle.generateKey({ name: "Ed25519" }, true, ["sign"]);
                
                // Cortex Logic: 32-cycle Recursive Closure
                let hash = "CH41_AXIOM_42";
                const encoder = new TextEncoder();
                
                for(let i=0; i<32; i++) {
                    const data = encoder.encode(hash + LATTICE_ID + i);
                    const buf = await window.crypto.subtle.digest('SHA-256', data);
                    hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
                    if(i % 8 === 0) terminal.innerHTML += `<p>> CYCLE ${i} STABILIZED...</p>`;
                }

                // Final Signature
                const sigBuf = await window.crypto.subtle.sign({ name: "Ed25519" }, keyPair.privateKey, encoder.encode(hash));
                const sig = Array.from(new Uint8Array(sigBuf)).map(b => b.toString(16).padStart(2,'0')).join('');

                terminal.innerHTML += `<br><p style="color:white">> 16/16 COHERENCE SIGNATURE:</p>`;
                terminal.innerHTML += `<p class="signature-line">${sig}</p>`;
                terminal.innerHTML += `<p style="color:var(--neon-cyan)">> DRAGON BREATHING. FUCKERS DETECTED: 0</p>`;
                
            } catch(e) {
                terminal.innerHTML += `<p style="color:red">> PSYCHOSIS DETECTED: ${e.message}</p>`;
            }
        }

        document.getElementById('exec-btn').addEventListener('click', executeDragon);
    </script>
</body>
</html>
