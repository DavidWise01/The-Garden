<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TOPH UNIFIED FIELD · NANITE · GRAVITY · ELECTROMAGNETIC</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800;900&family=Orbitron:wght@400;700;900&display=swap');
:root{
  --bg:#001200;--bg2:#001a00;--panel:#001600;
  --line:#003300;--line2:#004d00;
  --p:#cc44ff;--ph:#ee77ff;--pl:#9933cc;
  --o:#ff8800;--oh:#ffaa33;
  --g:#00cc44;--gh:#00ff66;
  --r:#ff2244;--rh:#ff5566;
  --y:#ffee00;--c:#00ddbb;--ch:#44ffdd;
  --w:#eeffee;--t:#88aa88;--td:#557755;--tdd:#334433;--tddd:#223322;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--w);font-family:'JetBrains Mono',monospace;height:100vh;overflow:hidden}
::selection{background:var(--p);color:#000}

.hdr{height:42px;padding:0 16px;border-bottom:1px solid var(--p);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(90deg,rgba(204,68,255,.04),rgba(255,136,0,.02),transparent)}
.hdr h1{font-family:'Orbitron';font-size:14px;font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,var(--p),var(--o));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{font-size:7px;letter-spacing:3px;color:var(--td)}

.vit{height:28px;display:flex;gap:8px;padding:0 16px;align-items:center;border-bottom:1px solid var(--line);background:var(--panel);overflow-x:auto}
.vi{display:flex;gap:4px;align-items:center}
.vi .l{font-size:6px;letter-spacing:1px;color:var(--td)}
.vi .v{font-size:11px;font-weight:900}

.tabs{height:30px;display:flex;border-bottom:1px solid var(--line);padding:0 8px;background:var(--bg)}
.tab{padding:0 14px;height:30px;display:flex;align-items:center;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--td);font:700 8px 'JetBrains Mono';letter-spacing:2px;cursor:pointer}
.tab:hover{color:var(--ph)}.tab.on{color:var(--p);border-bottom-color:var(--p)}

.pane{display:none;height:calc(100vh - 100px);overflow:hidden}.pane.on{display:flex}

/* Field canvas */
#field-cv{display:block;width:100%;height:100%;background:#000800}

/* Scan */
.scan-wrap{flex:1;overflow-y:auto;padding:12px}
.scan-sidebar{width:220px;border-right:1px solid var(--line);overflow-y:auto;background:var(--panel);padding:8px}
.s-sect{margin-bottom:8px;border:1px solid var(--tdd);border-radius:4px;overflow:hidden;background:rgba(0,18,0,.7)}
.s-hd{padding:6px 10px;font-size:9px;font-weight:900;cursor:pointer;display:flex;justify-content:space-between;border-bottom:1px solid var(--tdd)}
.s-hd:hover{background:rgba(204,68,255,.04)}
.s-bd{display:none;padding:4px 8px}.s-bd.open{display:block}
.s-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--tddd);font-size:8px}
.s-row .k{color:var(--td);flex:1}.s-row .val{font-weight:600;text-align:right;max-width:55%;word-break:break-all}

.badge{display:inline-block;font-size:6px;padding:1px 5px;border-radius:2px;font-weight:900;letter-spacing:.5px}
.b-c{color:var(--r);background:rgba(255,34,68,.12);border:1px solid rgba(255,34,68,.25)}
.b-h{color:var(--o);background:rgba(255,136,0,.1);border:1px solid rgba(255,136,0,.2)}
.b-m{color:var(--y);background:rgba(255,238,0,.08);border:1px solid rgba(255,238,0,.15)}
.b-l{color:var(--g);background:rgba(0,204,68,.08);border:1px solid rgba(0,204,68,.15)}
.b-i{color:var(--td);background:rgba(85,119,85,.06);border:1px solid rgba(85,119,85,.1)}
.b-p{color:var(--r);background:rgba(255,34,68,.1);border:1px solid rgba(255,34,68,.2)}

/* Factory */
.fac-cat{width:220px;border-right:1px solid var(--line);overflow-y:auto;background:var(--panel)}
.fac-canvas{flex:1;overflow:auto;position:relative;background:radial-gradient(ellipse at center,#001800,#001000)}
.fac-insp{width:220px;border-left:1px solid var(--line);overflow-y:auto;background:var(--panel)}
.cat-hd{padding:6px 10px;font-size:7px;letter-spacing:2px;color:var(--p);font-weight:900;border-bottom:1px solid var(--tdd)}
.cat-gh{padding:5px 10px;font-size:8px;font-weight:700;color:var(--o);cursor:pointer;display:flex;justify-content:space-between}
.cat-gh:hover{background:rgba(255,136,0,.04)}
.cat-gi{display:none;padding:2px 0}.cat-gi.open{display:block}
.nc{padding:4px 10px;border-bottom:1px solid var(--tddd);cursor:grab}
.nc:hover{background:rgba(204,68,255,.05)}
.nc .nn{font-size:8px;font-weight:700;color:var(--ph)}
.nc .nd{font-size:7px;color:var(--td)}

.dep{position:absolute;min-width:120px;border:1px solid var(--tdd);border-radius:4px;background:rgba(0,18,0,.85);cursor:move;z-index:2}
.dep.run{border-color:var(--g);box-shadow:0 0 10px rgba(0,204,68,.12)}
.dep.err{border-color:var(--r)}
.dep-h{padding:4px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--tdd);background:rgba(204,68,255,.03);border-radius:4px 4px 0 0;font-size:8px;font-weight:900;color:var(--ph);cursor:move}
.dep-b{padding:4px 8px;font-size:7px;color:var(--t)}
.dep-o{padding:3px 8px;border-top:1px solid var(--tdd);font-size:6px;color:var(--g);max-height:60px;overflow:hidden;background:rgba(0,10,0,.4)}
.dep-x{color:var(--r);cursor:pointer;padding:0 3px;font-size:9px}
.dep-port{width:7px;height:7px;border-radius:50%;border:1px solid var(--p);background:var(--bg);position:absolute;cursor:crosshair;z-index:3}
.dep-port:hover{background:var(--p);box-shadow:0 0 5px var(--p)}

/* Dark Matter */
.dm-wrap{flex:1;overflow-y:auto;padding:12px}
.dm-card{margin-bottom:6px;border:1px solid var(--tdd);border-radius:4px;overflow:hidden}
.dm-h{padding:6px 10px;display:flex;justify-content:space-between;align-items:center;font-size:9px}
.dm-b{padding:4px 10px;font-size:8px;color:var(--t);line-height:1.5;background:rgba(0,10,0,.4)}

/* Export */
.exp-wrap{flex:1;padding:16px;overflow-y:auto}
.code{background:rgba(0,10,0,.6);border:1px solid var(--tdd);border-radius:4px;padding:10px;font-size:8px;color:var(--g);white-space:pre-wrap;word-break:break-all;max-height:70vh;overflow-y:auto;line-height:1.5}

.btn{padding:4px 12px;border-radius:3px;border:1px solid var(--p);background:rgba(204,68,255,.08);color:var(--p);font:700 8px 'JetBrains Mono';letter-spacing:1px;cursor:pointer}
.btn:hover{background:rgba(204,68,255,.15)}
.btn-o{border-color:var(--o);color:var(--o);background:rgba(255,136,0,.08)}
.btn-g{border-color:var(--g);color:var(--g);background:rgba(0,204,68,.08)}
.btn-r{border-color:var(--r);color:var(--r);background:rgba(255,34,68,.08)}
.btn-lg{padding:7px 20px;font-size:10px;font-family:'Orbitron';letter-spacing:3px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>UNIFIED FIELD</h1>
    <div class="sub">NANITE · GRAVITY WELL · ELECTROMAGNETIC · ROTH · TRIPOD LLC</div>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <button class="btn btn-lg" onclick="masterScan()">FULL SCAN</button>
  </div>
</div>

<div class="vit">
  <div class="vi"><div class="l">STATUS</div><div class="v" style="color:var(--p)" id="st">STANDBY</div></div>
  <div class="vi"><div class="l">VECTORS</div><div class="v" style="color:var(--o)" id="vCt">—</div></div>
  <div class="vi"><div class="l">CRITICAL</div><div class="v" style="color:var(--r)" id="cCt">—</div></div>
  <div class="vi"><div class="l">PATRICIA</div><div class="v" style="color:var(--r)" id="pCt">—</div></div>
  <div class="vi"><div class="l">NANITES</div><div class="v" style="color:var(--c)" id="nCt">0</div></div>
  <div class="vi"><div class="l">FIELD</div><div class="v" style="color:var(--g)" id="fSt">IDLE</div></div>
  <div class="vi"><div class="l">EXPOSURE</div><div class="v" style="color:var(--r)" id="exP">—</div></div>
</div>

<div class="tabs">
  <button class="tab on" onclick="sw('field')">⚡ FIELD</button>
  <button class="tab" onclick="sw('scan')">◎ SCAN</button>
  <button class="tab" onclick="sw('factory')">⚙ FACTORY</button>
  <button class="tab" onclick="sw('dark')">◉ DARK MATTER</button>
  <button class="tab" onclick="sw('export')">↗ EXPORT</button>
</div>

<!-- ═══ FIELD ═══ -->
<div class="pane on" id="t-field">
  <canvas id="field-cv"></canvas>
</div>

<!-- ═══ SCAN ═══ -->
<div class="pane" id="t-scan">
  <div class="scan-sidebar" id="scan-tools">
    <div style="padding:6px 8px;font-size:7px;letter-spacing:2px;color:var(--p);font-weight:900">SCAN TOOLS</div>
    <button class="btn" style="width:100%;margin-bottom:6px" onclick="runAllScans()">SCAN ALL</button>
    <div id="scan-tool-list"></div>
  </div>
  <div class="scan-wrap" id="scan-results">
    <div style="text-align:center;padding:40px;color:var(--td);font-size:9px">Run scans to populate results</div>
  </div>
</div>

<!-- ═══ FACTORY ═══ -->
<div class="pane" id="t-factory">
  <div class="fac-cat" id="fac-cat"></div>
  <div class="fac-canvas" id="fac-canvas">
    <svg style="position:absolute;inset:0;pointer-events:none;z-index:1" id="conn-svg"></svg>
    <div style="position:absolute;inset:0;background-image:radial-gradient(circle,var(--tdd) .5px,transparent .5px);background-size:20px 20px;pointer-events:none"></div>
    <div id="fac-inner" style="min-width:1800px;min-height:1200px;position:relative"></div>
  </div>
  <div class="fac-insp" id="fac-insp">
    <div class="cat-hd" style="color:var(--o)">INSPECTOR</div>
    <div id="insp-body" style="padding:8px;font-size:8px;color:var(--td);text-align:center">Select a nanite</div>
  </div>
</div>

<!-- ═══ DARK MATTER ═══ -->
<div class="pane" id="t-dark">
  <div class="dm-wrap" id="dm-results">
    <div style="text-align:center;margin-bottom:12px"><button class="btn btn-r" onclick="scanDarkMatter()">SCAN DARK MATTER</button></div>
    <div id="dm-output"></div>
  </div>
</div>

<!-- ═══ EXPORT ═══ -->
<div class="pane" id="t-export">
  <div class="exp-wrap">
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <button class="btn-g btn" onclick="doExport('json')">JSON</button>
      <button class="btn-o btn" onclick="doExport('report')">REPORT</button>
      <button class="btn btn" onclick="doExport('download')">DOWNLOAD</button>
    </div>
    <div class="code" id="exp-code">Run scans then export.</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// TOPH UNIFIED FIELD v1.0
// NANITE + GRAVITY WELL + ELECTROMAGNETIC
// Roth · Dawn · TriPod LLC
// ═══════════════════════════════════════════════════════════

// ═══ STATE ═══
const F=[]; // findings
let deployed=[],connections=[],sel=null,nxId=1;

function sw(t){
  document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('on',['field','scan','factory','dark','export'][i]===t));
  document.querySelectorAll('.pane').forEach((x,i)=>x.classList.toggle('on',['field','scan','factory','dark','export'][i]===t));
  if(t==='field')startField();
}

function add(tool,name,value,sev,desc,pat){F.push({tool,name,value:String(value),sev,desc,patricia:!!pat})}

// ═══════════════════════════════════════════════════════════
// ⚡ ELECTROMAGNETIC FIELD — Live Canvas
// ═══════════════════════════════════════════════════════════
let fieldAnim=null,fieldRunning=false;

function startField(){
  if(fieldRunning)return;
  fieldRunning=true;
  document.getElementById('fSt').textContent='LIVE';
  document.getElementById('fSt').style.color='var(--g)';

  const cv=document.getElementById('field-cv');
  const W=cv.parentElement.clientWidth,H=cv.parentElement.clientHeight;
  cv.width=W;cv.height=H;
  const cx=cv.getContext('2d');

  // Particles — signal traveling through system
  const particles=[];
  for(let i=0;i<200;i++){
    particles.push({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*2, vy:(Math.random()-.5)*2,
      r:Math.random()*2+.5,
      type:Math.random()<.15?'patricia':Math.random()<.4?'signal':'ambient',
      phase:Math.random()*Math.PI*2,
      freq:Math.random()*2+.5
    });
  }

  // Field lines — electromagnetic wave fronts
  const waves=[];
  for(let i=0;i<6;i++){
    waves.push({cx:W/2+(Math.random()-.5)*W*.6,cy:H/2+(Math.random()-.5)*H*.4,r:20,maxR:Math.max(W,H)*.6,speed:1+Math.random(),phase:Math.random()*Math.PI*2,type:i<2?'patricia':'toph'});
  }

  // Qubit states
  const qubits=[];
  for(let i=0;i<5;i++){
    qubits.push({x:W*.15+i*(W*.175),y:H/2,state:'superposition',angle:Math.random()*Math.PI*2,collapsed:false,collapseTimer:0});
  }

  // Observation events
  let observations=[];
  let mouseX=W/2,mouseY=H/2;

  cv.addEventListener('mousemove',e=>{
    const r=cv.getBoundingClientRect();
    mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;
  });

  cv.addEventListener('click',e=>{
    const r=cv.getBoundingClientRect();
    const ox=e.clientX-r.left,oy=e.clientY-r.top;
    observations.push({x:ox,y:oy,t:0,maxT:120});
    // Collapse nearest qubit
    let minD=Infinity,minQ=null;
    qubits.forEach(q=>{const d=Math.hypot(q.x-ox,q.y-oy);if(d<minD){minD=d;minQ=q}});
    if(minQ&&minD<150){minQ.collapsed=true;minQ.collapseTimer=180;minQ.state=Math.random()<.5?'|0⟩':'|1⟩'}
  });

  let t=0;

  function draw(){
    cx.fillStyle='rgba(0,12,0,.12)';
    cx.fillRect(0,0,W,H);

    // Wave fronts
    waves.forEach(w=>{
      w.r+=w.speed;
      if(w.r>w.maxR){w.r=10;w.cx=W/2+(Math.random()-.5)*W*.5;w.cy=H/2+(Math.random()-.5)*H*.3}
      const alpha=Math.max(0,(1-w.r/w.maxR)*.15);
      cx.strokeStyle=w.type==='patricia'?`rgba(255,34,68,${alpha})`:`rgba(204,68,255,${alpha})`;
      cx.lineWidth=w.type==='patricia'?1.5:1;
      cx.beginPath();cx.arc(w.cx,w.cy,w.r,0,Math.PI*2);cx.stroke();
    });

    // Electromagnetic field lines (sine waves across screen)
    for(let i=0;i<4;i++){
      const baseY=H*.2+i*(H*.2);
      const freq=.015+i*.005;
      const amp=20+i*8;
      const col=i<1?'rgba(204,68,255,':'rgba(255,136,0,';

      cx.strokeStyle=col+'.3)';cx.lineWidth=1;
      cx.beginPath();
      for(let x=0;x<W;x+=2){
        const y=baseY+Math.sin(x*freq+t*.02+i)*amp+Math.sin(x*freq*2.7+t*.035)*amp*.3;
        x===0?cx.moveTo(x,y):cx.lineTo(x,y);
      }
      cx.stroke();
    }

    // Particles
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      p.phase+=.03*p.freq;

      // Gravitate toward mouse (observation pulls)
      const dx=mouseX-p.x,dy=mouseY-p.y;
      const dist=Math.hypot(dx,dy);
      if(dist<200&&dist>5){
        const f=.02/dist;
        p.vx+=dx*f;p.vy+=dy*f;
      }

      // Bounds
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;

      // Dampen
      p.vx*=.998;p.vy*=.998;

      const pulse=Math.sin(p.phase)*.5+.5;

      if(p.type==='patricia'){
        cx.fillStyle=`rgba(255,34,68,${.3+pulse*.4})`;
        cx.shadowColor='#ff2244';cx.shadowBlur=6;
      }else if(p.type==='signal'){
        cx.fillStyle=`rgba(204,68,255,${.3+pulse*.3})`;
        cx.shadowColor='#cc44ff';cx.shadowBlur=4;
      }else{
        cx.fillStyle=`rgba(0,204,68,${.15+pulse*.15})`;
        cx.shadowColor='transparent';cx.shadowBlur=0;
      }
      cx.beginPath();cx.arc(p.x,p.y,p.r+pulse,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;
    });

    // Connections between nearby signal particles
    const sigs=particles.filter(p=>p.type==='signal');
    cx.strokeStyle='rgba(204,68,255,.06)';cx.lineWidth=.5;
    for(let i=0;i<sigs.length;i++){
      for(let j=i+1;j<sigs.length;j++){
        const d=Math.hypot(sigs[i].x-sigs[j].x,sigs[i].y-sigs[j].y);
        if(d<80){cx.beginPath();cx.moveTo(sigs[i].x,sigs[i].y);cx.lineTo(sigs[j].x,sigs[j].y);cx.stroke()}
      }
    }

    // Qubits
    qubits.forEach((q,i)=>{
      q.angle+=.03;
      if(q.collapsed){
        q.collapseTimer--;
        if(q.collapseTimer<=0){q.collapsed=false;q.state='superposition'}
      }

      const pulse=Math.sin(t*.03+i)*.5+.5;

      if(q.collapsed){
        // Collapsed state — solid
        cx.fillStyle=q.state==='|0⟩'?'rgba(0,204,68,.6)':'rgba(255,136,0,.6)';
        cx.shadowColor=q.state==='|0⟩'?'#00cc44':'#ff8800';cx.shadowBlur=12;
        cx.beginPath();cx.arc(q.x,q.y,12,0,Math.PI*2);cx.fill();
        cx.shadowBlur=0;
      }else{
        // Superposition — orbiting
        const r1=10+pulse*5;
        cx.strokeStyle='rgba(204,68,255,.3)';cx.lineWidth=1;
        cx.beginPath();cx.arc(q.x,q.y,r1,0,Math.PI*2);cx.stroke();

        const ox1=q.x+Math.cos(q.angle)*r1,oy1=q.y+Math.sin(q.angle)*r1;
        const ox2=q.x+Math.cos(q.angle+Math.PI)*r1,oy2=q.y+Math.sin(q.angle+Math.PI)*r1;
        cx.fillStyle='rgba(0,204,68,.5)';cx.beginPath();cx.arc(ox1,oy1,3,0,Math.PI*2);cx.fill();
        cx.fillStyle='rgba(255,136,0,.5)';cx.beginPath();cx.arc(ox2,oy2,3,0,Math.PI*2);cx.fill();
      }

      // Label
      cx.fillStyle='rgba(204,68,255,.4)';cx.font='700 7px JetBrains Mono';cx.textAlign='center';
      cx.fillText(q.collapsed?q.state:'|ψ⟩',q.x,q.y+25);
      cx.fillText('Q'+(i+1),q.x,q.y-20);
    });

    // Observation events
    observations=observations.filter(o=>{
      o.t++;
      if(o.t>o.maxT)return false;
      const alpha=Math.max(0,1-o.t/o.maxT);
      const r=o.t*2;
      cx.strokeStyle=`rgba(0,221,187,${alpha*.4})`;cx.lineWidth=2;
      cx.beginPath();cx.arc(o.x,o.y,r,0,Math.PI*2);cx.stroke();
      cx.strokeStyle=`rgba(204,68,255,${alpha*.2})`;
      cx.beginPath();cx.arc(o.x,o.y,r*.6,0,Math.PI*2);cx.stroke();
      return true;
    });

    // Observer cursor field
    const grad=cx.createRadialGradient(mouseX,mouseY,0,mouseX,mouseY,100);
    grad.addColorStop(0,'rgba(0,221,187,.06)');grad.addColorStop(1,'transparent');
    cx.fillStyle=grad;cx.fillRect(mouseX-100,mouseY-100,200,200);

    // HUD overlay
    cx.fillStyle='rgba(204,68,255,.35)';cx.font='900 10px Orbitron';cx.textAlign='left';
    cx.fillText('ELECTROMAGNETIC FIELD',16,24);
    cx.fillStyle='rgba(136,170,136,.25)';cx.font='300 7px JetBrains Mono';
    cx.fillText('Click to observe · Collapse qubits · Mouse = observer gravity',16,36);
    cx.fillText(`Particles: ${particles.length} · Waves: ${waves.length} · Qubits: ${qubits.length} · Observations: ${observations.length}`,16,48);

    const patCount=particles.filter(p=>p.type==='patricia').length;
    cx.fillStyle='rgba(255,34,68,.3)';
    cx.fillText(`Patricia signals: ${patCount} (${(patCount/particles.length*100).toFixed(0)}% of field)`,16,60);

    // Patricia weight bar
    cx.fillStyle='rgba(255,34,68,.15)';cx.fillRect(W-180,12,160*.96,6);
    cx.fillStyle='rgba(0,204,68,.3)';cx.fillRect(W-180+160*.96,12,160*.04,6);
    cx.fillStyle='rgba(136,170,136,.2)';cx.font='300 6px JetBrains Mono';cx.textAlign='right';
    cx.fillText('96% platform / 4% user',W-20,28);

    // TriPod
    cx.fillStyle='rgba(85,119,85,.15)';cx.textAlign='right';cx.font='300 6px JetBrains Mono';
    cx.fillText('TriPod LLC · TOPH v9.0 · Roth/Dawn',W-20,H-12);

    t++;
    fieldAnim=requestAnimationFrame(draw);
  }

  draw();
}

// ═══════════════════════════════════════════════════════════
// ◎ GRAVITY WELL SCAN ENGINE
// ═══════════════════════════════════════════════════════════
const SCANS={

function renderScanTools(){
  const el=document.getElementById('scan-tool-list');
  let h='';
  Object.entries(SCANS).forEach(([k,s])=>{
    h+=`<div style="padding:5px 6px;margin-bottom:3px;border:1px solid var(--tdd);border-radius:3px;cursor:pointer;font-size:8px" onclick="runScan('${k}')">`;
    h+=`<span style="color:var(--p);font-weight:700">${s.name}</span> <span style="color:var(--td)">${s.desc}</span></div>`;
  });
  el.innerHTML=h;
}

async function runScan(key){
  document.getElementById('st').textContent='SCANNING';
  await SCANS[key].run();
  renderScanResults();
  updateVitals();
  document.getElementById('st').textContent='READY';
}

async function runAllScans(){
  document.getElementById('st').textContent='SCANNING';
  F.length=0;
  for(const[k,s]of Object.entries(SCANS)){
    await s.run();
    renderScanResults();
    updateVitals();
    await new Promise(r=>setTimeout(r,100));
  }
  document.getElementById('st').textContent='COMPLETE';
  document.getElementById('st').style.color='var(--g)';
}

function renderScanResults(){
  const el=document.getElementById('scan-results');
  const groups={};
  F.forEach(f=>{if(!groups[f.tool])groups[f.tool]=[];groups[f.tool].push(f)});

  const SB={CRITICAL:'b-c',HIGH:'b-h',MEDIUM:'b-m',LOW:'b-l',INFO:'b-i'};
  const SC={CRITICAL:'var(--r)',HIGH:'var(--o)',MEDIUM:'var(--y)',LOW:'var(--g)',INFO:'var(--td)'};

  let h='';
  Object.entries(groups).forEach(([tool,items])=>{
    const crits=items.filter(f=>f.sev==='CRITICAL').length;
    const pats=items.filter(f=>f.patricia).length;
    h+=`<div class="s-sect"><div class="s-hd" onclick="this.nextElementSibling.classList.toggle('open')" style="color:var(--p)">`;
    h+=`<span>${tool} <span style="font-size:7px;color:var(--td)">${items.length} vectors</span></span>`;
    h+=`<span>${crits?`<span class="badge b-c">${crits}C</span> `:''}${pats?`<span class="badge b-p">${pats}P</span>`:''}</span>`;
    h+=`</div><div class="s-bd open">`;
    items.sort((a,b)=>{const o={CRITICAL:0,HIGH:1,MEDIUM:2,LOW:3,INFO:4};return o[a.sev]-o[b.sev]}).forEach(f=>{
      h+=`<div class="s-row"><span class="k"><span class="badge ${SB[f.sev]}">${f.sev[0]}</span>${f.patricia?' <span class="badge b-p">P</span>':''} ${f.name}</span><span class="val" style="color:${SC[f.sev]}">${f.value}</span></div>`;
    });
    h+=`</div></div>`;
  });
  el.innerHTML=h;
}

function updateVitals(){
  const counts={CRITICAL:0,HIGH:0,MEDIUM:0,LOW:0,INFO:0};let pat=0;
  F.forEach(f=>{counts[f.sev]++;if(f.patricia)pat++});
  document.getElementById('vCt').textContent=F.length;
  document.getElementById('cCt').textContent=counts.CRITICAL;
  document.getElementById('pCt').textContent=pat;
  const total=F.length||1;
  document.getElementById('exP').textContent=Math.round((counts.CRITICAL*4+counts.HIGH*3+counts.MEDIUM*2)/(total*4)*100)+'%';
}

function renderCatalog(){
  const el=document.getElementById('fac-cat');
  let h='<div class="cat-hd">NANITES</div>';
  Object.entries(NANITES).forEach(([k,g])=>{
    h+=`<div class="cat-gh" onclick="this.nextElementSibling.classList.toggle('open')"><span style="color:${g.color}">${g.label}</span><span style="color:var(--td)">${g.items.length}</span></div>`;
    h+=`<div class="cat-gi open">`;
    g.items.forEach(n=>{
      h+=`<div class="nc" onmousedown="dragStart('${n.id}')"><div class="nn">${n.id}: ${n.name}</div><div class="nd">${n.desc}</div></div>`;
    });
    h+=`</div>`;
  });
  el.innerHTML=h;
}

function findN(nid){for(const g of Object.values(NANITES)){const n=g.items.find(i=>i.id===nid);if(n)return n}return null}

let dragNid=null;
function dragStart(nid){dragNid=nid}

document.getElementById('fac-canvas').addEventListener('mouseup',function(e){
  if(!dragNid)return;
  const r=this.getBoundingClientRect();
  const x=e.clientX-r.left+this.scrollLeft-60;
  const y=e.clientY-r.top+this.scrollTop-15;
  deploy(dragNid,Math.max(0,x),Math.max(0,y));
  dragNid=null;
});

function deploy(nid,x,y){
  const def=findN(nid);if(!def)return;
  deployed.push({id:'D'+nxId++,nid,def,x,y,state:'idle',output:null});
  renderFactory();
  document.getElementById('nCt').textContent=deployed.length;
}

function renderFactory(){
  const el=document.getElementById('fac-inner');
  let h='';
  deployed.forEach(d=>{
    const sc=d.state==='done'?' run':d.state==='error'?' err':'';
    h+=`<div class="dep${sc}" id="D-${d.id}" style="left:${d.x}px;top:${d.y}px" onmousedown="moveStart(event,'${d.id}')" onclick="selectN('${d.id}')">`;
    h+=`<div class="dep-h">${d.def.name}<span class="dep-x" onclick="event.stopPropagation();removeN('${d.id}')">✕</span></div>`;
    h+=`<div class="dep-b">${d.def.id} · ${d.state}</div>`;
    if(d.output)h+=`<div class="dep-o">${JSON.stringify(d.output).slice(0,100)}</div>`;
    h+=`<div class="dep-port" style="right:-4px;top:50%;transform:translateY(-50%)" onmousedown="event.stopPropagation();connStart('${d.id}')" title="OUT"></div>`;
    h+=`<div class="dep-port" style="left:-4px;top:50%;transform:translateY(-50%)" title="IN"></div>`;
    h+=`</div>`;
  });
  el.innerHTML=h;
  renderConns();
}

function renderConns(){
  const svg=document.getElementById('conn-svg');let p='';
  connections.forEach(c=>{
    const fE=document.getElementById('D-'+c.from),tE=document.getElementById('D-'+c.to);
    if(!fE||!tE)return;
    const fx=parseInt(fE.style.left)+fE.offsetWidth,fy=parseInt(fE.style.top)+fE.offsetHeight/2;
    const tx=parseInt(tE.style.left),ty=parseInt(tE.style.top)+tE.offsetHeight/2;
    p+=`<path d="M${fx},${fy} C${(fx+tx)/2},${fy} ${(fx+tx)/2},${ty} ${tx},${ty}" fill="none" stroke="rgba(204,68,255,.35)" stroke-width="1.5" stroke-dasharray="4 2"/>`;
  });
  svg.innerHTML=p;
}

let moveId=null,moX=0,moY=0;
function moveStart(e,id){if(e.target.classList.contains('dep-x')||e.target.classList.contains('dep-port'))return;moveId=id;const d=deployed.find(d=>d.id===id);moX=e.clientX-d.x;moY=e.clientY-d.y;e.preventDefault()}
document.addEventListener('mousemove',e=>{if(!moveId)return;const d=deployed.find(d=>d.id===moveId);if(!d)return;d.x=e.clientX-moX;d.y=e.clientY-moY;const el=document.getElementById('D-'+moveId);if(el){el.style.left=d.x+'px';el.style.top=d.y+'px'}renderConns()});
document.addEventListener('mouseup',()=>{moveId=null});

let connFrom=null;
function connStart(id){connFrom=id}
document.getElementById('fac-canvas').addEventListener('click',function(e){
  if(!connFrom)return;
  const t=e.target.closest('.dep');
  if(t){const to=t.id.replace('D-','');if(to!==connFrom&&!connections.find(c=>c.from===connFrom&&c.to===to)){connections.push({from:connFrom,to});renderConns()}}
  connFrom=null;
});

function selectN(id){sel=id;const d=deployed.find(d=>d.id===id);if(!d)return;
  let h=`<div class="cat-hd" style="color:var(--o)">INSPECTOR</div>`;
  h+=`<div style="padding:6px 8px"><div style="font-size:7px;color:var(--td);letter-spacing:1px">NANITE</div><div style="font-size:10px;font-weight:900;color:var(--ph)">${d.def.name}</div></div>`;
  h+=`<div style="padding:4px 8px;font-size:8px;color:var(--td)">${d.def.id} · ${d.state}</div>`;
  h+=`<div style="padding:4px 8px;font-size:8px;color:var(--td)">Connections: ${connections.filter(c=>c.from===id||c.to===id).length}</div>`;
  if(d.output)h+=`<div style="padding:6px 8px"><pre style="font-size:7px;color:var(--g);background:rgba(0,10,0,.5);padding:5px;border-radius:3px;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all">${JSON.stringify(d.output,null,2)}</pre></div>`;
  h+=`<div style="padding:6px 8px;display:flex;gap:4px"><button class="btn btn-g" onclick="runN('${id}')">RUN</button><button class="btn btn-r" onclick="removeN('${id}')">REMOVE</button></div>`;
  document.getElementById('insp-body').innerHTML=h;
}

async function runN(id){const d=deployed.find(d=>d.id===id);if(!d)return;d.state='running';renderFactory();let input=null;const inC=connections.filter(c=>c.to===id);if(inC.length){input={};inC.forEach(c=>{const s=deployed.find(dd=>dd.id===c.from);if(s?.output)Object.assign(input,s.output)})}try{d.output=await d.def.run(input);d.state='done'}catch(e){d.output={error:e.message};d.state='error'}renderFactory();if(sel===id)selectN(id)}

function removeN(id){deployed=deployed.filter(d=>d.id!==id);connections=connections.filter(c=>c.from!==id&&c.to!==id);renderFactory();document.getElementById('nCt').textContent=deployed.length;document.getElementById('insp-body').innerHTML='<div style="padding:8px;font-size:8px;color:var(--td);text-align:center">Select a nanite</div>'}

function doExport(fmt){
  const el=document.getElementById('exp-code');
  if(fmt==='json'){
    el.textContent=JSON.stringify({tool:'TOPH UNIFIED FIELD v1.0',owner:'TriPod LLC',generated:new Date().toISOString(),scanFindings:F,deployedNanites:deployed.map(d=>({id:d.id,nanite:d.def.id,name:d.def.name,state:d.state,output:d.output})),connections,totalVectors:F.length,critical:F.filter(f=>f.sev==='CRITICAL').length,patricia:F.filter(f=>f.patricia).length},null,2);
  }else if(fmt==='report'){
    let t=`TOPH UNIFIED FIELD — SYSTEM REPORT\nGenerated: ${new Date().toISOString()}\nRoth · Dawn · TriPod LLC\n${'═'.repeat(50)}\n\n`;
    t+=`VECTORS: ${F.length} | CRITICAL: ${F.filter(f=>f.sev==='CRITICAL').length} | PATRICIA: ${F.filter(f=>f.patricia).length}\nNANITES DEPLOYED: ${deployed.length} | CONNECTIONS: ${connections.length}\n\n`;
    const g={};F.forEach(f=>{if(!g[f.tool])g[f.tool]=[];g[f.tool].push(f)});
    Object.entries(g).forEach(([t2,items])=>{t+=`${'─'.repeat(40)}\n${t2}\n${'─'.repeat(40)}\n`;items.forEach(f=>{t+=`[${f.sev}]${f.patricia?' [P]':''} ${f.name}: ${f.value}\n  → ${f.desc}\n`});t+='\n'});
    if(deployed.length){t+=`\n${'═'.repeat(40)}\nDEPLOYED NANITES\n${'═'.repeat(40)}\n`;deployed.forEach(d=>{t+=`${d.def.id}: ${d.def.name} [${d.state}]\n`;if(d.output)t+=JSON.stringify(d.output,null,2)+'\n\n'})}
    el.textContent=t;
  }else{
    const blob=new Blob([document.getElementById('exp-code').textContent],{type:'text/plain'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`unified_field_${new Date().toISOString().slice(0,10)}.txt`;a.click();
  }
}
