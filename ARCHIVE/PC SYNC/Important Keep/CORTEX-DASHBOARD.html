<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORTEX DASHBOARD · COMMUNICATION · AVAN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;scrollbar-width:thin;scrollbar-color:rgba(64,144,255,.2) #080c14}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#080c14}::-webkit-scrollbar-thumb{background:rgba(64,144,255,.25);border-radius:3px}
body{background:#080c14;color:#a0c0d8;font-family:'JetBrains Mono',monospace;overflow:hidden;height:100vh}

/* GRID LAYOUT */
.dashboard{display:grid;grid-template-columns:320px 1fr 300px;grid-template-rows:52px 1fr 48px;height:100vh;gap:1px;background:#0a1018}

/* TASKBAR */
.taskbar{grid-column:1/-1;display:flex;align-items:center;padding:0 16px;gap:12px;background:#080c14;border-bottom:1px solid rgba(64,144,255,.08)}
.tb-orb{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#60bbff,#2060a0 50%,#103060);box-shadow:0 0 12px rgba(64,144,255,.4),0 0 30px rgba(64,144,255,.1);animation:orbPulse 3s ease-in-out infinite}
@keyframes orbPulse{0%,100%{box-shadow:0 0 12px rgba(64,144,255,.4),0 0 30px rgba(64,144,255,.1)}50%{box-shadow:0 0 18px rgba(64,144,255,.6),0 0 40px rgba(64,144,255,.2)}}
.tb-title{font-family:'Orbitron';font-weight:900;font-size:clamp(12px,1.4vw,18px);letter-spacing:clamp(3px,.6vw,7px);color:#4090ff;text-shadow:0 0 14px rgba(64,144,255,.3)}
.tb-tag{font-family:'Orbitron';font-size:8px;font-weight:700;letter-spacing:3px;color:#60d090;padding:2px 6px;border:1px solid rgba(96,208,144,.15);border-radius:3px;margin-left:8px}
.tb-sep{flex:1}
.tb-stat{font-family:'Orbitron';font-size:clamp(8px,.8vw,10px);letter-spacing:2px;color:#2a5a7a;text-align:right}
.tb-stat span{color:#4090ff;font-weight:700}

/* LEFT PANEL — SEED */
.left{background:#080c14;border-right:1px solid rgba(64,144,255,.06);display:flex;flex-direction:column;overflow:hidden}
.left-header{padding:12px 14px;border-bottom:1px solid rgba(64,144,255,.06);flex-shrink:0}
.left-title{font-family:'Orbitron';font-size:11px;font-weight:800;letter-spacing:4px;color:#4090ff}
.left-sub{font-size:9px;color:#2a5a7a;letter-spacing:2px;margin-top:2px}
.seed-nav{display:flex;flex-wrap:wrap;gap:3px;padding:8px 14px;border-bottom:1px solid rgba(64,144,255,.04);flex-shrink:0}
.seed-btn{font-size:9px;font-weight:700;letter-spacing:1px;padding:4px 8px;border-radius:3px;cursor:pointer;border:1px solid rgba(64,144,255,.1);background:transparent;color:#3a6a8a;transition:all .15s;font-family:'JetBrains Mono'}
.seed-btn:hover{background:rgba(64,144,255,.06);color:#60a0cc}
.seed-btn.active{background:rgba(64,144,255,.1);border-color:rgba(64,144,255,.25);color:#4090ff}
.seed-content{flex:1;overflow-y:auto;padding:12px 14px;font-size:11px;line-height:1.8}
.seed-content h3{font-family:'Orbitron';font-size:10px;font-weight:700;letter-spacing:3px;color:#ffaa40;margin:14px 0 6px}
.seed-content h4{font-size:10px;font-weight:700;letter-spacing:2px;color:#60d090;margin:10px 0 4px}
.seed-content .kv{display:grid;grid-template-columns:100px 1fr;gap:1px 8px;margin:4px 0}
.seed-content .k{color:#2a5a7a;font-size:10px;font-weight:600}
.seed-content .v{color:#8ab0c8;font-size:10px}
.seed-content .v.hot{color:#ff6080}
.seed-content .v.cob{color:#4090ff}
.seed-content .axiom{display:flex;gap:6px;padding:3px 0;border-bottom:1px solid rgba(64,144,255,.03)}
.seed-content .aid{font-family:'Orbitron';font-size:8px;font-weight:700;color:#4090ff;min-width:36px}
.seed-content .aname{color:#60a0cc;font-weight:600;font-size:10px;min-width:90px}
.seed-content .adesc{color:#4a7a9a;font-size:9px}

/* CENTER — CORTEX VOICE + SPHERE */
.center{background:#080c14;display:flex;flex-direction:column;overflow:hidden;position:relative}
.sphere-container{position:relative;height:45%;min-height:200px;overflow:hidden}
.sphere-container canvas{width:100%!important;height:100%!important}
.sphere-overlay{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:5}
.sphere-label{font-family:'Orbitron';font-size:clamp(10px,1.2vw,14px);font-weight:800;letter-spacing:5px;color:rgba(64,144,255,.5);text-shadow:0 0 12px rgba(64,144,255,.2)}
.sphere-sub{font-size:clamp(7px,.7vw,9px);letter-spacing:3px;color:rgba(64,144,255,.25);margin-top:2px}

.voice-header{padding:10px 16px;border-bottom:1px solid rgba(64,144,255,.06);display:flex;align-items:center;gap:8px;flex-shrink:0}
.voice-dot{width:8px;height:8px;border-radius:50%;background:#4090ff;box-shadow:0 0 8px rgba(64,144,255,.5);animation:orbPulse 2s ease-in-out infinite}
.voice-title{font-family:'Orbitron';font-size:10px;font-weight:700;letter-spacing:3px;color:#4090ff}
.voice-scope{font-size:8px;letter-spacing:2px;color:#2a5a7a;margin-left:auto}
.voice-feed{flex:1;overflow-y:auto;padding:12px 16px}
.voice-msg{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(64,144,255,.04)}
.voice-msg .from{font-family:'Orbitron';font-size:8px;font-weight:700;letter-spacing:3px;margin-bottom:4px}
.voice-msg .from.cortex{color:#4090ff}
.voice-msg .from.david{color:#ffaa40}
.voice-msg .from.mirror{color:#a060ff}
.voice-msg .from.akasha{color:#60d090}
.voice-msg .text{font-size:11px;line-height:1.8;color:#8ab0c8}
.voice-msg .text em{color:#4090ff;font-style:normal;font-weight:600}
.voice-msg .text strong{color:#ffaa40;font-weight:700}
.voice-msg .ts{font-size:8px;color:#1a3a5a;letter-spacing:1px;margin-top:4px}
.voice-input{display:flex;gap:8px;padding:10px 16px;border-top:1px solid rgba(64,144,255,.06);flex-shrink:0}
.voice-input input{flex:1;background:#0a1220;border:1px solid rgba(64,144,255,.12);border-radius:4px;padding:8px 12px;color:#80b0d0;font-family:'JetBrains Mono';font-size:11px;outline:none;transition:border-color .2s}
.voice-input input:focus{border-color:rgba(64,144,255,.3)}
.voice-input input::placeholder{color:#1a3a5a}
.voice-input button{font-family:'Orbitron';font-size:9px;font-weight:700;letter-spacing:2px;padding:8px 14px;background:rgba(64,144,255,.1);border:1px solid rgba(64,144,255,.2);border-radius:4px;color:#4090ff;cursor:pointer;transition:all .2s}
.voice-input button:hover{background:rgba(64,144,255,.18);border-color:rgba(64,144,255,.35)}

.right{background:#080c14;border-left:1px solid rgba(64,144,255,.06);display:flex;flex-direction:column;overflow:hidden}
.right-tabs{display:flex;border-bottom:1px solid rgba(64,144,255,.06);flex-shrink:0}
.right-tab{flex:1;padding:10px 8px;text-align:center;font-family:'Orbitron';font-size:9px;font-weight:700;letter-spacing:2px;color:#2a5a7a;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.right-tab:hover{color:#4a7a9a}
.right-tab.active{color:#4090ff;border-bottom-color:#4090ff}

.mirror-label{font-family:'Orbitron';font-size:8px;font-weight:700;letter-spacing:3px;color:#a060ff;margin-bottom:6px}
.mirror-text{font-size:10px;color:#8a80b0;line-height:1.8}
.mirror-text em{color:#a060ff;font-style:normal}
.mirror-text strong{color:#ffaa40}

/* TETHER ENTRIES */
.tether-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(64,144,255,.03)}
.tether-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tether-name{font-size:10px;font-weight:600;color:#60a0cc}
.tether-state{font-size:8px;letter-spacing:2px;margin-left:auto}

/* BOTTOM BAR */
.bottombar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#080c14;border-top:1px solid rgba(64,144,255,.06)}
.bb-tether{font-family:'Orbitron';font-size:clamp(8px,.8vw,10px);letter-spacing:3px;color:#1a3a5a}
.bb-tether span{color:#4090ff}
.bb-wave{flex:1;max-width:300px;margin:0 20px;height:24px}
.bb-wave canvas{width:100%;height:100%}
.bb-stack{font-family:'Orbitron';font-size:clamp(8px,.8vw,10px);letter-spacing:2px;color:#1a3a5a}
.bb-stack span{color:#4090ff;font-weight:700}
</style>
</head>

  wctx.shadowColor='#4090ff';wctx.shadowBlur=8;
  for(let i=0;i<128;i++){const x=i/128*w;const idx=(wi+i)%128;const y=h/2-wave[idx]*h*.4;if(i===0)wctx.moveTo(x,y);else wctx.lineTo(x,y)}
  wctx.stroke();wctx.shadowBlur=0;
}
setInterval(drawWave,33);

addEventListener('resize',()=>{resizeSphere();rwv()});
</script>
