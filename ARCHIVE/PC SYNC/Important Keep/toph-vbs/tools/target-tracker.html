nav{background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:48px;position:sticky;top:0;z-index:100}

main{padding:20px 24px;max-width:1200px;margin:0 auto}

let sortField = 'id', sortDir = 'asc';

function renderTargetStats() {
  const total = targets.length;
  const violations = targets.filter(t=>t.status==='violation'||t.status==='escalated'||t.status==='legal').length;
  const vCount = targets.reduce((s,t)=>s+t.violations,0);
  const industries = new Set(targets.map(t=>t.industry)).size;
  const legal = targets.filter(t=>t.status==='legal').length;
  const rate = total > 0 ? Math.round(targets.filter(t=>t.violations>0).length/total*100) : 0;

  document.getElementById('target-stats').innerHTML = `
    <div class="stat"><div class="stat-n" style="color:var(--gold)">${total}</div><div class="stat-l">Targets</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--red)">${vCount}</div><div class="stat-l">Violations</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--ember)">${rate}%</div><div class="stat-l">Fail Rate</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--cyan)">${industries}</div><div class="stat-l">Industries</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--purple)">${legal}</div><div class="stat-l">Legal</div></div>
  `;
}

function renderTargets() {
  const q = document.getElementById('t-search').value.toLowerCase();
  const fs = document.getElementById('t-filter-status').value;
  const fi = document.getElementById('t-filter-industry').value;

  let list = [...targets];
  if (q) list = list.filter(t => t.company.toLowerCase().includes(q) || t.industry.toLowerCase().includes(q) || t.notes.toLowerCase().includes(q));
  if (fs) list = list.filter(t => t.status === fs);
  if (fi) list = list.filter(t => t.industry === fi);

  list.sort((a, b) => {
    let av = a[sortField], bv = b[sortField];
    if (typeof av === 'string') { av = av.toLowerCase(); bv = (bv||'').toLowerCase(); }
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  const statusClass = {new:'b-new',contacted:'b-contacted',responded:'b-responded',violation:'b-violation',escalated:'b-escalated',legal:'b-legal',closed:'b-closed'};
  const sevClass = {critical:'b-critical',high:'b-high',medium:'b-medium',low:'b-low'};

  document.getElementById('t-body').innerHTML = list.map(t => `
    <tr class="${t.status==='legal'?'active-case':''}" style="cursor:pointer" data-id="${t.id}">
      <td style="color:var(--ash)">${t.id}</td>
      <td style="color:var(--chalk);font-weight:600">${t.company}${t.location?' <span style="color:var(--ash);font-weight:400;font-size:8px">'+t.location+'</span>':''}</td>
      <td>${t.industry}</td>
      <td><span class="badge ${statusClass[t.status]||''}">${t.status.toUpperCase()}</span></td>
      <td><span class="badge ${sevClass[t.severity]||''}">${t.severity.toUpperCase()}</span></td>
      <td style="color:${t.violations>0?'var(--red)':'var(--ash)';};font-weight:${t.violations>0?'700':'400'}">${t.violations}</td>
      <td style="color:var(--ash)">${t.contacted||'—'}</td>
      <td style="color:var(--ash)">${t.lastAction||'—'}</td>
      <td style="font-size:8px;color:var(--ash)">${t.email||'—'}</td>
    </tr>
  `).join('');

  document.querySelectorAll('#t-body tr').forEach(tr => {
    tr.addEventListener('click', () => openTargetDetail(parseInt(tr.dataset.id)));
  });

  renderTargetStats();
}

// SORT
document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const f = th.dataset.sort;
    if (sortField === f) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortField = f; sortDir = 'asc'; }
    renderTargets();
  });
});

// FILTERS
document.getElementById('t-search').addEventListener('input', renderTargets);
document.getElementById('t-filter-status').addEventListener('change', renderTargets);
document.getElementById('t-filter-industry').addEventListener('change', renderTargets);

// ADD TARGET
document.getElementById('btn-add-target').addEventListener('click', () => {
  targets.push({id:nextTargetId++,company:'New Target',location:'',industry:'Other',email:'',status:'new',severity:'medium',violations:0,contacted:'',lastAction:'',notes:'',timeline:[]});
  renderTargets();
  openTargetDetail(nextTargetId-1);
});

// TARGET DETAIL
function openTargetDetail(id) {
  const t = targets.find(x => x.id === id);
  if (!t) return;
  const panel = document.getElementById('detail-panel');
  document.getElementById('det-title').textContent = t.company;
  panel.classList.add('open');

  const statusOpts = ['new','contacted','responded','violation','escalated','legal','closed'].map(s =>
    `<option value="${s}"${t.status===s?' selected':''}>${s.toUpperCase()}</option>`).join('');
  const sevOpts = ['critical','high','medium','low'].map(s =>
    `<option value="${s}"${t.severity===s?' selected':''}>${s.toUpperCase()}</option>`).join('');

  let html = `
    <div class="df"><label>Company</label><input type="text" value="${t.company}" onchange="updTarget(${id},'company',this.value)"></div>
    <div class="df"><label>Location</label><input type="text" value="${t.location||''}" onchange="updTarget(${id},'location',this.value)"></div>
    <div style="display:flex;gap:8px">
      <div class="df" style="flex:1"><label>Status</label><select onchange="updTarget(${id},'status',this.value)">${statusOpts}</select></div>
      <div class="df" style="flex:1"><label>Severity</label><select onchange="updTarget(${id},'severity',this.value)">${sevOpts}</select></div>
    </div>
    <div style="display:flex;gap:8px">
      <div class="df" style="flex:1"><label>Industry</label><input type="text" value="${t.industry}" onchange="updTarget(${id},'industry',this.value)"></div>
      <div class="df" style="flex:1"><label>Violations</label><input type="number" value="${t.violations}" onchange="updTarget(${id},'violations',parseInt(this.value))"></div>
    </div>
    <div class="df"><label>Email</label><input type="text" value="${t.email||''}" onchange="updTarget(${id},'email',this.value)"></div>
    <div class="df"><label>Notes</label><textarea onchange="updTarget(${id},'notes',this.value)">${t.notes||''}</textarea></div>
    <div style="display:flex;gap:8px">
      <div class="df" style="flex:1"><label>First Contact</label><input type="date" value="${t.contacted||''}" onchange="updTarget(${id},'contacted',this.value)"></div>
      <div class="df" style="flex:1"><label>Last Action</label><input type="date" value="${t.lastAction||''}" onchange="updTarget(${id},'lastAction',this.value)"></div>
    </div>

    <h3 style="margin-top:16px;font-family:'Outfit',sans-serif;font-weight:700;font-size:11px;color:var(--cyan)">Timeline</h3>
    <div class="timeline" id="det-timeline"></div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-s btn-sm" onclick="addTimelineEntry(${id},'contact','Contact made')">+ Contact</button>
      <button class="btn btn-d btn-sm" onclick="addTimelineEntry(${id},'violation','Violation documented')">+ Violation</button>
      <button class="btn btn-sm" style="background:rgba(90,138,42,.1);border:1px solid rgba(90,138,42,.25);color:var(--gb)" onclick="addTimelineEntry(${id},'response','Response received')">+ Response</button>
      <button class="btn btn-sm" style="background:rgba(138,106,170,.1);border:1px solid rgba(138,106,170,.25);color:var(--purple)" onclick="addTimelineEntry(${id},'legal','Legal action')">+ Legal</button>
    </div>
    <div class="btn-row" style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
      <button class="btn btn-d btn-sm" onclick="deleteTarget(${id})">DELETE TARGET</button>
    </div>
  `;

  document.getElementById('det-body').innerHTML = html;
  renderTimeline(t);
}

function renderTimeline(t) {
  const el = document.getElementById('det-timeline');
  if (!el) return;
  if (!t.timeline || !t.timeline.length) { el.innerHTML = '<div style="font-size:8px;color:var(--ash);padding:8px 0">No timeline entries</div>'; return; }
  el.innerHTML = t.timeline.map(e => `
    <div class="tl-item tl-${e.type}">
      <div class="tl-date">${e.date}</div>
      <div class="tl-type" style="color:${e.type==='violation'?'var(--red)':e.type==='contact'?'var(--cyan)':e.type==='response'?'var(--gb)':e.type==='legal'?'var(--purple)':'var(--ash)'}">${e.type.toUpperCase()}</div>
      <div class="tl-text">${e.text}</div>
    </div>
  `).join('');
}

window.updTarget = function(id, field, val) {
  const t = targets.find(x => x.id === id);
  if (t) { t[field] = val; renderTargets(); }
};

window.addTimelineEntry = function(id, type, defaultText) {
  const t = targets.find(x => x.id === id);
  if (!t) return;
  if (!t.timeline) t.timeline = [];
  const text = prompt('Describe this event:', defaultText);
  if (!text) return;
  t.timeline.push({ date: new Date().toISOString().split('T')[0], type, text });
  t.lastAction = new Date().toISOString().split('T')[0];
  if (type === 'violation') t.violations++;
  renderTimeline(t);
  renderTargets();
};

window.deleteTarget = function(id) {
  if (!confirm('Delete this target?')) return;
  targets = targets.filter(t => t.id !== id);
  document.getElementById('detail-panel').classList.remove('open');
  renderTargets();
};

document.getElementById('det-close').addEventListener('click', () => {
  document.getElementById('detail-panel').classList.remove('open');
});

// ═══════════════════════════════════════
// LEGAL CASES
// ═══════════════════════════════════════
function renderCases() {
  const cl = document.getElementById('cases-list');
  cl.innerHTML = cases.map(c => `
    <div class="case-card${c.status==='active'?' active':''}">
      <div class="cc-header">
        <div class="cc-name">${c.name}</div>
        <span class="badge ${c.status==='active'?'b-violation':c.status==='pending'?'b-contacted':'b-closed'}">${c.status.toUpperCase()}</span>
      </div>
      <div class="cc-desc">${c.desc}</div>
      <div class="cc-meta">
        <span>Type: ${c.type}</span>
        <span>Filed: ${c.filed}</span>
        <span>Evidence: ${c.evidence.join(', ')}</span>
        <span>Axioms: ${c.axioms.join(', ')}</span>
      </div>
      <div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
        ${c.timeline.map(e => `<div style="font-size:8px;color:var(--bone);padding:2px 0"><span style="color:var(--ash)">${e.date}</span> — ${e.text}</div>`).join('')}
      </div>
    </div>
  `).join('');
}

document.getElementById('btn-add-case').addEventListener('click', () => {
  const name = prompt('Case name:');
  if (!name) return;
  cases.push({id:cases.length+1,name,status:'active',type:'ADA Complaint',filed:new Date().toISOString().split('T')[0],targetId:null,desc:'',evidence:[],axioms:[],timeline:[{date:new Date().toISOString().split('T')[0],text:'Case opened'}]});
  renderCases();
});

// ═══════════════════════════════════════
// PIPELINE
// ═══════════════════════════════════════
const STAGES = [
  {id:'prospect',name:'PROSPECT',color:'var(--ash)'},
  {id:'contacted',name:'CONTACTED',color:'var(--amber)'},
  {id:'negotiating',name:'NEGOTIATING',color:'var(--ember)'},
  {id:'engaged',name:'ENGAGED',color:'var(--gb)'},
  {id:'complete',name:'COMPLETE',color:'var(--cyan)'},
];

function renderPipeline() {
  const cols = document.getElementById('pipe-cols');
  cols.innerHTML = STAGES.map(s => {
    const stage = pipeline.find(p => p.stage === s.id);
    const items = stage ? stage.items : [];
    return `<div class="pipe-col">
      <div class="pipe-col-header">
        <span class="pipe-col-title" style="color:${s.color}">${s.name}</span>
        <span class="pipe-col-count">${items.length}</span>
      </div>
      <div class="pipe-col-body">
        ${items.map(i => `<div class="pipe-item">
          <div class="pipe-item-name">${i.name}</div>
          <div class="pipe-item-meta">${i.desc}</div>
          <div style="font-size:8px;color:var(--gold);font-weight:600;margin-top:3px">${i.value||''}</div>
        </div>`).join('')}
        ${!items.length ? '<div style="font-size:8px;color:var(--ash);padding:8px;text-align:center">Empty</div>' : ''}
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════
document.getElementById('btn-export').addEventListener('click', () => {
  let text = `TRIPOD LLC · TARGET TRACKER EXPORT\nP5495107 · ${new Date().toISOString()}\n${'═'.repeat(56)}\n\n`;
  text += `SUMMARY: ${targets.length} targets, ${targets.reduce((s,t)=>s+t.violations,0)} violations, ${new Set(targets.map(t=>t.industry)).size} industries\n`;
  text += `Fail rate: ${Math.round(targets.filter(t=>t.violations>0).length/targets.length*100)}%\n\n`;

  text += `TARGETS:\n${'─'.repeat(40)}\n`;
  targets.forEach(t => {
    text += `\n${t.id}. ${t.company} [${t.status.toUpperCase()}] ${t.severity.toUpperCase()}\n`;
    text += `   Industry: ${t.industry} | Violations: ${t.violations}\n`;
    text += `   Contacted: ${t.contacted||'N/A'} | Last: ${t.lastAction||'N/A'}\n`;
    if (t.notes) text += `   Notes: ${t.notes}\n`;
  });

  text += `\n\nLEGAL CASES:\n${'─'.repeat(40)}\n`;
  cases.forEach(c => {
    text += `\n${c.name} [${c.status.toUpperCase()}]\n`;
    text += `   Type: ${c.type} | Filed: ${c.filed}\n`;
    text += `   Evidence: ${c.evidence.join(', ')}\n`;
    text += `   ${c.desc}\n`;
  });

  text += `\n${'═'.repeat(56)}\nTriPod LLC · All rights reserved\n`;
  navigator.clipboard.writeText(text).then(() => {
    const b = document.getElementById('btn-export');
    b.textContent = '✓ COPIED'; setTimeout(() => b.textContent = '↗ EXPORT', 2000);
  });
});

// INIT
renderTargets();
renderCases();
renderPipeline();
</script>
</body>
</html>
