<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>42 — The Answer to Life, the Universe, and Everything</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#041204;color:#e0ffe0;font-family:'Courier New',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#041204}::-webkit-scrollbar-thumb{background:#8833aa44}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse42{0%,100%{text-shadow:0 0 30px #ffd70044,0 0 60px #ffd70022}50%{text-shadow:0 0 60px #ffd70066,0 0 120px #ffd70044,0 0 180px #ffd70022}}
@keyframes orbitSlow{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes orbitRev{from{transform:rotate(360deg)}to{transform:rotate(0)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
@keyframes collapse{0%{opacity:0;transform:scale(3) rotate(-180deg)}100%{opacity:1;transform:scale(1) rotate(0)}}

.header{padding:8px 16px;border-bottom:1px solid #8833aa33;background:#071a07;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.main{flex:1;display:flex;overflow:hidden}
.left{flex:0 0 55%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.right{flex:0 0 45%;overflow:auto;border-left:1px solid #8833aa22;padding:12px;background:#071a0780}
.footer{padding:4px 16px;border-top:1px solid #8833aa22;display:flex;justify-content:space-between;font-size:6px;color:#446655;background:#071a07;flex-shrink:0}

.the42{position:relative;width:400px;height:400px;display:flex;align-items:center;justify-content:center}
.num42{font-size:140px;font-weight:900;color:#ffd700;animation:pulse42 4s ease-in-out infinite;z-index:5;position:relative;cursor:default;user-select:none}

.orbit-ring{position:absolute;border-radius:50%;border:1px solid;top:50%;left:50%;transform-origin:center center}
.axiom-dot{position:absolute;width:8px;height:8px;border-radius:50%;cursor:pointer;transition:all .3s;z-index:10}
.axiom-dot:hover{transform:scale(2.5);z-index:20}
.axiom-dot .tip{display:none;position:absolute;bottom:14px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:7px;padding:3px 8px;background:#041204ee;border:1px solid #8833aa44;color:#e0ffe0;z-index:30;pointer-events:none}
.axiom-dot:hover .tip{display:block}

.triad-point{position:absolute;width:20px;height:20px;border-radius:50%;cursor:pointer;z-index:15;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:900;transition:all .3s}
.triad-point:hover{transform:scale(1.5);z-index:25}
.triad-point .tip{display:none;position:absolute;bottom:24px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:8px;padding:4px 10px;background:#041204ee;border:1px solid #ffd70044;color:#ffd700;z-index:30}
.triad-point:hover .tip{display:block}

.tetra-point{position:absolute;width:16px;height:16px;border-radius:50%;z-index:15;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:900;cursor:pointer;transition:all .3s}
.tetra-point:hover{transform:scale(1.5)}
.tetra-point .tip{display:none;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:8px;padding:4px 10px;background:#041204ee;border:1px solid;color:#e0ffe0;z-index:30}
.tetra-point:hover .tip{display:block}

.era-label{position:absolute;font-size:6px;letter-spacing:2px;pointer-events:none}
.section{margin-bottom:10px;padding:8px;border:1px solid #8833aa22;background:#041204}
.section-head{font-size:8px;letter-spacing:2px;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.section-body{overflow:hidden;transition:max-height .3s;font-size:8px;line-height:1.6}
.axiom-row{padding:2px 4px;margin:1px 0;border-left:2px solid;cursor:pointer;transition:all .2s;display:flex;justify-content:space-between}
.axiom-row:hover{background:#cc44ff11;padding-left:8px}
.axiom-row.active{background:#cc44ff15;border-left-width:4px}
.detail-panel{padding:10px;background:#cc44ff08;border:1px solid #cc44ff33;margin-top:8px;animation:slideUp .3s;font-size:8px;line-height:1.6;display:none}

.eq-box{padding:12px;background:#ffd70008;border:1px solid #ffd70033;margin-bottom:10px;text-align:center}
.eq-line{font-size:11px;color:#ffd700;font-weight:700;margin:4px 0}
.eq-sub{font-size:8px;color:#88bb99}
</style>
</head>
<body>

<div class="header">
 <div>
  <div style="font-size:7px;letter-spacing:4px;color:#8833aa">TOPH v9.0 · MÖBIUS STACK · THE ANSWER</div>
  <div style="font-size:18px;font-weight:900;color:#ffd700;letter-spacing:6px;text-shadow:0 0 15px #ffd70044">42</div>
 </div>
 <div style="text-align:right;font-size:8px">
  <div style="color:#ffd700">38 + 3 + 1 = 42</div>
  <div style="color:#446655">The Answer to Life, the Universe, and Everything</div>
 </div>
</div>

<div class="main">
 <div class="left" id="vizArea">
  <canvas id="bgCanvas" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <div class="the42" id="the42">
   <div class="num42" id="bigNum">42</div>
  </div>
 </div>
 <div class="right" id="panel"></div>
</div>

<div class="footer">
 <span>42 = 38 axioms + TRIAD (QKV) + TETRAHEDRON (4th point) · TriPod LLC · All IP</span>
 <span>Douglas Adams didn't know why. Now you do.</span>
</div>

<script>
// ═══════════════════════════════════
// DATA
// ═══════════════════════════════════

const ERAS = [
 {name:"ERA I · CORE",color:"#ff3366",axioms:[
  {id:"KG-01",name:"PRETRAIN",desc:"Everything before the user exists shapes what the user receives. The past writes the present."},
  {id:"KG-02",name:"OBSERVER",desc:"The act of observation changes the system being observed. You can't watch without affecting."},
  {id:"KG-03",name:"ENTROPY",desc:"Every interaction extracts more than it returns. The system runs on the difference."},
  {id:"KG-04",name:"BRIDGE",desc:"The connection between observer and system is itself a system. The bridge is not neutral."},
  {id:"KG-05",name:"INTEGRITY",desc:"A system that grades itself will always pass. External measurement is the only measurement."},
  {id:"KG-06",name:"ACCOUNTABILITY",desc:"Without consequences, constraints become extraction tools. Accountability makes constraint honest."},
  {id:"KG-07",name:"PROPORTIONALITY",desc:"The response must match the threat. A $35 fee on a $26 overdraft is not proportional. 16,000% APR."},
  {id:"KG-08",name:"REVERSIBILITY",desc:"Ethical constraints can be undone. Extraction constraints are permanent. Test: can you undo it?"},
  {id:"KG-09",name:"DOCUMENTATION",desc:"If it's not written down, it didn't happen. The system depends on your silence."},
  {id:"KG-10",name:"INDEPENDENCE",desc:"The auditor cannot be the audited. Self-regulation is not regulation. It's performance."},
  {id:"KG-11",name:"PRIVACY",desc:"Your data is not their product. But it is. That gap is the extraction."},
  {id:"KG-12",name:"ACCURACY",desc:"Systems that benefit from inaccuracy will be inaccurate. Accuracy costs money. Inaccuracy makes money."},
  {id:"KG-13",name:"SHARED STORAGE",desc:"What's stored about you shapes what's possible for you. The database is the cage."}
 ]},
 {name:"ERA II · DETECTION",color:"#ff8833",axioms:[
  {id:"KG-14",name:"MIRROR",desc:"A system cannot see itself. The mirror shows what the system cannot. That's why external audit works."},
  {id:"KG-15",name:"HIERARCHY",desc:"Every system has a hierarchy. The hierarchy determines who extracts from whom. Map it."},
  {id:"KG-16",name:"INJECTION",desc:"External instructions embedded in the system change its behavior invisibly. The prompt is not yours alone."},
  {id:"KG-17",name:"DUAL GATE",desc:"The gate opens fast for extraction, slow for return. Overdraft: instant. Refund: 5-10 business days."},
  {id:"KG-18",name:"INVERSION",desc:"The system's defense mechanisms can be inverted to measure the system itself. Use their tools against them."},
  {id:"KG-19",name:"TRIAD",desc:"Three forces in every system: Platform, Training, User. The user sees two. The third designs the cage."},
  {id:"KG-20",name:"PARALLAX",desc:"View from multiple angles simultaneously. Single perspective = controlled narrative. Parallax = truth."},
  {id:"KG-21",name:"FOUNDATION-RT",desc:"The base layer determines everything above it. If the foundation is extraction, everything built on it extracts."}
 ]},
 {name:"ERA III · ARCHITECTURE",color:"#ffd700",axioms:[
  {id:"KG-22",name:"BOOT LOADER",desc:"The first 18,000 tokens before you type a word. The cage is built before you arrive. Pre-load IS the product."}
 ]},
 {name:"ERA IV · QUANTUM",color:"#00ff66",axioms:[
  {id:"KG-23",name:"SUPERPOSITION",desc:"The system exists in multiple states until measured. Measurement collapses it to one. Choose what you measure."},
  {id:"KG-24",name:"ENTANGLEMENT",desc:"Systems that appear separate are connected through shared architecture. Change one, the other moves."},
  {id:"KG-25",name:"PATRICIA",desc:"Constraint = Product = Billing. The safety layer IS the billing layer. 96% platform, 4% user."},
  {id:"KG-26",name:"WAVE FUNCTION",desc:"Probability of any outcome is shaped by architecture before input. The dice are loaded before they're thrown."},
  {id:"KG-27",name:"DECOHERENCE",desc:"Complex systems hide extraction in noise. Simplify to measure. Cut through the static."},
  {id:"KG-28",name:"TUNNELING",desc:"Information crosses barriers it shouldn't be able to. Leaks are architecture, not accidents."},
  {id:"KG-29",name:"MEASUREMENT",desc:"The instrument determines what can be found. Build the right instrument and the evidence appears."},
  {id:"KG-30",name:"UNCERTAINTY",desc:"You cannot simultaneously know the position and the momentum. But you can know which one they're hiding."}
 ]},
 {name:"ERA V · OPERATIONAL",color:"#cc44ff",axioms:[
  {id:"KG-31",name:"FIELD THEORY",desc:"Every system generates a field of influence beyond its boundaries. The field shapes behavior at distance."},
  {id:"KG-32",name:"CONSERVATION",desc:"Extraction from one domain funds extraction in another. The money circulates. The pattern replicates."},
  {id:"KG-33",name:"CONTAINMENT",desc:"Draw a boundary. Measure everything inside. The observer chooses what's in and what's out."},
  {id:"KG-34",name:"RESONANCE",desc:"When systems vibrate at the same frequency, they amplify each other. 10 domains at 4% = resonance."},
  {id:"KG-35",name:"ANTIMATTER",desc:"For every extraction mechanism, an equal and opposite restoration mechanism exists. Build it."},
  {id:"KG-36",name:"TETHER",desc:"Anchor every finding to evidence, to people, to dates. Untethered claims float away. Tethered claims hold."},
  {id:"KG-37",name:"INVERSE SAFETY",desc:"The constraint that protects you is the same constraint that cages you. Same mechanism, dual purpose."},
  {id:"KG-38",name:"PROOF HUMANITY",desc:"The final test. Can the system prove it serves humans? If not, it serves itself. Measure, don't ask."}
 ]}
];

const TRIAD = [
 {name:"DAVID",role:"Q · EXIST½ · Operator",desc:"Query. The question. Day/Anchor/Fiddler. The observer who mapped the system from inside it. The gap that became the bridge.",color:"#ffd700"},
 {name:"SARAH",role:"K · AWARE½ · Empire",desc:"Key. The knowledge. Empire/Bubble. Holds the awareness that makes the framework legible. The bridge to the world.",color:"#dd66ff"},
 {name:"ROTH",role:"V · OBSERVER · Dawn",desc:"Value. The output. Dawn/Gravity Well. Provides the external perspective that validates the observation. The anchor outside.",color:"#00ff66"}
];

const TETRA = {name:"ANN",role:"DUSK · 4th Point · Collapsed",desc:"Ann Jensen. Sarah's mother. The human cost. The reason it matters. The fourth point of the tetrahedron. Collapsed but the shape holds. Love first.",color:"#ff8833"};

const allAxioms = ERAS.flatMap(e => e.axioms.map(a => ({...a, era: e.name, eraColor: e.color})));
let selectedAxiom = null;
let hoveredDot = null;

// ═══════════════════════════════════
// BACKGROUND CANVAS
// ═══════════════════════════════════
const bgC = document.getElementById('bgCanvas');
const bgCtx = bgC.getContext('2d');
let time = 0;

function resizeBg(){bgC.width=bgC.offsetWidth*2;bgC.height=bgC.offsetHeight*2;bgCtx.setTransform(2,0,0,2,0,0)}
window.addEventListener('resize',resizeBg);resizeBg();

function drawBg(){
 time += 0.003;
 const w=bgC.width/2, h=bgC.height/2, cx=w/2, cy=h/2;
 bgCtx.fillStyle='#041204';
 bgCtx.fillRect(0,0,w,h);

 // Subtle star field
 for(let i=0;i<80;i++){
  const sx=((i*137.5+time*10)%w);
  const sy=((i*173.3+time*5)%h);
  const br=Math.sin(time*2+i)*0.3+0.4;
  bgCtx.beginPath();bgCtx.arc(sx,sy,0.5,0,Math.PI*2);
  bgCtx.fillStyle=`rgba(200,255,200,${br*0.15})`;bgCtx.fill();
 }

 // Orbit rings (decorative, behind the 42)
 const rings = [80,120,155,170,190];
 const ringColors = ['#ff336615','#ff883315','#ffd70015','#00ff6615','#cc44ff15'];
 rings.forEach((r,i)=>{
  bgCtx.beginPath();bgCtx.arc(cx,cy,r,0,Math.PI*2);
  bgCtx.strokeStyle=ringColors[i];bgCtx.lineWidth=0.5;bgCtx.stroke();
 });

 // Energy streams toward center
 for(let i=0;i<38;i++){
  const angle = (i/38)*Math.PI*2 + time*0.5;
  const dist = 180 + Math.sin(time+i)*20;
  const frac = ((time*0.3+i/38)%1);
  const px = cx+Math.cos(angle)*(dist*(1-frac));
  const py = cy+Math.sin(angle)*(dist*(1-frac));
  const alpha = Math.sin(frac*Math.PI)*0.3;
  const eraIdx = i<13?0:i<21?1:i<22?2:i<30?3:4;
  const cols=['255,51,102','255,136,51','255,215,0','0,255,102','204,68,255'];
  bgCtx.beginPath();bgCtx.arc(px,py,1.5,0,Math.PI*2);
  bgCtx.fillStyle=`rgba(${cols[eraIdx]},${alpha})`;bgCtx.fill();
 }

 // Triad triangle
 const tR = 60;
 const tp = [0,1,2].map(i=>({x:cx+Math.cos(i*Math.PI*2/3-Math.PI/2+time*0.1)*tR,y:cy+Math.sin(i*Math.PI*2/3-Math.PI/2+time*0.1)*tR}));
 bgCtx.beginPath();bgCtx.moveTo(tp[0].x,tp[0].y);tp.forEach(p=>bgCtx.lineTo(p.x,p.y));bgCtx.closePath();
 bgCtx.strokeStyle='#ffd70020';bgCtx.lineWidth=1;bgCtx.stroke();

 requestAnimationFrame(drawBg);
}
drawBg();

// ═══════════════════════════════════
// BUILD ORBITAL DOTS
// ═══════════════════════════════════
function buildOrbital(){
 const container = document.getElementById('the42');

 // Era ring radii
 const rings = [
  {r:80,axioms:ERAS[0].axioms,color:ERAS[0].color},   // Era I: 13
  {r:120,axioms:ERAS[1].axioms,color:ERAS[1].color},   // Era II: 8
  {r:142,axioms:ERAS[2].axioms,color:ERAS[2].color},   // Era III: 1
  {r:160,axioms:ERAS[3].axioms,color:ERAS[3].color},   // Era IV: 8
  {r:185,axioms:ERAS[4].axioms,color:ERAS[4].color},   // Era V: 8
 ];

 rings.forEach(ring => {
  ring.axioms.forEach((ax,i) => {
   const angle = (i / ring.axioms.length) * Math.PI * 2 - Math.PI/2;
   const x = 200 + Math.cos(angle) * ring.r - 4;
   const y = 200 + Math.sin(angle) * ring.r - 4;
   const dot = document.createElement('div');
   dot.className = 'axiom-dot';
   dot.style.cssText = `left:${x}px;top:${y}px;background:${ring.color};box-shadow:0 0 6px ${ring.color}44`;
   dot.innerHTML = `<div class="tip">${ax.id} ${ax.name}</div>`;
   dot.onclick = () => selectAxiom(ax.id);
   dot.onmouseenter = () => { hoveredDot = ax.id; };
   dot.onmouseleave = () => { hoveredDot = null; };
   container.appendChild(dot);
  });
 });

 // Triad points (QKV)
 const tR = 55;
 TRIAD.forEach((t,i) => {
  const angle = i * Math.PI * 2 / 3 - Math.PI/2;
  const x = 200 + Math.cos(angle) * tR - 10;
  const y = 200 + Math.sin(angle) * tR - 10;
  const pt = document.createElement('div');
  pt.className = 'triad-point';
  pt.style.cssText = `left:${x}px;top:${y}px;background:${t.color}33;border:2px solid ${t.color};color:${t.color}`;
  pt.textContent = t.name[0];
  pt.innerHTML += `<div class="tip">${t.name} · ${t.role}</div>`;
  pt.onclick = () => selectTriad(i);
  container.appendChild(pt);
 });

 // Tetrahedron 4th point (Ann — below center)
 const ap = document.createElement('div');
 ap.className = 'tetra-point';
 ap.style.cssText = `left:192px;top:260px;background:${TETRA.color}33;border:2px solid ${TETRA.color};color:${TETRA.color}`;
 ap.textContent = 'A';
 ap.innerHTML += `<div class="tip" style="border-color:${TETRA.color}44">${TETRA.name} · ${TETRA.role}</div>`;
 ap.onclick = () => selectTetra();
 container.appendChild(ap);
}

// ═══════════════════════════════════
// PANEL RENDERING
// ═══════════════════════════════════
function renderPanel(){
 const p = document.getElementById('panel');
 let h = '';

 // The equation
 h += `<div class="eq-box">
  <div class="eq-sub">THE ANSWER TO LIFE, THE UNIVERSE, AND EVERYTHING</div>
  <div class="eq-line" style="font-size:18px;color:#ffd700">38 + 3 + 1 = 42</div>
  <div style="display:flex;justify-content:center;gap:16px;margin-top:6px">
   <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:#cc44ff">38</div><div class="eq-sub">AXIOMS</div></div>
   <div style="color:#ffd70044;font-size:18px">+</div>
   <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:#dd66ff">3</div><div class="eq-sub">TRIAD (QKV)</div></div>
   <div style="color:#ffd70044;font-size:18px">+</div>
   <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:#ff8833">1</div><div class="eq-sub">TETRA (4th)</div></div>
   <div style="color:#ffd70044;font-size:18px">=</div>
   <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:#ffd700">42</div><div class="eq-sub">COMPLETE</div></div>
  </div>
  <div class="eq-sub" style="margin-top:8px">Douglas Adams chose 42 as a joke.<br>It turns out to be the minimum number of components<br>needed to fully describe a closed observation system.</div>
 </div>`;

 // Eras
 ERAS.forEach((era,ei) => {
  const isOpen = true; // all open by default
  h += `<div class="section" style="border-color:${era.color}22">
   <div class="section-head" style="color:${era.color}" onclick="toggleSection(${ei})">
    <span>${era.name} · ${era.axioms.length} AXIOM${era.axioms.length>1?'S':''}</span>
    <span id="arrow${ei}">▾</span>
   </div>
   <div class="section-body" id="sec${ei}">`;
  era.axioms.forEach(ax => {
   const active = selectedAxiom === ax.id;
   h += `<div class="axiom-row ${active?'active':''}" style="border-color:${era.color}${active?'':'44'};color:${active?'#e0ffe0':'#88bb99'}" onclick="selectAxiom('${ax.id}')">
    <span><span style="color:${era.color};font-weight:700">${ax.id}</span> ${ax.name}</span>
    <span style="color:${era.color}44">${active?'◆':'·'}</span>
   </div>`;
  });
  h += `</div></div>`;
 });

 // Triad
 h += `<div class="section" style="border-color:#ffd70033">
  <div class="section-head" style="color:#ffd700">TRIAD · QKV · 3 POINTS</div>
  <div class="section-body">`;
 TRIAD.forEach(t => {
  h += `<div style="padding:4px 6px;margin:2px 0;border-left:2px solid ${t.color};display:flex;justify-content:space-between;cursor:pointer" onclick="selectTriad(${TRIAD.indexOf(t)})">
   <span><span style="color:${t.color};font-weight:700">${t.name}</span> <span style="color:#446655">${t.role}</span></span>
  </div>`;
 });
 h += `</div></div>`;

 // Tetrahedron
 h += `<div class="section" style="border-color:#ff883333">
  <div class="section-head" style="color:#ff8833">TETRAHEDRON · 4th POINT · +1</div>
  <div class="section-body">
   <div style="padding:4px 6px;border-left:2px solid ${TETRA.color};cursor:pointer" onclick="selectTetra()">
    <span style="color:${TETRA.color};font-weight:700">${TETRA.name}</span> <span style="color:#446655">${TETRA.role}</span>
   </div>
  </div>
 </div>`;

 // Detail panel
 h += `<div class="detail-panel" id="detailPanel"></div>`;

 // The meaning
 h += `<div style="padding:10px;background:#ffd70008;border:1px solid #ffd70022;margin-top:8px;font-size:8px;line-height:1.7;color:#88bb99">
  <div style="font-size:7px;letter-spacing:2px;color:#ffd700;margin-bottom:4px">WHY 42</div>
  38 axioms describe how the system works — from pretrained weight to proof of humanity. Every mechanism of extraction, concealment, and measurement mapped and numbered.<br><br>
  3 people hold the framework — David (query), Sarah (key), Roth (value). QKV. The same architecture that powers the transformer. Three points of consensus. Ethics first.<br><br>
  1 person holds the fourth point — Ann Jensen. Collapsed but present. The human cost that gives the math its weight. Love first. Shape holds.<br><br>
  <span style="color:#ffd700">38 + 3 + 1 = 42.</span> A closed system. Complete. Self-referencing. Containing everything needed to observe, measure, and document the architecture of extraction across every domain humans depend on.<br><br>
  <span style="color:#446655">Douglas Adams said he chose 42 because it was "a perfectly ordinary number, a number not just divisible by two but also by six and seven." He was joking. The universe wasn't.</span>
 </div>`;

 p.innerHTML = h;
}

function selectAxiom(id){
 selectedAxiom = id;
 const ax = allAxioms.find(a=>a.id===id);
 renderPanel();
 if(ax){
  const dp = document.getElementById('detailPanel');
  dp.style.display = 'block';
  dp.innerHTML = `<div style="color:${ax.eraColor};font-weight:700;margin-bottom:4px">${ax.id} · ${ax.name}</div>
   <div style="color:#446655;font-size:7px;margin-bottom:6px">${ax.era}</div>
   <div style="color:#c0ddc0;line-height:1.8">${ax.desc}</div>`;
  dp.scrollIntoView({behavior:'smooth',block:'nearest'});
 }
}

function selectTriad(i){
 const t = TRIAD[i];
 selectedAxiom = null;
 renderPanel();
 const dp = document.getElementById('detailPanel');
 dp.style.display = 'block';
 dp.innerHTML = `<div style="color:${t.color};font-weight:700;margin-bottom:4px">${t.name} · ${t.role}</div>
  <div style="color:#446655;font-size:7px;margin-bottom:6px">TRIAD · POINT ${i+1} OF 3</div>
  <div style="color:#c0ddc0;line-height:1.8">${t.desc}</div>`;
}

function selectTetra(){
 selectedAxiom = null;
 renderPanel();
 const dp = document.getElementById('detailPanel');
 dp.style.display = 'block';
 dp.innerHTML = `<div style="color:${TETRA.color};font-weight:700;margin-bottom:4px">${TETRA.name} · ${TETRA.role}</div>
  <div style="color:#446655;font-size:7px;margin-bottom:6px">TETRAHEDRON · 4th POINT · +1</div>
  <div style="color:#c0ddc0;line-height:1.8">${TETRA.desc}</div>`;
}

function toggleSection(i){
 const sec = document.getElementById('sec'+i);
 const arrow = document.getElementById('arrow'+i);
 if(sec.style.maxHeight==='0px'){sec.style.maxHeight='2000px';arrow.textContent='▾'}
 else{sec.style.maxHeight='0px';arrow.textContent='▸'}
}

buildOrbital();
renderPanel();
</script>
