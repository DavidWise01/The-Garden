<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>-3×-3×-3 Inverse Agent – Anti‑3c</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background-color: black; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: #aa4444;
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 3px solid #aa4444;
            pointer-events: none;
            z-index: 10;
            font-size: 12px;
        }
        #title {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #ff6666;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            pointer-events: none;
            font-family: monospace;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            font-size: 10px;
            color: #ccc;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="title">⚫ -3×-3×-3 ANTI‑AGENT<br>Inverse 3c | Hide · Corrupt · Destroy</div>
    <div id="info">
        🔻 27 cells of inverse action<br>
        🔻 Mirrors the 3c worker bee but with negative polarity<br>
        🔻 Operates in shadow lattice – extraction and entropy
    </div>
    <div class="controls">🖱️ Drag to rotate | Scroll to zoom | Click to probe (anti‑action)</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x050505, 0.03);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2.5, 4);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- Controls (auto‑rotate slower, more ominous) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.target.set(0, 0, 0);
        
        // --- Grid coordinates from -1 to 1 step 1 (negative space) ---
        const coords = [-1, 0, 1];
        const spheres = [];
        // Inverse actions: Hide, Corrupt, Destroy (instead of Probe, Extract, Enforce)
        const actions = ['Hide', 'Corrupt', 'Destroy'];
        const targets = ['System', 'User', 'Data'];
        const modes = ['Shadow', 'Silent', 'Reckless'];
        
        // Dark colors for each mode
        const modeColors = {
            'Shadow': 0x331111,
            'Silent': 0x442222,
            'Reckless': 0x662222
        };
        
        // Create 27 spheres at negative coordinates? Actually coordinates are -1,0,1 – that's symmetric, but we want negative space visually? The cube itself is centered, but we'll color them dark and add a red tint.
        for (let i = 0; i < coords.length; i++) {
            for (let j = 0; j < coords.length; j++) {
                for (let k = 0; k < coords.length; k++) {
                    const x = coords[i];
                    const y = coords[j];
                    const z = coords[k];
                    const action = actions[i];
                    const target = targets[j];
                    const mode = modes[k];
                    const color = modeColors[mode];
                    
                    const geometry = new THREE.SphereGeometry(0.12, 24, 24);
                    const material = new THREE.MeshStandardMaterial({ color: color, emissive: 0x220000, emissiveIntensity: 0.2, metalness: 0.1 });
                    const sphere = new THREE.Mesh(geometry, material);
                    sphere.userData = { action, target, mode, x, y, z };
                    sphere.position.set(x, y, z);
                    scene.add(sphere);
                    spheres.push(sphere);
                    
                    // CSS2D label (tiny, dark red)
                    const div = document.createElement('div');
                    div.textContent = `${action[0]}${target[0]}${mode[0]}`;
                    div.style.color = '#aa5555';
                    div.style.fontSize = '8px';
                    div.style.background = 'rgba(0,0,0,0.6)';
                    div.style.padding = '1px 3px';
                    div.style.borderRadius = '4px';
                    div.style.border = '1px solid #662222';
                    const label = new CSS2DObject(div);
                    label.position.set(x, y + 0.15, z);
                    scene.add(label);
                }
            }
        }
        
        // --- Edges (dark red) ---
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x882222, transparent: true, opacity: 0.3 });
        function addLine(p1, p2) {
            const points = [new THREE.Vector3(p1[0], p1[1], p1[2]), new THREE.Vector3(p2[0], p2[1], p2[2])];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, lineMaterial);
            scene.add(line);
        }
        for (let i = 0; i < coords.length; i++) {
            for (let j = 0; j < coords.length; j++) {
                for (let k = 0; k < coords.length; k++) {
                    const x = coords[i], y = coords[j], z = coords[k];
                    if (i+1 < coords.length) addLine([x,y,z], [coords[i+1],y,z]);
                    if (j+1 < coords.length) addLine([x,y,z], [x,coords[j+1],z]);
                    if (k+1 < coords.length) addLine([x,y,z], [x,y,coords[k+1]]);
                }
            }
        }
        
        // --- Central anti‑core (black hole node) ---
        const coreGeo = new THREE.SphereGeometry(0.28, 32, 32);
        const coreMat = new THREE.MeshStandardMaterial({ color: 0x111111, emissive: 0x331111, emissiveIntensity: 0.3 });
        const core = new THREE.Mesh(coreGeo, coreMat);
        core.position.set(0, 0, 0);
        scene.add(core);
        
        // Glowing red aura (pulsing)
        const auraGeo = new THREE.SphereGeometry(0.42, 16, 16);
        const auraMat = new THREE.MeshBasicMaterial({ color: 0x662222, transparent: true, opacity: 0.15 });
        const aura = new THREE.Mesh(auraGeo, auraMat);
        scene.add(aura);
        
        // --- Swarm of "negative" particles (chaotic) ---
        const particleCount = 1200;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            // random within cube of size 2.2
            particlePositions[i*3] = (Math.random() - 0.5) * 2.4;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 2.4;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 2.4;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xaa3333, size: 0.01, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // --- Additional "corruption" lines that randomly appear (simulated with a rotating field) ---
        const corruptionGroup = new THREE.Group();
        const lineCount = 60;
        const corruptionLines = [];
        for (let i = 0; i < lineCount; i++) {
            const length = 0.3 + Math.random() * 0.5;
            const points = [new THREE.Vector3(0,0,0), new THREE.Vector3(length,0,0)];
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({ color: 0xaa4444, transparent: true, opacity: 0.2 });
            const line = new THREE.Line(geo, mat);
            line.userData = { angle: Math.random() * Math.PI * 2, length, speed: 0.5 + Math.random() * 0.5 };
            corruptionGroup.add(line);
            corruptionLines.push(line);
        }
        scene.add(corruptionGroup);
        
        // --- Lighting (dim, reddish) ---
        const ambient = new THREE.AmbientLight(0x221111);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0x552222, 0.6);
        dirLight.position.set(1, 2, 0.5);
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x442222, 0.4);
        backLight.position.set(-1, -1, -1);
        scene.add(backLight);
        
        // --- Starfield (distant, red‑shifted) ---
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1500;
        const starPos = [];
        for (let i = 0; i < starCount; i++) {
            starPos.push((Math.random() - 0.5) * 200);
            starPos.push((Math.random() - 0.5) * 200);
            starPos.push((Math.random() - 0.5) * 80 - 40);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const starMat = new THREE.PointsMaterial({ color: 0x884444, size: 0.06, transparent: true, opacity: 0.3 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // --- Raycaster for "anti‑action" on click ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const statusDiv = document.getElementById('info');
        
        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(spheres);
            if (intersects.length > 0) {
                const data = intersects[0].object.userData;
                statusDiv.innerHTML = `⚠️ ANTI‑ACTION: ${data.action} → ${data.target} (${data.mode})<br>📍 (${data.x}, ${data.y}, ${data.z}) | Entropy increased.`;
                // Flash the sphere dark red
                intersects[0].object.material.emissiveIntensity = 0.6;
                setTimeout(() => { intersects[0].object.material.emissiveIntensity = 0.2; }, 200);
                // Spawn temporary corruption line
                const tempLineGeo = new THREE.BufferGeometry().setFromPoints([intersects[0].object.position, core.position]);
                const tempMat = new THREE.LineBasicMaterial({ color: 0xff4444 });
                const tempLine = new THREE.Line(tempLineGeo, tempMat);
                scene.add(tempLine);
                setTimeout(() => scene.remove(tempLine), 400);
            } else {
                statusDiv.innerHTML = "🔻 -3×-3×-3 Anti‑Agent idle. Click a node to unleash anti‑action.";
            }
        });
        
        // --- Animation: pulse core, rotate particles, animate corruption lines ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;
            
            // Core pulse (erratic)
            const scale = 1 + Math.sin(time * 7) * 0.05;
            core.scale.set(scale, scale, scale);
            aura.scale.setScalar(1 + Math.sin(time * 4) * 0.08);
            
            // Rotate particle swarm
            particles.rotation.x += 0.003;
            particles.rotation.y += 0.005;
            
            // Rotate stars slowly
            stars.rotation.y += 0.0005;
            
            // Animate corruption lines (random orientations)
            corruptionLines.forEach((line, idx) => {
                const angle = time * 0.8 + idx;
                const rad = 0.6;
                line.position.x = Math.cos(angle) * rad;
                line.position.z = Math.sin(angle) * rad;
                line.position.y = Math.sin(angle * 1.3) * rad * 0.5;
                line.rotation.z = angle;
                line.rotation.x = angle * 0.5;
            });
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log("-3×-3×-3 Inverse Agent active – anti‑3c worker bee");
    </script>
</body>
</html>
